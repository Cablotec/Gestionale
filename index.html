  if (!isNew && canEdit) {
    foot.append(el('button', { class:'btnd', onclick: async () => {
      if (!confirm('Eliminare questa prenotazione?')) return;
      const { error } = await sb.from('prenotazioni').delete().eq('id', p.id);
      if (error) return toast(error.message, 'err');
      // Aggiorna subito la cache locale (non aspettiamo il realtime)
      state.prenotazioni = state.prenotazioni.filter(x => x.id !== p.id);
      state.consegne = state.consegne.filter(c => c.prenotazione_id !== p.id);
      state.prenOp = state.prenOp.filter(r => r.prenotazione_id !== p.id);
      toast('Prenotazione eliminata'); closeModal(); renderTab(state.currentTab);
    }}, 'Elimina'));
  }
  if (canEdit) foot.append(el('button', { class:'btnp', onclick:save }, 'Salva'));
  modal.append(foot);

  async function save() {
    const fd = new FormData(form);
    const payload = {
      mezzo_id: fd.get('mezzo_id'), tipo: fd.get('tipo'),
      data_inizio: fd.get('data_inizio'), data_fine: fd.get('data_fine'),
      ora_inizio: fd.get('ora_inizio') || null, ora_fine: fd.get('ora_fine') || null,
      note: fd.get('note') || null,
    };
    if (!payload.mezzo_id || !payload.data_inizio || !payload.data_fine)
      return toast('Compila i campi obbligatori', 'err');
    if (payload.data_fine < payload.data_inizio)
      return toast('Data fine non può essere prima dell\'inizio', 'err');
    if (operatoriSel.length === 0)
      return toast('Seleziona almeno un operatore del mezzo', 'err');

    // CHECK SOVRAPPOSIZIONI prima di salvare
    const conflitti = checkSovrapposizioni(
      payload.mezzo_id, payload.data_inizio, payload.data_fine, isNew ? null : p.id
    );
    if (conflitti.length > 0) {
      const m = state.mezzi.find(x => x.id === payload.mezzo_id);
      const dettagli = conflitti.map(c => {
        const u = state.profiliById[c.utente_id];
        const periodo = c.data_inizio === c.data_fine
          ? fmtIT(c.data_inizio)
          : `${fmtIT(c.data_inizio)} → ${fmtIT(c.data_fine)}`;
        return `• ${periodo} (${u?.nome || u?.email || 'utente'})`;
      }).join('\n');
      alert(`⚠ Mezzo "${m?.nome || ''}" già prenotato in quel periodo:\n\n${dettagli}\n\nScegli un altro periodo o un altro mezzo.`);
      return;
    }

    let prenId = p.id;
    let prenRow = null;
    if (isNew) {
      payload.utente_id = state.profile.id;
      const { data, error } = await sb.from('prenotazioni').insert(payload).select().single();
      if (error) {
        if (error.message && error.message.includes('exclusion')) {
          return toast('Mezzo già prenotato in quel periodo', 'err');
        }
        return toast(error.message, 'err');
      }
      prenId = data.id;
      prenRow = data;
    } else {
      const { data, error } = await sb.from('prenotazioni').update(payload).eq('id', p.id).select().single();
      if (error) {
        if (error.message && error.message.includes('exclusion')) {
          return toast('Mezzo già prenotato in quel periodo', 'err');
        }
        return toast(error.message, 'err');
      }
      prenRow = data;
    }

    // Aggiorno operatori associati: cancello tutti e reinserisco
    await sb.from('prenotazioni_operatori').delete().eq('prenotazione_id', prenId);
    let nuoviPrenUtil = [];
    if (operatoriSel.length > 0) {
      const rows = operatoriSel.map(uid => ({ prenotazione_id: prenId, operatore_id: uid }));
      const { data, error } = await sb.from('prenotazioni_operatori').insert(rows).select();
      if (error) return toast('Errore associazione operatori: '+error.message, 'err');
      nuoviPrenUtil = data || rows;
    }

    await sb.from('consegne').delete().eq('prenotazione_id', prenId);
    const validi = consegne.filter(c => (c.indirizzo||'').trim() || (c.descrizione||'').trim());
    let nuoveConsegne = [];
    if (validi.length) {
      const rows = validi.map((c, i) => ({
        prenotazione_id: prenId, ordine: i,
        indirizzo: c.indirizzo || '', descrizione: c.descrizione || null,
      }));
      const { data, error } = await sb.from('consegne').insert(rows).select();
      if (error) return toast('Salvato ma errore nelle consegne: '+error.message, 'err');
      nuoveConsegne = data || [];
    }

    // Aggiorno la cache locale subito (non aspettiamo il realtime)
    if (isNew) {
      if (!state.prenotazioni.find(x => x.id === prenRow.id)) state.prenotazioni.push(prenRow);
    } else {
      state.prenotazioni = state.prenotazioni.map(x => x.id === prenId ? prenRow : x);
    }
    // Per pivot e consegne: rimuovo le righe duplicate (potrebbero arrivare dal realtime in parallelo)
    const idsPrenUtil = new Set(nuoviPrenUtil.map(r => r.prenotazione_id+'|'+r.operatore_id));
    state.prenOp = state.prenOp.filter(r => r.prenotazione_id !== prenId).concat(nuoviPrenUtil);
    const idsConsegne = new Set(nuoveConsegne.map(r => r.id));
    state.consegne = state.consegne.filter(c => c.prenotazione_id !== prenId).concat(nuoveConsegne);

    toast(isNew ? 'Prenotazione creata' : 'Prenotazione aggiornata');
    closeModal(); renderTab(state.currentTab);
  }

  openModal(modal);
}

// USO MEZZO — visualizzazione e modifica (admin) di un uso
// ═══════════════════════════════════════════════════════════
function openUsoMezzoModal(uso) {
  const m = state.mezzi.find(x => x.id === uso.mezzo_id);
  const utz = state.operatoriById[uso.operatore_id];
  const isAdmin = state.profile?.ruolo === 'admin';
  const aperto = !uso.data_rientro;

  const modal = el('div', { class:'modal' });
  modal.append(el('div', { class:'mhd' },
    el('h2', {}, aperto ? 'Uso mezzo in corso' : 'Uso mezzo'),
    el('button', { class:'mclose', onclick:closeModal }, '✕'),
  ));

  const body = el('div', { class:'mbody' });

  // Stato corrente (lettura)
  const oraUscita = new Date(uso.data_uscita);
  const oraRientro = uso.data_rientro ? new Date(uso.data_rientro) : null;
  const durataMs = (oraRientro || new Date()).getTime() - oraUscita.getTime();
  const durata = (() => {
    const min = Math.round(durataMs / 60000);
    if (min < 60) return min + ' min';
    const h = Math.floor(min / 60);
    const r = min % 60;
    return h + 'h' + (r ? ' '+r+'min' : '');
  })();

  body.append(el('div', { class:'field' },
    el('label', {}, 'Mezzo'),
    el('div', { class:'mono', style:'font-size:14px;padding:8px 0;' },
      (m?.nome || '—') + (m?.targa ? ' · '+m.targa : '')),
  ));
  body.append(el('div', { class:'field' },
    el('label', {}, 'Operatore'),
    el('div', { class:'mono', style:'font-size:14px;padding:8px 0;' }, utz?.nome || '—'),
  ));

  // Form per admin: modifica orari
  let inUscita, inRientro;
  if (isAdmin) {
    const isoLocal = (d) => {
      // converte una Date in formato datetime-local "YYYY-MM-DDTHH:MM"
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };
    inUscita = el('input', { type:'datetime-local', value: isoLocal(oraUscita) });
    inRientro = el('input', { type:'datetime-local', value: oraRientro ? isoLocal(oraRientro) : '' });
    body.append(el('div', { class:'frow' },
      el('div', { class:'field' }, el('label', {}, 'Data/ora uscita'), inUscita),
      el('div', { class:'field' }, el('label', {}, 'Data/ora rientro'+(aperto ? ' (vuoto = aperto)' : '')), inRientro),
    ));
  } else {
    body.append(el('div', { class:'frow' },
      el('div', { class:'field' }, el('label', {}, 'Uscita'),
        el('div', { class:'mono', style:'padding:8px 0;' },
          fmtIT(toLocalISO(oraUscita))+' '+z(oraUscita.getHours())+':'+z(oraUscita.getMinutes()))),
      el('div', { class:'field' }, el('label', {}, 'Rientro'),
        el('div', { class:'mono', style:'padding:8px 0;' },
          oraRientro
            ? fmtIT(toLocalISO(oraRientro))+' '+z(oraRientro.getHours())+':'+z(oraRientro.getMinutes())
            : el('span', { class:'badge byel' }, 'in corso'))),
    ));
  }

  body.append(el('div', { class:'field' },
    el('label', {}, 'Durata'),
    el('div', { class:'mono', style:'padding:8px 0;' }, durata + (aperto ? ' (ancora in corso)' : '')),
  ));
  if (uso.sede) body.append(el('div', { class:'field' },
    el('label', {}, 'Postazione check-out'),
    el('div', { class:'mono', style:'padding:8px 0;' }, uso.sede),
  ));
  if (uso.note) body.append(el('div', { class:'field' },
    el('label', {}, 'Note'),
    el('div', { style:'padding:8px 0;' }, uso.note),
  ));

  modal.append(body);

  // Footer
  const foot = el('div', { class:'mfoot' });
  foot.append(el('button', { class:'btng', onclick:closeModal }, 'Chiudi'));

  if (isAdmin) {
    if (aperto) {
      foot.append(el('button', { class:'btnp', onclick: async () => {
        if (!confirm('Chiudere questo uso adesso?')) return;
        const now = new Date().toISOString();
        const { data, error } = await sb.from('usi_mezzo')
          .update({ data_rientro: now }).eq('id', uso.id).select().single();
        if (error) return toast(error.message, 'err');
        state.usiMezzo = state.usiMezzo.map(x => x.id === uso.id ? data : x);
        toast('Uso chiuso'); closeModal(); renderTab(state.currentTab);
      }}, 'Chiudi adesso'));
    }
    foot.append(el('button', { class:'btnp', onclick: async () => {
      // Salva modifiche orari
      const dUsc = inUscita.value;
      const dRie = inRientro.value;
      if (!dUsc) return toast('Data uscita obbligatoria', 'err');
      const payload = {
        data_uscita: new Date(dUsc).toISOString(),
        data_rientro: dRie ? new Date(dRie).toISOString() : null,
      };
      if (payload.data_rientro && payload.data_rientro < payload.data_uscita)
        return toast('Rientro non può essere prima di uscita', 'err');
      const { data, error } = await sb.from('usi_mezzo')
        .update(payload).eq('id', uso.id).select().single();
      if (error) return toast(error.message, 'err');
      state.usiMezzo = state.usiMezzo.map(x => x.id === uso.id ? data : x);
      toast('Uso aggiornato'); closeModal(); renderTab(state.currentTab);
    }}, 'Salva'));
    foot.append(el('button', { class:'btnd', onclick: async () => {
      if (!confirm('Eliminare questo uso? Operazione non reversibile.')) return;
      const { data, error } = await sb.from('usi_mezzo').delete().eq('id', uso.id).select();
      if (error) return toast(error.message, 'err');
      if (!data || data.length === 0) {
        return toast('Eliminazione bloccata: verifica le policy DELETE su usi_mezzo', 'err');
      }
      state.usiMezzo = state.usiMezzo.filter(x => x.id !== uso.id);
      toast('Uso eliminato'); closeModal(); renderTab(state.currentTab);
    }}, 'Elimina'));
  }
  modal.append(foot);
  openModal(modal);
}

// ═══════════════════════════════════════════════════════════
// KIOSK MODE — terminale check-out mezzi per mini-PC sede
// ═══════════════════════════════════════════════════════════
const kioskState = {
  utenteSelezionato: null,    // { id, nome, numero_badge }
  mezziInUso: [],              // usi_mezzo aperti (data_rientro IS NULL)
  prenotazioniOggi: [],        // prenotazioni che coprono oggi
  inactivityTimer: null,
  doneTimer: null,
  rfidBuffer: '',
  rfidBufferTimer: null,
};

const KIOSK_INACTIVITY_MS = 15000;     // torna alla schermata 1 dopo 15s
const KIOSK_DONE_MS = 2000;             // schermata conferma resta 2s

async function kioskInit() {
  // Login automatico con account dedicato
  try {
    const { error } = await sb.auth.signInWithPassword({
      email: KIOSK_EMAIL, password: KIOSK_PASSWORD,
    });
    if (error) throw error;
  } catch (e) {
    document.body.innerHTML = `<div class="setup">
      <h1>⚠ Errore login kiosk</h1>
      <p>${e.message || e}</p>
      <p>Verifica che l'utente <code>${KIOSK_EMAIL}</code> esista su Supabase.</p>
    </div>`;
    return;
  }

  // Nascondi tutto eccetto schermo kiosk
  $('#auth-screen').style.display = 'none';
  $('#app-screen').style.display = 'none';
  $('#kiosk-screen').style.display = 'flex';
  $('#kiosk-sede-lbl').textContent = 'Postazione: ' + KIOSK_PARAM;
  applyTheme(localStorage.getItem('theme') || 'dark');

  // Carica dati iniziali
  await kioskLoadAll();
  kioskStartRealtime();

  // Orologio
  setInterval(kioskUpdateClock, 1000);
  kioskUpdateClock();

  // Cattura input RFID globale
  document.addEventListener('keydown', kioskRfidListener);
  // Riassicura focus sull'input nascosto
  setInterval(() => {
    if ($('#kiosk-screen').style.display !== 'none' &&
        document.activeElement?.id !== 'kiosk-rfid-input') {
      $('#kiosk-rfid-input').focus();
    }
  }, 1000);

  kioskGoToId();
}

function kioskUpdateClock() {
  const d = new Date();
  $('#kiosk-clock').textContent =
    z(d.getHours())+':'+z(d.getMinutes())+':'+z(d.getSeconds());
}

async function kioskLoadAll() {
  // Carica mezzi, operatori, usi aperti, prenotazioni di oggi
  const oggi = toLocalISO(new Date());
  const [mezzi, util, usi, pren] = await Promise.all([
    sb.from('mezzi').select('*').eq('attivo', true).order('nome'),
    sb.from('operatori').select('*').eq('attivo', true).order('nome'),
    sb.from('usi_mezzo').select('*').is('data_rientro', null),
    sb.from('prenotazioni').select('*').lte('data_inizio', oggi).gte('data_fine', oggi),
  ]);
  state.mezzi = mezzi.data || [];
  state.operatori = util.data || [];
  state.operatoriById = Object.fromEntries(state.operatori.map(u => [u.id, u]));
  kioskState.mezziInUso = usi.data || [];
  kioskState.prenotazioniOggi = pren.data || [];
}

function kioskStartRealtime() {
  sb.channel('kiosk-changes')
    .on('postgres_changes', { event:'*', schema:'public', table:'usi_mezzo' }, (p) => {
      const ev = p.eventType;
      const row = p.new, oldRow = p.old;
      if (ev === 'INSERT') {
        if (!row.data_rientro && !kioskState.mezziInUso.find(x => x.id === row.id))
          kioskState.mezziInUso.push(row);
      } else if (ev === 'UPDATE') {
        kioskState.mezziInUso = kioskState.mezziInUso.filter(x => x.id !== row.id);
        if (!row.data_rientro) kioskState.mezziInUso.push(row);
      } else if (ev === 'DELETE') {
        kioskState.mezziInUso = kioskState.mezziInUso.filter(x => x.id !== oldRow.id);
      }
      kioskRefreshActive();
    })
    .on('postgres_changes', { event:'*', schema:'public', table:'mezzi' }, () => {
      kioskLoadAll().then(kioskRefreshActive);
    })
    .on('postgres_changes', { event:'*', schema:'public', table:'operatori' }, () => {
      kioskLoadAll().then(kioskRefreshActive);
    })
    .on('postgres_changes', { event:'*', schema:'public', table:'prenotazioni' }, () => {
      kioskLoadAll().then(kioskRefreshActive);
    })
    .subscribe();
}

function kioskRefreshActive() {
  // Re-render della schermata corrente
  if ($('#kiosk-step-id').style.display !== 'none') kioskRenderId();
  else if ($('#kiosk-step-action').style.display !== 'none') kioskRenderAction();
}

// ─── Listener RFID: cattura sequenze di cifre seguite da Invio ───
function kioskRfidListener(e) {
  // Ignora se siamo nella schermata di conferma
  if ($('#kiosk-step-done').style.display !== 'none') return;
  // Ignora se l'evento viene da un input attivo (ma il nostro è hidden)
  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'input' && e.target.id !== 'kiosk-rfid-input') return;

  if (e.key === 'Enter') {
    if (kioskState.rfidBuffer.length >= 4) {
      const code = kioskState.rfidBuffer;
      kioskState.rfidBuffer = '';
      kioskHandleBadge(code);
    } else {
      kioskState.rfidBuffer = '';
    }
    e.preventDefault();
    return;
  }
  if (/^\d$/.test(e.key)) {
    kioskState.rfidBuffer += e.key;
    clearTimeout(kioskState.rfidBufferTimer);
    kioskState.rfidBufferTimer = setTimeout(() => { kioskState.rfidBuffer = ''; }, 200);
  }
}

function kioskHandleBadge(code) {
  // Cerca per numero_badge
  const u = state.operatori.find(x => (x.numero_badge||'').replace(/^0+/,'') === code.replace(/^0+/,''));
  if (!u) {
    kioskShowError('Badge non riconosciuto');
    return;
  }
  kioskSelectUtente(u);
}

function kioskShowError(msg) {
  // Toast di errore in basso, autodismiss
  const ex = $('#kiosk-toast');
  if (ex) ex.remove();
  const t = el('div', { id:'kiosk-toast', class:'kiosk-toast' }, msg);
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
  kioskBeep('err');
}

function kioskBeep(kind) {
  // Beep sintetizzato senza file audio
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (kind === 'err') {
      osc.frequency.value = 220;
      gain.gain.setValueAtTime(.15, ctx.currentTime);
      osc.start(); osc.stop(ctx.currentTime + .25);
    } else {
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(.12, ctx.currentTime);
      osc.start(); osc.stop(ctx.currentTime + .12);
    }
  } catch (e) { /* ignora se WebAudio non disponibile */ }
}

// ─── SCHERMATA 1: identificazione ───
function kioskGoToId() {
  kioskState.utenteSelezionato = null;
  clearTimeout(kioskState.inactivityTimer);
  $('#kiosk-step-id').style.display = 'flex';
  $('#kiosk-step-action').style.display = 'none';
  $('#kiosk-step-done').style.display = 'none';
  kioskRenderId();
  $('#kiosk-rfid-input').focus();
}

function kioskRenderId() {
  // Griglia operatori: escludi inattivi e l'account tecnico kiosk
  const grid = $('#kiosk-utili-grid');
  grid.innerHTML = '';
  state.operatori
    .filter(u => u.attivo && !isKioskRecord(u))
    .forEach(u => {
      grid.appendChild(el('div', {
        class: 'kiosk-tile',
        onclick: () => kioskSelectUtente(u),
      },
        el('div', { class:'kiosk-tile-name' }, u.nome),
        u.numero_badge ? el('div', { class:'kiosk-tile-sub' }, '#'+u.numero_badge) : null,
      ));
    });

  // Lista "mezzi attualmente fuori"
  const fuori = $('#kiosk-fuori-list');
  fuori.innerHTML = '';
  fuori.appendChild(el('div', { class:'kiosk-fuori-title' }, 'Mezzi attualmente fuori'));
  if (kioskState.mezziInUso.length === 0) {
    fuori.appendChild(el('div', { class:'kiosk-fuori-empty' }, 'Nessun mezzo fuori al momento'));
  } else {
    kioskState.mezziInUso.forEach(uso => {
      const m = state.mezzi.find(x => x.id === uso.mezzo_id);
      const u = state.operatoriById[uso.operatore_id];
      const ora = new Date(uso.data_uscita);
      fuori.appendChild(el('div', { class:'kiosk-fuori-row' },
        el('span', {}, (m?.nome || '?') + (m?.targa ? ' · '+m.targa : '')),
        el('span', { style:'color:var(--mut)' },
          (u?.nome || '?') + ' — uscito alle ' + z(ora.getHours())+':'+z(ora.getMinutes())),
      ));
    });
  }
}

function kioskSelectUtente(u) {
  kioskState.utenteSelezionato = u;
  kioskBeep('ok');
  kioskGoToAction();
}

// ─── SCHERMATA 2: scelta azione ───
function kioskGoToAction() {
  $('#kiosk-step-id').style.display = 'none';
  $('#kiosk-step-action').style.display = 'flex';
  $('#kiosk-step-done').style.display = 'none';
  kioskRenderAction();
  kioskResetInactivity();
}

function kioskRenderAction() {
  const u = kioskState.utenteSelezionato;
  if (!u) { kioskGoToId(); return; }

  $('#kiosk-greet-name').textContent = 'Ciao ' + u.nome;
  const root = $('#kiosk-action-content');
  root.innerHTML = '';

  // Ha un mezzo fuori? Se sì, proponi rientro
  const usoAperto = kioskState.mezziInUso.find(x => x.operatore_id === u.id);
  if (usoAperto) {
    const m = state.mezzi.find(x => x.id === usoAperto.mezzo_id);
    const ora = new Date(usoAperto.data_uscita);
    const durata = kioskFormatDurata(Date.now() - ora.getTime());
    root.appendChild(el('div', { class:'kiosk-rientro-box' },
      el('div', { class:'kiosk-rientro-title' }, 'Hai un mezzo fuori'),
      el('div', { class:'kiosk-rientro-mezzo' },
        (m?.nome || '?') + (m?.targa ? ' · '+m.targa : '')),
      el('div', { class:'kiosk-rientro-info' },
        'Uscito alle '+z(ora.getHours())+':'+z(ora.getMinutes())+' ('+durata+' fa)'),
      el('button', { class:'kiosk-rientro-btn', onclick:()=>kioskConfirmRientro(usoAperto) },
        '✓ Conferma rientro'),
    ));
    root.appendChild(el('div', { class:'kiosk-section-title' }, 'Oppure prendi un altro mezzo'));
  }

  // Lista mezzi disponibili
  const mezziInUsoIds = kioskState.mezziInUso.map(x => x.mezzo_id);
  // Mezzi prenotati oggi da OGNI altro utente (se prenotato dall'utente corrente, lo evidenziamo invece di nasconderlo)
  const mezziPrenotatiAltri = kioskState.prenotazioniOggi
    .filter(p => p.utente_id !== u.id /* utente_id è l'autore, non l'operatore - vedi nota sotto */)
    .map(p => p.mezzo_id);

  // Mezzo prenotato dall'utente corrente per oggi
  const prenMia = kioskState.prenotazioniOggi.find(p => p.utente_id === u.id);

  const disponibili = state.mezzi.filter(m =>
    !mezziInUsoIds.includes(m.id) && !mezziPrenotatiAltri.includes(m.id)
  );
  // Ordina con il prenotato in cima
  disponibili.sort((a,b) => {
    if (prenMia) {
      if (a.id === prenMia.mezzo_id) return -1;
      if (b.id === prenMia.mezzo_id) return 1;
    }
    return a.nome.localeCompare(b.nome);
  });

  const grid = el('div', { class:'kiosk-grid' });
  if (disponibili.length === 0) {
    grid.appendChild(el('div', { class:'kiosk-empty' }, 'Nessun mezzo disponibile al momento.'));
  } else {
    disponibili.forEach(m => {
      const isPren = prenMia && prenMia.mezzo_id === m.id;
      grid.appendChild(el('div', {
        class: 'kiosk-tile mezzo'+(isPren ? ' mezzo-prenotato' : ''),
        style: 'border-left-color:'+(m.colore || '#4eb8ff'),
        onclick: () => kioskConfirmUscita(m),
      },
        el('div', { class:'kiosk-tile-name' }, m.nome),
        m.targa ? el('div', { class:'kiosk-tile-targa' }, m.targa) : null,
        isPren ? el('div', { class:'kiosk-tile-prenotato' }, '★ Prenotato per te oggi') : null,
      ));
    });
  }
  root.appendChild(grid);
}

async function kioskConfirmUscita(mezzo) {
  const u = kioskState.utenteSelezionato;
  try {
    const { data, error } = await sb.from('usi_mezzo').insert({
      mezzo_id: mezzo.id,
      operatore_id: u.id,
      sede: KIOSK_PARAM,
    }).select().single();
    if (error) throw error;
    // Aggiorna cache subito
    if (data && !kioskState.mezziInUso.find(x => x.id === data.id))
      kioskState.mezziInUso.push(data);
    kioskBeep('ok');
    kioskShowDone({
      title: 'Uscita registrata',
      detail: u.nome + ' → ' + (mezzo.nome + (mezzo.targa ? ' · '+mezzo.targa : '')),
      ok: true,
    });
  } catch (e) {
    kioskShowError('Errore: ' + (e.message||e));
  }
}

async function kioskConfirmRientro(uso) {
  try {
    const { data, error } = await sb.from('usi_mezzo')
      .update({ data_rientro: new Date().toISOString() })
      .eq('id', uso.id)
      .select().single();
    if (error) throw error;
    // Rimuovi dalla cache aperti
    kioskState.mezziInUso = kioskState.mezziInUso.filter(x => x.id !== uso.id);
    const m = state.mezzi.find(x => x.id === uso.mezzo_id);
    const u = kioskState.utenteSelezionato;
    const durata = kioskFormatDurata(
      new Date(data.data_rientro).getTime() - new Date(uso.data_uscita).getTime()
    );
    kioskBeep('ok');
    kioskShowDone({
      title: 'Rientro registrato',
      detail: u.nome + ' → ' + (m?.nome||'?') + (m?.targa ? ' · '+m.targa : '') +
              '\nDurata: ' + durata,
      ok: true,
    });
  } catch (e) {
    kioskShowError('Errore: ' + (e.message||e));
  }
}

// ─── SCHERMATA 3: conferma ───
function kioskShowDone({ title, detail, ok }) {
  clearTimeout(kioskState.inactivityTimer);
  $('#kiosk-step-id').style.display = 'none';
  $('#kiosk-step-action').style.display = 'none';
  $('#kiosk-step-done').style.display = 'flex';
  const root = $('#kiosk-done-msg');
  root.innerHTML = '';
  root.appendChild(el('div', { class: 'kiosk-done-card' + (ok ? '' : ' err') },
    el('div', { class:'kiosk-done-icon' }, ok ? '✓' : '✕'),
    el('div', { class:'kiosk-done-msg' }, title),
    el('div', { class:'kiosk-done-detail', style:'white-space:pre-line' }, detail || ''),
  ));
  clearTimeout(kioskState.doneTimer);
  kioskState.doneTimer = setTimeout(kioskGoToId, KIOSK_DONE_MS);
}

// ─── Inattività ───
function kioskResetInactivity() {
  clearTimeout(kioskState.inactivityTimer);
  kioskState.inactivityTimer = setTimeout(kioskGoToId, KIOSK_INACTIVITY_MS);
}
['click','touchstart','keydown'].forEach(ev => {
  document.addEventListener(ev, () => {
    if ($('#kiosk-step-action').style.display !== 'none') kioskResetInactivity();
  });
});

function kioskFormatDurata(ms) {
  const min = Math.round(ms / 60000);
  if (min < 60) return min + ' min';
  const h = Math.floor(min / 60);
  const m = min % 60;
  return h + 'h ' + (m ? m+'min' : '');
}

init();
</script>
