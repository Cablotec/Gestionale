<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0e">
<title>Cablotec — Sistema Gestionale</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

:root{
  --bg:#0f0f0e; --sur:#1a1a18; --sur2:#222220; --brd:#2e2e2a;
  --acc:#d4ff4e; --or:#ff6b35; --txt:#e8e8e2; --mut:#6b6b64;
  --grn:#4effa3; --red:#ff4e6b; --yel:#ffcc4e; --blu:#4eb8ff; --vio:#b84eff;
  --hover:rgba(255,255,255,.02); --hover2:rgba(255,255,255,.04); --hover3:rgba(255,255,255,.1);
  --weekend:rgba(255,255,255,.015); --shadow:rgba(0,0,0,.75);
}
:root[data-theme="light"]{
  --bg:#f5f5f1; --sur:#ffffff; --sur2:#f0f0ec; --brd:#dcdcd6;
  --acc:#5a8000; --or:#cc4a16; --txt:#1a1a18; --mut:#7a7a72;
  --grn:#0d8f4c; --red:#c92648; --yel:#a87600; --blu:#1872c4; --vio:#7a2bc7;
  --hover:rgba(0,0,0,.025); --hover2:rgba(0,0,0,.05); --hover3:rgba(0,0,0,.08);
  --weekend:rgba(0,0,0,.02); --shadow:rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;min-height:100vh;padding:22px 18px 40px;}

/* Header */
header.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--brd);gap:12px;flex-wrap:wrap;}
h1{font-size:clamp(20px,4vw,34px);font-weight:800;line-height:1;letter-spacing:-.02em;}
h1 span{color:var(--acc);}
.sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);margin-top:4px;}
.user-info{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.user-info b{color:var(--txt);font-weight:500;}
.kiosk-jump{background:var(--sur);border:1px solid var(--brd);color:var(--mut);font-family:'DM Mono',monospace;font-size:10px;padding:5px 8px;border-radius:3px;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;outline:none;}
.kiosk-jump:hover{color:var(--txt);border-color:var(--mut);}

/* Toggle tema */
.theme-toggle{background:transparent;border:1px solid var(--brd);color:var(--mut);width:30px;height:30px;border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;}
.theme-toggle:hover{border-color:var(--txt);color:var(--txt);}

/* Nav */
.nav{display:flex;gap:0;border-bottom:2px solid var(--brd);margin-bottom:22px;overflow-x:auto;}
.navtab{padding:9px 18px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--mut);border-bottom:2px solid transparent;margin-bottom:-2px;background:none;border:none;white-space:nowrap;transition:all .15s;}
.navtab:hover{color:var(--txt);}
.navtab.active{color:var(--acc);border-bottom-color:var(--acc);}
#tabs-macro{margin-bottom:0;}
.nav-sub{border-bottom:1px solid var(--brd);margin-bottom:22px;padding-left:6px;}
.nav-sub .navtab{font-size:10px;padding:7px 14px;color:var(--mut);}
.nav-sub .navtab.active{color:var(--txt);border-bottom-color:var(--txt);}
.nav-sub:empty{display:none;}

/* Buttons */
.btnp{padding:9px 14px;background:var(--acc);color:var(--bg);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border:none;border-radius:4px;cursor:pointer;transition:all .2s;}
.btnp:hover{filter:brightness(.92);}
.btnp:disabled{opacity:.4;cursor:not-allowed;}
.btng{padding:7px 11px;background:transparent;border:1px solid var(--brd);color:var(--mut);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;cursor:pointer;border-radius:4px;transition:all .2s;letter-spacing:.04em;text-transform:uppercase;}
.btng:hover{border-color:var(--txt);color:var(--txt);}
.btnd{padding:4px 8px;background:transparent;border:1px solid var(--brd);color:var(--mut);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;border-radius:3px;transition:all .15s;}
.btnd:hover{color:var(--red);border-color:var(--red);}
.btnsm{padding:4px 9px;background:transparent;border:1px solid var(--brd);color:var(--mut);font-family:'Syne',sans-serif;font-size:10px;font-weight:600;cursor:pointer;border-radius:3px;letter-spacing:.04em;text-transform:uppercase;}
.btnsm:hover{border-color:var(--txt);color:var(--txt);}
.btnsm:disabled{opacity:.35;cursor:not-allowed;}

/* Tables */
.tw{overflow-x:auto;}
table.rt{width:100%;border-collapse:collapse;font-size:12px;}
table.rt th{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--acc);padding:7px 10px;text-align:left;border-bottom:2px solid var(--acc);white-space:nowrap;background:var(--bg);}
table.rt th.tc{text-align:center;}
table.rt td{padding:8px 10px;border-bottom:1px solid var(--brd);vertical-align:middle;}
table.rt tbody tr:hover td{background:var(--hover);}
.mono{font-family:'DM Mono',monospace;}
.cod-cell{font-family:'DM Mono',monospace;font-size:11px;color:var(--or);}

/* Badges */
.badge{display:inline-block;padding:2px 7px;border-radius:2px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.bok{background:rgba(78,255,163,.12);color:var(--grn);}
.berr{background:rgba(255,78,107,.12);color:var(--red);}
.byel{background:rgba(255,204,78,.12);color:var(--yel);}
.bor{background:rgba(255,107,53,.12);color:var(--or);}
.bblu{background:rgba(78,184,255,.12);color:var(--blu);}
.bvio{background:rgba(184,78,255,.12);color:var(--vio);}
.bgry{background:rgba(107,107,100,.18);color:var(--mut);}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.toolbar h2{font-size:15px;font-weight:700;flex:1;}

.empty{padding:40px;text-align:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);}

/* Modal */
#modal-root .modal-bg{position:fixed;inset:0;background:var(--shadow);z-index:400;display:flex;align-items:center;justify-content:center;padding:12px;overscroll-behavior:contain;}
.modal{background:var(--sur);border:1px solid var(--brd);border-radius:6px;width:100%;max-width:560px;max-height:calc(100vh - 24px);display:flex;flex-direction:column;overflow:hidden;}
.mhd{padding:14px 17px 11px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mhd h2{font-size:14px;font-weight:700;}
.mclose{background:none;border:none;color:var(--mut);font-size:16px;cursor:pointer;padding:2px 8px;border-radius:3px;}
.mclose:hover{color:var(--txt);}
.mbody{padding:16px 18px;overflow-y:auto;flex:1;}
.mfoot{padding:11px 18px;border-top:1px solid var(--brd);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;flex-wrap:wrap;}

/* Form fields */
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.field label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);}
.field input,.field select{background:var(--sur2);border:1px solid var(--brd);color:var(--txt);padding:7px 10px;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;outline:none;width:100%;}
.field textarea{background:var(--sur2);border:1px solid var(--brd);color:var(--txt);padding:7px 10px;border-radius:4px;font-family:'Syne',sans-serif;font-size:12px;outline:none;width:100%;resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc);}
.field input[type=color]{padding:2px;height:34px;cursor:pointer;}
.field select option{background:var(--sur2);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Auth */
#auth-screen{position:fixed;inset:0;background:var(--bg);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px;}
.auth-box{background:var(--sur);border:1px solid var(--brd);border-radius:8px;padding:32px 28px;width:100%;max-width:380px;}
.auth-box h2{font-size:22px;font-weight:800;margin-bottom:4px;letter-spacing:-.02em;}
.auth-box h2 span{color:var(--acc);}
.auth-box .auth-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);margin-bottom:24px;}
.auth-tabs{display:flex;gap:0;margin-bottom:18px;}
.auth-tabs button{flex:1;padding:8px;border:1px solid var(--brd);background:var(--sur2);color:var(--mut);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;}
.auth-tabs button:first-child{border-radius:4px 0 0 4px;}
.auth-tabs button:last-child{border-radius:0 4px 4px 0;border-left:none;}
.auth-tabs button.active{background:var(--acc);border-color:var(--acc);color:var(--bg);}
.auth-msg{font-family:'DM Mono',monospace;font-size:11px;min-height:18px;margin-top:8px;}
.auth-msg.err{color:var(--red);}
.auth-msg.ok{color:var(--grn);}

/* Calendar */
.cal-head{display:flex;align-items:center;gap:8px;padding:10px 0 14px;flex-wrap:wrap;}
.cal-head h2{font-size:18px;font-weight:700;text-transform:capitalize;letter-spacing:-.01em;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--brd);border-left:1px solid var(--brd);}
.cal-dow{padding:6px 8px;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--acc);background:var(--sur);border-right:1px solid var(--brd);border-bottom:1px solid var(--brd);}
.cal-cell{min-height:110px;padding:4px;background:var(--sur);border-right:1px solid var(--brd);border-bottom:1px solid var(--brd);cursor:pointer;position:relative;overflow:hidden;transition:background .12s;}
.cal-cell:hover{background:var(--sur2);}
.cal-cell.other{background:var(--bg);opacity:.55;}
.cal-cell.weekend{background:var(--weekend);}
.cal-cell.today .cal-day-num{background:var(--acc);color:var(--bg);border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;}
.cal-day-num{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;padding:2px 4px;color:var(--mut);}
.cal-cell.today .cal-day-num{color:var(--bg);}
.cal-events{display:flex;flex-direction:column;gap:2px;margin-top:2px;}
.cal-evt{font-family:'DM Mono',monospace;font-size:10px;line-height:1.2;padding:3px 5px;border-radius:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:3px solid;background:var(--hover2);color:var(--txt);}
.cal-evt:hover{background:var(--hover3);}
.cal-uso{border-left-style:dashed;}
.cal-uso-aperto{background:rgba(255,107,53,.12);border-left-color:var(--or);color:var(--or);font-weight:500;}
.cal-uso-aperto:hover{background:rgba(255,107,53,.2);}
.cal-uso-chiuso{background:rgba(107,107,100,.12);border-left-color:var(--mut);color:var(--mut);}
.cal-uso-chiuso:hover{background:rgba(107,107,100,.2);}
.swatch-uso-aperto{background:rgba(255,107,53,.5);border-color:var(--or);}
.swatch-uso-chiuso{background:rgba(107,107,100,.5);border-color:var(--mut);}
.cal-more{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);padding:3px 5px;cursor:pointer;border-radius:2px;background:var(--hover2);text-align:center;letter-spacing:.05em;}
.cal-more:hover{background:var(--hover3);color:var(--txt);}
.day-row{padding:10px 12px;margin-bottom:6px;background:var(--sur2);border:1px solid var(--brd);border-left:4px solid var(--mut);border-radius:4px;cursor:pointer;transition:background .12s;}
.day-row:hover{background:var(--hover2);}
.day-row-uso-aperto{border-left-color:var(--or);background:rgba(255,107,53,.06);}
.day-row-uso-chiuso{border-left-color:var(--mut);}
.day-row-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.day-row-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);}

/* Placeholder per moduli in arrivo */
.placeholder-card{background:var(--sur);border:1px dashed var(--brd);border-radius:8px;padding:50px 30px;text-align:center;margin-top:20px;}
.placeholder-icon{font-size:46px;opacity:.6;margin-bottom:14px;}
.placeholder-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.placeholder-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--mut);max-width:480px;margin:0 auto 16px;line-height:1.6;}
.placeholder-meta{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;color:var(--acc);background:rgba(212,255,78,.08);border:1px solid var(--acc);border-radius:3px;padding:4px 10px;letter-spacing:.08em;text-transform:uppercase;}

/* Chips per filtri stato */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0;}
.chip{display:inline-flex;align-items:center;padding:6px 12px;background:var(--sur2);border:1px solid var(--brd);color:var(--mut);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .15s;user-select:none;}
.chip:hover{color:var(--txt);border-color:var(--mut);}
.chip.act{background:rgba(212,255,78,.08);border-color:var(--acc);color:var(--acc);}
.cal-more{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);padding:2px 5px;}

/* Legenda */
.legend{display:flex;flex-wrap:wrap;gap:14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;padding-bottom:10px;}
.legend span.lg{display:flex;align-items:center;gap:5px;}
.swatch{display:inline-block;width:12px;height:12px;border-radius:2px;vertical-align:middle;border:1px solid var(--brd);}

/* KPIs */
.kpis{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.kpi{background:var(--sur);border:1px solid var(--brd);border-radius:4px;padding:12px 15px;flex:1;min-width:120px;}
.kl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:4px;}
.kv{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--txt);}
.ka{color:var(--acc);} .kg{color:var(--grn);} .kb{color:var(--blu);}

/* Toast */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--sur);border:1px solid var(--acc);color:var(--txt);padding:10px 14px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;z-index:9999;animation:tin .2s ease-out;}
.toast.err{border-color:var(--red);}
@keyframes tin{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}

/* Setup screen */
.setup{max-width:560px;margin:80px auto;padding:24px;background:var(--sur);border:1px solid var(--or);border-radius:6px;}
.setup h1{font-size:18px;color:var(--or);margin-bottom:10px;}
.setup p, .setup li{font-family:'DM Mono',monospace;font-size:12px;line-height:1.6;}
.setup code{background:var(--sur2);padding:2px 6px;border-radius:3px;color:var(--acc);}

/* Lista consegne */
.consegne-list{display:flex;flex-direction:column;gap:6px;}
.consegna-row{display:grid;grid-template-columns:24px 1fr 1fr auto;gap:6px;align-items:center;}
.consegna-row .num{background:var(--sur2);border:1px solid var(--brd);border-radius:3px;text-align:center;padding:5px 0;font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);}
.consegna-row input{padding:5px 8px !important;font-size:11px !important;}

/* Multi-select operatori */
/* Multi-select operatori con ricerca */
.util-selected{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:var(--sur2);border:1px solid var(--brd);border-radius:4px 4px 0 0;border-bottom:none;min-height:42px;align-items:center;}
.util-empty{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);font-style:italic;}
.util-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 4px 4px 9px;background:rgba(212,255,78,.1);border:1px solid var(--acc);border-radius:3px;font-family:'Syne',sans-serif;font-size:12px;color:var(--txt);}
.util-pill-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--or);background:rgba(255,107,53,.1);padding:1px 5px;border-radius:2px;}
.util-pill-x{background:transparent;border:none;color:var(--mut);cursor:pointer;font-size:11px;padding:2px 4px;line-height:1;border-radius:2px;transition:all .12s;}
.util-pill-x:hover{color:var(--red);background:rgba(255,78,107,.1);}
.util-dropwrap{display:flex;flex-direction:column;border:1px solid var(--brd);border-top:none;border-radius:0 0 4px 4px;background:var(--sur2);overflow:hidden;}
.util-search{background:var(--sur2);border:none;border-bottom:1px solid var(--brd);color:var(--txt);padding:8px 10px;font-family:'DM Mono',monospace;font-size:11px;outline:none;width:100%;}
.util-search:focus{background:var(--bg);}
.util-droplist{max-height:180px;overflow-y:auto;}
.util-row{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;border-bottom:1px solid var(--brd);user-select:none;transition:background .12s;}
.util-row:last-child{border-bottom:none;}
.util-row:hover{background:var(--hover2);}
.util-row.selected{background:rgba(212,255,78,.06);}
.util-row-chk{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border:1px solid var(--brd);border-radius:2px;font-size:11px;color:var(--bg);background:transparent;font-weight:700;flex-shrink:0;}
.util-row.selected .util-row-chk{background:var(--acc);border-color:var(--acc);color:var(--bg);}
.util-row-name{flex:1;}
.util-row-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--or);background:rgba(255,107,53,.1);padding:1px 5px;border-radius:2px;}
.util-noresult{padding:12px 10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);text-align:center;font-style:italic;}

/* Mobile */
@media(max-width:640px){
  body{padding:14px 10px 40px;}
  .frow{grid-template-columns:1fr;}
  .kpis{flex-direction:column;}
  .cal-cell{min-height:78px;padding:2px;}
  .cal-day-num{font-size:10px;}
  .cal-evt{font-size:9px;padding:2px 3px;}
  .cal-dow{font-size:9px;padding:5px 4px;}
  .navtab{padding:9px 12px;font-size:10px;}
  table.rt th, table.rt td{padding:6px 6px;font-size:11px;}
}
/* ═══════════════════════════════════════════════════════════ */
/* KIOSK MODE                                                   */
/* ═══════════════════════════════════════════════════════════ */
#kiosk-screen{position:fixed;inset:0;background:var(--bg);z-index:9000;display:flex;flex-direction:column;padding:24px 32px;overflow:hidden;}
.kiosk-header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:18px;border-bottom:1px solid var(--brd);margin-bottom:24px;}
.kiosk-title{font-size:32px;font-weight:800;letter-spacing:-.02em;line-height:1;}
.kiosk-title span{color:var(--acc);}
.kiosk-sede{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);margin-top:6px;letter-spacing:.1em;text-transform:uppercase;}
.kiosk-clock{font-family:'DM Mono',monospace;font-size:34px;color:var(--acc);font-weight:500;letter-spacing:-.01em;}
.kiosk-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.kiosk-exit{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);text-decoration:none;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--brd);border-radius:3px;transition:all .15s;}
.kiosk-exit:hover{color:var(--txt);border-color:var(--mut);}
.kiosk-step{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.kiosk-prompt{text-align:center;margin:20px 0 28px;}
.kiosk-prompt-big{font-size:30px;font-weight:700;letter-spacing:-.01em;}
.kiosk-prompt-sub{font-family:'DM Mono',monospace;font-size:13px;color:var(--mut);margin-top:8px;letter-spacing:.08em;}
.kiosk-hidden-input{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;}
.kiosk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;overflow-y:auto;padding:4px;flex:1;align-content:start;}
.kiosk-tile{background:var(--sur);border:2px solid var(--brd);border-radius:8px;padding:18px 14px;cursor:pointer;text-align:center;transition:all .15s;user-select:none;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90px;}
.kiosk-tile:hover,.kiosk-tile:active{border-color:var(--acc);background:rgba(212,255,78,.05);transform:scale(.98);}

/* Tema chiaro/scuro */
function applyTheme(theme) {
  if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else document.documentElement.removeAttribute('data-theme');
  const btn = document.getElementById('btn-theme');
  if (btn) btn.textContent = theme === 'light' ? '☀️' : '🌙';
}
function toggleTheme() {
  const cur = localStorage.getItem('theme') || 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next);
  applyTheme(next);
}
applyTheme(localStorage.getItem('theme') || 'dark');

const TIPO_BADGE = { trasferta:'bok', consegna:'berr', manutenzione:'bor', altro:'bvio' };

const $ = s => document.querySelector(s);
const el = (tag, attrs={}, ...children) => {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'style') e.style.cssText = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function')
      e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (attrs[k] !== false && attrs[k] !== null && attrs[k] !== undefined)
      e.setAttribute(k, attrs[k]);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
};
const z = n => String(n).padStart(2,'0');
const toLocalISO = d => `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;
const parseISODate = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
const monthName = d => d.toLocaleDateString('it-IT', { month:'long', year:'numeric' });
const fmtIT = iso => { const d = parseISODate(iso); return `${z(d.getDate())}/${z(d.getMonth()+1)}/${d.getFullYear()}`; };

function toast(msg, kind='ok') {

async function init() {
  if (SUPABASE_URL.includes('XXXX') || SUPABASE_ANON_KEY.includes('INSERISCI')) {

    await kioskInit();
    return;
  }

  // ─── MODALITÀ NORMALE ───
  const { data: { session } } = await sb.auth.getSession();
  state.session = session;
  if (session) await afterLogin();
  else renderAuth();
  sb.auth.onAuthStateChange(async (_e, sess) => {
    state.session = sess;
    if (sess) await afterLogin();
    else { state.profile = null; renderAuth(); }
  });
}

function renderAuth() {
  $('#app-screen').style.display = 'none';
  const root = $('#auth-screen');
  root.style.display = 'flex';
  let mode = 'login';
  const draw = () => {
    root.innerHTML = '';
    const box = el('div', { class:'auth-box' });
    box.append(
      el('h2', { html:'Cabl<span>otec</span>' }),
      el('div', { class:'auth-sub' }, mode==='login' ? 'Sistema gestionale — accedi' : 'Sistema gestionale — registrati'),
      el('div', { class:'auth-tabs' },
        el('button', { class: mode==='login'?'active':'', onclick:()=>{mode='login';draw();} }, 'Accedi'),
        el('button', { class: mode==='signup'?'active':'', onclick:()=>{mode='signup';draw();} }, 'Registrati'),
      ),
    );
    const form = el('form');
    if (mode === 'signup') {
      form.append(el('div', { class:'field' },
        el('label', {}, 'Nome'),
        el('input', { type:'text', name:'nome', required:'true', placeholder:'Mario Rossi' }),
      ));
    }
    form.append(
      el('div', { class:'field' }, el('label', {}, 'Email'),
        el('input', { type:'email', name:'email', required:'true', autocomplete:'email' })),
      el('div', { class:'field' }, el('label', {}, 'Password'),
        el('input', { type:'password', name:'password', required:'true', minlength:'6',
                      autocomplete: mode==='login'?'current-password':'new-password' })),
      el('button', { type:'submit', class:'btnp', style:'width:100%;padding:11px;margin-top:6px;' },
        mode==='login' ? 'Accedi' : 'Registrati'),
    );
    const msg = el('div', { class:'auth-msg' });
    form.append(msg);
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'auth-msg';
      msg.textContent = 'Attendere…';
      const fd = new FormData(form);
      try {
        if (mode === 'login') {
          const { error } = await sb.auth.signInWithPassword({
            email: fd.get('email'), password: fd.get('password'),
          });
          if (error) throw error;
        } else {
          const { error } = await sb.auth.signUp({
            email: fd.get('email'), password: fd.get('password'),
            options: { data: { nome: fd.get('nome') } },
          });
          if (error) throw error;
          msg.className = 'auth-msg ok';
          msg.textContent = 'Registrazione ok. Se richiesta conferma email, controlla la posta — poi accedi.';
        }
      } catch (err) {
        msg.className = 'auth-msg err';
        msg.textContent = err.message || 'Errore di accesso';
      }
    });
    box.append(form);
    root.append(box);
  };
  draw();
}

    ));
  }
}

  if (document.visibilityState !== 'visible') return;
  if (!sb || !state.profile) return;
  const elapsed = Date.now() - lastVisibilityCheck;

  if (elapsed < 30000) return;
  try {
    await sb.auth.refreshSession();
    await loadAllData();
    renderTab(state.currentTab);
  } catch (e) {
    console.warn('Riconnessione fallita:', e);
  }
});

  try {
    await loadAllData();
    renderTab(state.currentTab);
  } catch (e) { console.warn('Reload online fallito:', e); }
});

async function loadAllData() {
  const [profili, mezzi, operatori, prenotazioni, consegne, prenOp, usiMezzo, clienti, articoli, tipiLav] = await Promise.all([
    sb.from('profili').select('*').order('nome'),
    sb.from('mezzi').select('*').order('nome'),
    sb.from('operatori').select('*').order('nome'),
    sb.from('prenotazioni').select('*').order('data_inizio'),
    sb.from('consegne').select('*').order('ordine'),
    sb.from('prenotazioni_operatori').select('*'),
    sb.from('usi_mezzo').select('*').order('data_uscita'),
    sb.from('clienti').select('*').order('nome'),
    sb.from('articoli').select('*').order('codice'),
    sb.from('tipi_lavorazione').select('*').order('ordine'),
  ]);
  if (profili.error) throw profili.error;
  if (mezzi.error) throw mezzi.error;
  if (operatori.error) throw operatori.error;
  if (prenotazioni.error) throw prenotazioni.error;
  if (consegne.error) throw consegne.error;
  if (prenOp.error) throw prenOp.error;
  if (usiMezzo.error) throw usiMezzo.error;
  if (clienti.error) throw clienti.error;
  if (articoli.error) throw articoli.error;
  if (tipiLav.error) throw tipiLav.error;

  state.profiliById = Object.fromEntries((profili.data||[]).map(p=>[p.id,p]));
  state.mezzi = mezzi.data || [];
  state.operatori = operatori.data || [];
  state.operatoriById = Object.fromEntries(state.operatori.map(u=>[u.id,u]));
  state.prenotazioni = prenotazioni.data || [];
  state.consegne = consegne.data || [];
  state.prenOp = prenOp.data || [];
  state.usiMezzo = usiMezzo.data || [];
  state.clienti = clienti.data || [];
  state.articoli = articoli.data || [];
  state.tipiLav = tipiLav.data || [];
}

// Realtime: ascolto le modifiche su tutte le tabelle e tengo gli array sincronizzati
let realtimeChannel = null;
function startRealtime() {
  if (realtimeChannel) return; // già attivo
  realtimeChannel = sb.channel('app-changes')
    .on('postgres_changes', { event:'*', schema:'public', table:'prenotazioni' },
        (p) => applyChange('prenotazioni', p))
    .on('postgres_changes', { event:'*', schema:'public', table:'mezzi' },
        (p) => applyChange('mezzi', p))
    .on('postgres_changes', { event:'*', schema:'public', table:'operatori' },
        (p) => applyChange('operatori', p))
    .on('postgres_changes', { event:'*', schema:'public', table:'profili' },
        (p) => applyChange('profili', p))
    .on('postgres_changes', { event:'*', schema:'public', table:'consegne' },
        (p) => applyChange('consegne', p))
    .on('postgres_changes', { event:'*', schema:'public', table:'prenotazioni_operatori' },
        (p) => applyChange('prenotazioni_operatori', p))
    .on('postgres_changes', { event:'*', schema:'public', table:'usi_mezzo' },
        (p) => applyChange('usi_mezzo', p))
    .on('postgres_changes', { event:'*', schema:'public', table:'clienti' },
        (p) => applyChange('clienti', p))
    .on('postgres_changes', { event:'*', schema:'public', table:'articoli' },
        (p) => applyChange('articoli', p))
    .on('postgres_changes', { event:'*', schema:'public', table:'tipi_lavorazione' },
        (p) => applyChange('tipi_lavorazione', p))
    .subscribe();
}

function applyChange(tabella, payload) {
  const ev = payload.eventType;
  const row = payload.new;
  const oldRow = payload.old;

  if (tabella === 'prenotazioni') {
    if (ev === 'INSERT') {
      if (!state.prenotazioni.find(x => x.id === row.id)) state.prenotazioni.push(row);
    } else if (ev === 'UPDATE') state.prenotazioni = state.prenotazioni.map(x => x.id === row.id ? row : x);
    else if (ev === 'DELETE') state.prenotazioni = state.prenotazioni.filter(x => x.id !== oldRow.id);
  } else if (tabella === 'mezzi') {
    if (ev === 'INSERT') {
      if (!state.mezzi.find(x => x.id === row.id)) state.mezzi.push(row);
    } else if (ev === 'UPDATE') state.mezzi = state.mezzi.map(x => x.id === row.id ? row : x);
    else if (ev === 'DELETE') state.mezzi = state.mezzi.filter(x => x.id !== oldRow.id);
  } else if (tabella === 'operatori') {
    if (ev === 'INSERT') {
      if (!state.operatori.find(x => x.id === row.id)) state.operatori.push(row);
      state.operatoriById[row.id] = row;
    } else if (ev === 'UPDATE') {
      state.operatori = state.operatori.map(x => x.id === row.id ? row : x);
      state.operatoriById[row.id] = row;
    } else if (ev === 'DELETE') {
      state.operatori = state.operatori.filter(x => x.id !== oldRow.id);
      delete state.operatoriById[oldRow.id];
    }
  } else if (tabella === 'profili') {
    if (ev === 'INSERT' || ev === 'UPDATE') state.profiliById[row.id] = row;
    else if (ev === 'DELETE') delete state.profiliById[oldRow.id];
  } else if (tabella === 'consegne') {
    if (ev === 'INSERT') {
      if (!state.consegne.find(x => x.id === row.id)) state.consegne.push(row);
    } else if (ev === 'UPDATE') state.consegne = state.consegne.map(x => x.id === row.id ? row : x);
    else if (ev === 'DELETE') state.consegne = state.consegne.filter(x => x.id !== oldRow.id);
  } else if (tabella === 'prenotazioni_operatori') {
    if (ev === 'INSERT') {
      const dup = state.prenOp.find(x =>
        x.prenotazione_id === row.prenotazione_id && x.operatore_id === row.operatore_id);
      if (!dup) state.prenOp.push(row);
    } else if (ev === 'DELETE') state.prenOp = state.prenOp.filter(x =>
      !(x.prenotazione_id === oldRow.prenotazione_id && x.operatore_id === oldRow.operatore_id));
  } else if (tabella === 'usi_mezzo') {
    if (ev === 'INSERT') {
      if (!state.usiMezzo.find(x => x.id === row.id)) state.usiMezzo.push(row);
    } else if (ev === 'UPDATE') {
      state.usiMezzo = state.usiMezzo.map(x => x.id === row.id ? row : x);
    } else if (ev === 'DELETE') {
      state.usiMezzo = state.usiMezzo.filter(x => x.id !== oldRow.id);
    }
  } else if (tabella === 'clienti') {
    if (ev === 'INSERT') {
      if (!state.clienti.find(x => x.id === row.id)) state.clienti.push(row);
    } else if (ev === 'UPDATE') {
      state.clienti = state.clienti.map(x => x.id === row.id ? row : x);
    } else if (ev === 'DELETE') {
      state.clienti = state.clienti.filter(x => x.id !== oldRow.id);
    }
  } else if (tabella === 'articoli') {
    if (ev === 'INSERT') {
      if (!state.articoli.find(x => x.id === row.id)) state.articoli.push(row);
    } else if (ev === 'UPDATE') {
      state.articoli = state.articoli.map(x => x.id === row.id ? row : x);
    } else if (ev === 'DELETE') {
      state.articoli = state.articoli.filter(x => x.id !== oldRow.id);
    }
  } else if (tabella === 'tipi_lavorazione') {
    if (ev === 'INSERT') {
      if (!state.tipiLav.find(x => x.id === row.id)) state.tipiLav.push(row);
    } else if (ev === 'UPDATE') {
      state.tipiLav = state.tipiLav.map(x => x.id === row.id ? row : x);
    } else if (ev === 'DELETE') {
      state.tipiLav = state.tipiLav.filter(x => x.id !== oldRow.id);
    }
  }

  // Re-render solo la tab attiva
  if (state.loaded) renderTab(state.currentTab);
}

function loadPrenotazioneOperatori(prenId) {
  // Legge dalla cache in memoria (sync)
  return state.prenOp.filter(r => r.prenotazione_id === prenId).map(r => r.operatore_id);
}

// Verifica sovrapposizioni dalla cache in memoria (no fetch)
function checkSovrapposizioni(mezzoId, dataInizio, dataFine, escludiId) {
  return state.prenotazioni.filter(p => {
    if (p.mezzo_id !== mezzoId) return false;
    if (escludiId && p.id === escludiId) return false;
    return p.data_inizio <= dataFine && p.data_fine >= dataInizio;
  });
}

function bindTabs() {
  // Click sulla macro-area: mostra le sotto-tab e attiva la prima accessibile
  $('#tabs-macro').querySelectorAll('button').forEach(b => {
    b.onclick = () => {
      selectArea(b.dataset.area);
    };
  });
  // All'avvio, seleziono la macro-area "Mezzi"
  selectArea('mezzi');
}

function selectArea(areaId) {
  state.currentArea = areaId;
  // Aggiorna stato visivo macro-area
  $('#tabs-macro').querySelectorAll('button').forEach(b => {
    b.classList.toggle('active', b.dataset.area === areaId);
  });
  // Genera le sotto-tab
  const area = TAB_STRUCTURE[areaId];
  if (!area) return;
  const isAdmin = state.profile?.ruolo === 'admin';
  const sub = $('#tabs');
  sub.innerHTML = '';
  area.tabs.forEach(t => {
    if (t.adminOnly && !isAdmin) return;
    const btn = el('button', {
      class: 'navtab',
      'data-tab': t.id,
      onclick: () => selectTab(t.id),
    }, t.label);
    sub.appendChild(btn);
  });
  // Attiva la prima sotto-tab disponibile
  const firstBtn = sub.querySelector('button');
  if (firstBtn) selectTab(firstBtn.dataset.tab);
}

function selectTab(tabId) {
  $('#tabs').querySelectorAll('button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabId);
  });
  renderTab(tabId);
}

// renderTab ora è SINCRONO: legge solo dalla cache in memoria
function renderTab(name) {
  state.currentTab = name;
  const root = $('#tab-content');
  if (!state.loaded) { root.innerHTML = '<div class="empty">Caricamento…</div>'; return; }
  try {
    if (name === 'calendario')        renderCalendar(root);
    else if (name === 'elenco')       renderElenco(root);
    else if (name === 'mezzi')        renderMezzi(root);
    else if (name === 'clienti')      renderClienti(root);
    else if (name === 'articoli')     renderArticoli(root);
    else if (name === 'tipi_lav')     renderTipiLavorazione(root);
    else if (name === 'operatori')    renderOperatori(root);
    else if (name === 'pianificazione') renderPlaceholder(root, 'Pianificazione',
      'Gestione operazioni: OP, ordine, codice, descrizione, cliente, quantità, scadenza, data inizio.',
      'Step 2.7');
    else if (name === 'storico') renderPlaceholder(root, 'Storico',
      'Operazioni consegnate, con KPI: % puntualità, ritardi, NC post-consegna.',
      'Step 2.8');
    else if (name === 'gantt') renderPlaceholder(root, 'Gantt occupazione',
      'Vista live: chi sta facendo cosa adesso. Vista storico: timeline settimana/mese.',
      'Step 4-5');
    else if (name === 'chiusure') renderPlaceholder(root, 'Chiusure aziendali',
      'Festività aziendali e ponti, usate per calcolare le date inizio operazioni.',
      'Step 2.6');
  } catch (e) {
    console.error('Errore rendering tab '+name+':', e);
    root.innerHTML = '';
    root.append(el('div', { class:'empty', style:'color:var(--red);' },
      el('div', { style:'margin-bottom:10px;' }, '⚠ Errore: '+(e.message||'sconosciuto')),
      el('button', { class:'btnp', onclick:()=>renderTab(name) }, 'Riprova'),
    ));
  }
}

function renderCalendar(root) {
  const cur = state.calCursor;
  const first = new Date(cur.getFullYear(), cur.getMonth(), 1);
  const last  = new Date(cur.getFullYear(), cur.getMonth()+1, 0);
  const startGrid = new Date(first);
  startGrid.setDate(first.getDate() - ((first.getDay()+6)%7));
  const endGrid = new Date(last);
  endGrid.setDate(last.getDate() + (6 - ((last.getDay()+6)%7)));

  const startISO = toLocalISO(startGrid);
  const endISO = toLocalISO(endGrid);
  const todayISO = toLocalISO(new Date());

  // Filtro le prenotazioni della cache che intersecano la griglia
  const prenInRange = state.prenotazioni.filter(p =>
    p.data_inizio <= endISO && p.data_fine >= startISO
  );
  // Filtro gli usi mezzo che intersecano la griglia
  // - aperti (data_rientro = null): visualizzati da data_uscita fino ad oggi
  // - chiusi: visualizzati da data_uscita a data_rientro
  const usiInRange = state.usiMezzo.filter(u => {
    const usoStart = u.data_uscita.substring(0, 10);
    const usoEnd = u.data_rientro ? u.data_rientro.substring(0, 10) : todayISO;
    return usoStart <= endISO && usoEnd >= startISO;
  });
  const mezziById = Object.fromEntries(state.mezzi.map(m=>[m.id,m]));

  // Costruisco indice giorno → array di entries
  // entry = { kind:'pren', data:p } oppure { kind:'uso', data:u, aperto:bool }
  const byDay = {};
  for (const p of prenInRange) {
    const a = parseISODate(p.data_inizio), b = parseISODate(p.data_fine);
    for (let d = new Date(a); d <= b; d.setDate(d.getDate()+1)) {
      const k = toLocalISO(d);
      (byDay[k] = byDay[k] || []).push({ kind:'pren', data:p });
    }
  }
  for (const u of usiInRange) {
    const a = parseISODate(u.data_uscita.substring(0, 10));
    const b = u.data_rientro
      ? parseISODate(u.data_rientro.substring(0, 10))
      : parseISODate(todayISO);
    for (let d = new Date(a); d <= b; d.setDate(d.getDate()+1)) {
      const k = toLocalISO(d);
      (byDay[k] = byDay[k] || []).push({ kind:'uso', data:u, aperto: !u.data_rientro });
    }
  }

  root.innerHTML = '';
  root.append(el('div', { class:'cal-head' },
    el('button', { class:'btng', onclick:()=>{ state.calCursor = new Date(cur.getFullYear(),cur.getMonth()-1,1); renderTab('calendario'); }}, '← Prec'),
    el('button', { class:'btng', onclick:()=>{ state.calCursor = new Date(); renderTab('calendario'); }}, 'Oggi'),
    el('button', { class:'btng', onclick:()=>{ state.calCursor = new Date(cur.getFullYear(),cur.getMonth()+1,1); renderTab('calendario'); }}, 'Succ →'),
    el('h2', { style:'flex:1' }, monthName(cur)),
    el('button', { class:'btnp', onclick:()=>openPrenotazioneModal() }, '+ Nuova Prenotazione'),
  ));

  const legend = el('div', { class:'legend' });
  TIPI.forEach(t => legend.append(el('span', { class:'lg' },
    el('span', { class:'swatch', style:`background:${t.color}` }), t.label
  )));
  // Legenda usi mezzo
  legend.append(el('span', { class:'lg' },
    el('span', { class:'swatch swatch-uso-aperto' }), 'Uso in corso'));
  legend.append(el('span', { class:'lg' },
    el('span', { class:'swatch swatch-uso-chiuso' }), 'Uso chiuso'));
  root.append(legend);

  const grid = el('div', { class:'cal-grid' });
  ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].forEach(d => grid.append(el('div', { class:'cal-dow' }, d)));

  for (let d = new Date(startGrid); d <= endGrid; d.setDate(d.getDate()+1)) {
    const iso = toLocalISO(d);
    const inMonth = d.getMonth() === cur.getMonth();
    const dow = (d.getDay()+6)%7;
    const isWeekend = dow >= 5;
    const cls = ['cal-cell'];
    if (!inMonth) cls.push('other');
    if (iso === todayISO) cls.push('today');
    if (isWeekend) cls.push('weekend');
    const cell = el('div', {
      class: cls.join(' '),
      onclick: (e) => {
        if (e.target.closest('.cal-evt')) return;
        openPrenotazioneModal({ data_inizio: iso, data_fine: iso });
      }
    });
    cell.append(el('div', { class:'cal-day-num' }, String(d.getDate())));
    const evs = byDay[iso] || [];
    const max = window.innerWidth < 640 ? 2 : 3;
    const box = el('div', { class:'cal-events' });
    evs.slice(0, max).forEach(entry => {
      if (entry.kind === 'pren') {
        const p = entry.data;
        const m = mezziById[p.mezzo_id];
        const u = state.profiliById[p.utente_id];
        const autore = u?.nome || u?.email || '?';
        const color = TIPO_COLOR[p.tipo] || '#6b6b64';
        const utilNomi = state.prenOp
          .filter(r => r.prenotazione_id === p.id)
          .map(r => state.operatoriById[r.operatore_id]?.nome)
          .filter(Boolean);
        const utilLbl = utilNomi.length ? utilNomi.join(', ') : '—';
        box.append(el('div', {
          class: 'cal-evt',
          style: `border-left-color:${color}`,
          title: `Mezzo: ${m?.nome || '—'}\nOperatori: ${utilLbl}\nTipo: ${p.tipo}\nCreata da: ${autore}`,
          onclick: (e) => { e.stopPropagation(); openPrenotazioneModal(p); }
        }, `${m?.nome || '?'} · ${utilLbl}`));
      } else {
        // entry.kind === 'uso'
        const u = entry.data;
        const m = mezziById[u.mezzo_id];
        const utz = state.operatoriById[u.operatore_id];
        const oraUscita = new Date(u.data_uscita);
        const oraRientro = u.data_rientro ? new Date(u.data_rientro) : null;
        const titleParts = [
          `Mezzo: ${m?.nome || '—'}${m?.targa ? ' · '+m.targa : ''}`,
          `Operatore: ${utz?.nome || '—'}`,
          `Uscita: ${fmtIT(oraUscita.toISOString().substring(0,10))} ${z(oraUscita.getHours())}:${z(oraUscita.getMinutes())}`,
        ];
        if (oraRientro) titleParts.push(
          `Rientro: ${fmtIT(oraRientro.toISOString().substring(0,10))} ${z(oraRientro.getHours())}:${z(oraRientro.getMinutes())}`);
        else titleParts.push('Rientro: in corso');
        if (u.sede) titleParts.push(`Sede: ${u.sede}`);
        const evtCls = 'cal-evt cal-uso' + (entry.aperto ? ' cal-uso-aperto' : ' cal-uso-chiuso');
        const lbl = (m?.nome || '?') + ' · ' + (utz?.nome || '?') + (entry.aperto ? ' ⏱' : '');
        box.append(el('div', {
          class: evtCls,
          title: titleParts.join('\n'),
          onclick: (e) => { e.stopPropagation(); openUsoMezzoModal(u); }
        }, lbl));
      }
    });
    if (evs.length > max) {
      box.append(el('div', {
        class:'cal-more',
        onclick: (e) => { e.stopPropagation(); openDayDetailModal(iso, evs); },
      }, `+${evs.length - max} altri`));
    }
    cell.append(box);
    grid.append(cell);
  }
  root.append(grid);
}

  root.append(tw);
}

function renderMezzi(root) {
  const isAdmin = state.profile.ruolo === 'admin';

  // Statistiche operatori ultimi 6 mesi dalla cache
  const oggi = new Date();
  const seiMesiFa = toLocalISO(new Date(oggi.getFullYear(), oggi.getMonth()-6, oggi.getDate()));
  const prenList = state.prenotazioni.filter(p => p.data_fine >= seiMesiFa);

  // Indice pivot per pren_id → array di operatore_id (dalla cache)
  const pivotByPren = {};
  state.prenOp.forEach(r => {
    (pivotByPren[r.prenotazione_id] = pivotByPren[r.prenotazione_id] || []).push(r.operatore_id);
  });

  // Per ogni mezzo: operatori distinti + conteggio
  const statsByMezzo = {};
  prenList.forEach(p => {
    if (!statsByMezzo[p.mezzo_id]) statsByMezzo[p.mezzo_id] = { operatori: {}, totale: 0 };
    const s = statsByMezzo[p.mezzo_id];
    s.totale++;
    const utils = pivotByPren[p.id] || [];
    utils.forEach(uid => {
      s.operatori[uid] = (s.operatori[uid] || 0) + 1;
    });
  });

  root.innerHTML = '';
  root.append(el('div', { class:'toolbar' },
    el('h2', {}, 'Mezzi aziendali'),
    isAdmin ? el('button', { class:'btnp', onclick:()=>openMezzoModal() }, '+ Nuovo Mezzo') : null,
  ));
  if (state.mezzi.length === 0) {
    root.append(el('div', { class:'empty' }, isAdmin ? 'Nessun mezzo. Aggiungi il primo!' : 'Nessun mezzo configurato.'));
    return;
  }
  const tw = el('div', { class:'tw' });
  const tbl = el('table', { class:'rt' });
  tbl.append(el('thead', {}, el('tr', {},
    el('th', {}, ''), el('th', {}, 'Nome'), el('th', {}, 'Targa'), el('th', {}, 'Tipo'),
    el('th', {}, 'Stato'),
    el('th', {}, 'Operatori (ultimi 6 mesi)'),
    el('th', { class:'tc' }, 'Pren.'),
    isAdmin ? el('th', { class:'tc' }, 'Azioni') : null,
  )));
  const tb = el('tbody');
  state.mezzi.forEach(m => {
    const stats = statsByMezzo[m.id] || { operatori:{}, totale:0 };
    const utentiOrdinati = Object.entries(stats.operatori)
      .sort((a,b) => b[1] - a[1])
      .map(([uid, count]) => {
        const u = state.operatoriById[uid];
        const nome = u?.nome || '?';
        return `${nome} (${count})`;
      });
    const utentiCell = utentiOrdinati.length === 0
      ? el('span', { class:'sub' }, '—')
      : el('div', { style:'display:flex;flex-wrap:wrap;gap:4px;' },
          ...utentiOrdinati.map(u => el('span', { class:'badge bgry', style:'font-size:10px;' }, u))
        );

    tb.append(el('tr', {},
      el('td', {}, el('span', { class:'swatch', style:`background:${m.colore||'#4eb8ff'}` })),
      el('td', {}, el('span', { class:'cod-cell' }, m.nome)),
      el('td', { class:'mono' }, m.targa || '—'),
      el('td', { class:'mono' }, m.tipo || '—'),
      el('td', {}, m.attivo ? el('span', { class:'badge bok' }, 'attivo') : el('span', { class:'badge bgry' }, 'disattivo')),
      el('td', {}, utentiCell),
      el('td', { class:'tc mono' }, String(stats.totale)),
      isAdmin ? el('td', { class:'tc' },
        el('button', { class:'btnsm', onclick:()=>openMezzoModal(m) }, 'Modifica'),
        ' ',
        el('button', { class:'btnd', onclick:()=>deleteMezzo(m) }, 'Elimina'),
      ) : null,
    ));
  });
  tbl.append(tb);
  tw.append(tbl);
  root.append(tw);
}

async function deleteMezzo(m) {
  if (!confirm(`Eliminare il mezzo "${m.nome}"?\nTutte le sue prenotazioni saranno cancellate.`)) return;
  const { error } = await sb.from('mezzi').delete().eq('id', m.id);
  if (error) return toast(error.message, 'err');
  // Aggiorna subito la cache locale
  state.mezzi = state.mezzi.filter(x => x.id !== m.id);
  // Le prenotazioni del mezzo vengono cancellate a cascata dal DB
  const prenIdsRimosse = state.prenotazioni.filter(p => p.mezzo_id === m.id).map(p => p.id);
  state.prenotazioni = state.prenotazioni.filter(p => p.mezzo_id !== m.id);
  state.consegne = state.consegne.filter(c => !prenIdsRimosse.includes(c.prenotazione_id));
  state.prenOp = state.prenOp.filter(r => !prenIdsRimosse.includes(r.prenotazione_id));
  toast('Mezzo eliminato'); renderTab('mezzi');
}

function openOperatoreModal(u) {
  const isNew = !u;
  u = u || { nome:'', numero_badge:'', email:'', account_id:null, attivo:true, esterno:false, note:'' };
  const accountsLiberi = Object.values(state.profiliById)
    .filter(p => !isKioskRecord(p))
    .filter(p => !state.operatori.find(x => x.account_id === p.id && x.id !== u.id));

  const modal = el('div', { class:'modal' });
  modal.append(el('div', { class:'mhd' },
    el('h2', {}, isNew ? 'Nuovo Operatore' : 'Modifica Operatore'),
    el('button', { class:'mclose', onclick:closeModal }, '✕'),
  ));
  const body = el('div', { class:'mbody' });
  const form = el('form');

  const selAccount = el('select', { name:'account_id' },
    el('option', { value:'' }, '— nessuno —'),
    ...accountsLiberi.map(p => el('option', { value:p.id }, `${p.nome} (${p.email})`)),
  );
  if (u.account_id) selAccount.value = u.account_id;

  form.append(
    el('div', { class:'field' }, el('label', {}, 'Nome *'),
      el('input', { type:'text', name:'nome', required:'true', value:u.nome })),
    el('div', { class:'frow' },
      el('div', { class:'field' }, el('label', {}, 'Numero Badge NFC'),
        el('input', { type:'text', name:'numero_badge', value:u.numero_badge||'',
                      placeholder:'es. 0001234567' })),
      el('div', { class:'field' }, el('label', {}, 'Email (opz.)'),
        el('input', { type:'email', name:'email', value:u.email||'',
                      placeholder:'mario@azienda.it' })),
    ),
    el('div', { class:'field' }, el('label', {}, 'Account login collegato (opz.)'),
      selAccount,
      el('div', { class:'sub', style:'margin-top:4px;' },
        'Collega questo operatore a un account login, se ne ha uno.')),
    el('div', { class:'field' }, el('label', {}, 'Note (opz.)'),
      el('textarea', { name:'note', rows:'2' }, u.note||'')),
    el('div', { class:'frow' },
      el('div', { class:'field' }, el('label', {}, 'Tipo'), (() => {
        const s = el('select', { name:'esterno' },
          el('option', { value:'false' }, 'Interno (Cablotec)'),
          el('option', { value:'true' }, 'Esterno (collaboratore)'));
        s.value = String(!!u.esterno); return s;
      })()),
      el('div', { class:'field' }, el('label', {}, 'Stato'), (() => {
        const s = el('select', { name:'attivo' },
          el('option', { value:'true' }, 'Attivo'),
          el('option', { value:'false' }, 'Disattivato'));
        s.value = String(!!u.attivo); return s;
      })()),
    ),
  );
  body.append(form);
  modal.append(body);
  modal.append(el('div', { class:'mfoot' },
    el('button', { class:'btng', onclick:closeModal }, 'Annulla'),
    el('button', { class:'btnp', onclick: async () => {
      const fd = new FormData(form);
      const payload = {
        nome: (fd.get('nome')||'').trim(),
        numero_badge: (fd.get('numero_badge')||'').trim() || null,
        email: (fd.get('email')||'').trim() || null,
        account_id: fd.get('account_id') || null,
        note: (fd.get('note')||'').trim() || null,
        attivo: fd.get('attivo') === 'true',
        esterno: fd.get('esterno') === 'true',
      };
      if (!payload.nome) return toast('Nome obbligatorio', 'err');
      const q = isNew
        ? sb.from('operatori').insert(payload).select().single()
        : sb.from('operatori').update(payload).eq('id', u.id).select().single();
      const { data, error } = await q;
      if (error) {
        if (error.message.includes('operatori_badge_uniq')) return toast('Numero badge già in uso', 'err');
        if (error.message.includes('operatori_email_uniq')) return toast('Email già in uso', 'err');
        if (error.message.includes('operatori_account_uniq')) return toast('Account già collegato a un altro operatore', 'err');
        return toast(error.message, 'err');
      }
      // Aggiorna cache locale
      if (isNew) state.operatori.push(data);
      else state.operatori = state.operatori.map(x => x.id === u.id ? data : x);
      state.operatoriById[data.id] = data;
      toast(isNew ? 'Operatore creato' : 'Operatore aggiornato');
      closeModal(); renderTab('operatori');
    }}, 'Salva'),
  ));
  openModal(modal);
}

function renderClienti(root) {
  const isAdmin = state.profile?.ruolo === 'admin';
  const search = (state.cliSearch || '').toLowerCase();
  const filter = state.cliFilter || 'attivi';

  let list = state.clienti;
  if (filter === 'attivi')    list = list.filter(c => c.attivo);
  else if (filter === 'disattivi') list = list.filter(c => !c.attivo);
  if (search) {
    list = list.filter(c =>
      (c.nome||'').toLowerCase().includes(search) ||
      (c.ragione_sociale||'').toLowerCase().includes(search) ||
      (c.referente||'').toLowerCase().includes(search) ||
      (c.p_iva||'').toLowerCase().includes(search)
    );
  }
  list = list.slice().sort((a,b) => (a.nome||'').localeCompare(b.nome||''));

  // KPI
  const tot = state.clienti.length;
  const attivi = state.clienti.filter(c => c.attivo).length;
  const disattivi = tot - attivi;

  root.innerHTML = '';
  root.append(el('div', { class:'kpis' },
    el('div', { class:'kpi' }, el('div', { class:'kl' }, 'Totale'), el('div', { class:'kv ka' }, String(tot))),
    el('div', { class:'kpi' }, el('div', { class:'kl' }, 'Attivi'), el('div', { class:'kv kg' }, String(attivi))),
    el('div', { class:'kpi' }, el('div', { class:'kl' }, 'Disattivati'), el('div', { class:'kv' }, String(disattivi))),
  ));

  // Chips filtro
  const chips = el('div', { class:'chips' });
  [
    { id:'all',       label:'Tutti' },
    { id:'attivi',    label:'Attivi' },
    { id:'disattivi', label:'Disattivati' },
  ].forEach(opt => {
    chips.append(el('div', {
      class: 'chip' + (filter === opt.id ? ' act' : ''),
      onclick: () => { state.cliFilter = opt.id; renderTab('clienti'); }
    }, opt.label));
  });
  root.append(chips);

  // Toolbar
  const toolbar = el('div', { class:'toolbar' },
    el('h2', {}, 'Clienti'),
    el('input', {
      type:'text', class:'search',
      placeholder:'Cerca per nome, ragione sociale, P.IVA, referente…',
      value: state.cliSearch || '',
      oninput: (e) => { state.cliSearch = e.target.value; renderTab('clienti'); }
    }),
  );
  if (isAdmin) {
    toolbar.append(
      el('label', { class:'btng', style:'position:relative;cursor:pointer;' },
        '⬆ Importa Excel',
        el('input', {
          type:'file', accept:'.xlsx,.xls',
          style:'position:absolute;inset:0;opacity:0;cursor:pointer;',
          onchange: (e) => clientiImportExcel(e.target.files[0]),
        }),
      ),
      el('button', { class:'btng', onclick:clientiExportExcel }, '⬇ Esporta Excel'),
      el('button', { class:'btnp', onclick:()=>openClienteModal() }, '+ Nuovo Cliente'),
    );
  }
  root.append(toolbar);

  if (list.length === 0) {
    root.append(el('div', { class:'empty' },
      state.clienti.length === 0
        ? 'Nessun cliente. Importa un Excel o creane uno nuovo.'
        : 'Nessun cliente corrisponde ai filtri.'
    ));
    return;
  }

  // Tabella
  const tw = el('div', { class:'tw' });
  const tbl = el('table', { class:'rt' });
  tbl.append(el('thead', {}, el('tr', {},
    el('th', {}, 'Nome'),
    el('th', {}, 'Ragione sociale'),
    el('th', {}, 'P. IVA'),
    el('th', {}, 'Referente'),
    el('th', {}, 'Telefono'),
    el('th', { class:'tc' }, 'Stato'),
    el('th', { class:'tc' }, 'Azioni'),
  )));
  const tb = el('tbody');
  list.forEach(c => {
    tb.append(el('tr', {},
      el('td', {}, c.nome || '—'),
      el('td', { style:'color:var(--mut);font-size:11px;' }, c.ragione_sociale || ''),
      el('td', { class:'mono', style:'font-size:11px;' }, c.p_iva || ''),
      el('td', {}, c.referente || ''),

      el('td', { class:'tc' }, c.attivo
        ? el('span', { class:'badge bok' }, 'attivo')
        : el('span', { class:'badge bgry' }, 'disatt.')),
      el('td', { class:'tc' },
        isAdmin
          ? el('span', {},
              el('button', { class:'btnsm', onclick:()=>openClienteModal(c) }, 'Modifica'),
              ' ',
              el('button', { class:'btnd', onclick:()=>deleteCliente(c) }, 'Elimina'),

function openClienteModal(c) {
  const isNew = !c;
  const isAdmin = state.profile?.ruolo === 'admin';
  c = c || { nome:'', ragione_sociale:'', indirizzo:'', p_iva:'', referente:'', email:'', telefono:'', note:'', attivo:true };
  const readonly = !isAdmin;

  const modal = el('div', { class:'modal' });
  modal.append(el('div', { class:'mhd' },
    el('h2', {}, isNew ? 'Nuovo Cliente' : (readonly ? 'Cliente' : 'Modifica Cliente')),
    el('button', { class:'mclose', onclick:closeModal }, '✕'),
  ));

  const body = el('div', { class:'mbody' });
  const form = el('form');

  const inNome = el('input', { type:'text', name:'nome', value:c.nome||'', required:'true' });
  const inRagSoc = el('input', { type:'text', name:'ragione_sociale', value:c.ragione_sociale||'' });
  const inIndirizzo = el('input', { type:'text', name:'indirizzo', value:c.indirizzo||'' });
  const inPIva = el('input', { type:'text', name:'p_iva', value:c.p_iva||'' });
  const inReferente = el('input', { type:'text', name:'referente', value:c.referente||'' });
  const inEmail = el('input', { type:'email', name:'email', value:c.email||'' });
  const inTelefono = el('input', { type:'text', name:'telefono', value:c.telefono||'' });
  const inNote = el('textarea', { name:'note', rows:'2' }, c.note || '');
  const selAttivo = el('select', { name:'attivo' },
    el('option', { value:'true' }, 'Attivo'),
    el('option', { value:'false' }, 'Disattivato'));
  selAttivo.value = String(!!c.attivo);

  if (readonly) {
    [inNome, inRagSoc, inIndirizzo, inPIva, inReferente, inEmail, inTelefono, inNote, selAttivo]
      .forEach(i => i.disabled = true);
  }

  form.append(
    el('div', { class:'field' }, el('label', {}, 'Nome breve *'), inNome,
      el('div', { class:'sub', style:'margin-top:4px;' },
        'Es. "TEMA SINERGIE" — usato come identificativo veloce nelle operazioni.')),
    el('div', { class:'field' }, el('label', {}, 'Ragione sociale completa'), inRagSoc),
    el('div', { class:'frow' },
      el('div', { class:'field' }, el('label', {}, 'P. IVA / C.F.'), inPIva),
      el('div', { class:'field' }, el('label', {}, 'Stato'), selAttivo),
    ),
    el('div', { class:'field' }, el('label', {}, 'Indirizzo'), inIndirizzo),
    el('div', { class:'frow' },
      el('div', { class:'field' }, el('label', {}, 'Referente'), inReferente),
      el('div', { class:'field' }, el('label', {}, 'Telefono'), inTelefono),
    ),
    el('div', { class:'field' }, el('label', {}, 'Email'), inEmail),
    el('div', { class:'field' }, el('label', {}, 'Note'), inNote),
  );

  body.append(form);
  modal.append(body);

  const foot = el('div', { class:'mfoot' });
  foot.append(el('button', { class:'btng', onclick:closeModal }, 'Chiudi'));
  if (isAdmin) {
    const btnSave = el('button', { class:'btnp' }, 'Salva');
    btnSave.onclick = async () => {
      const fd = new FormData(form);
      const payload = {
        nome: (fd.get('nome')||'').trim(),
        ragione_sociale: (fd.get('ragione_sociale')||'').trim() || null,
        indirizzo: (fd.get('indirizzo')||'').trim() || null,
        p_iva: (fd.get('p_iva')||'').trim() || null,
        referente: (fd.get('referente')||'').trim() || null,
        email: (fd.get('email')||'').trim() || null,
        telefono: (fd.get('telefono')||'').trim() || null,
        note: (fd.get('note')||'').trim() || null,
        attivo: fd.get('attivo') === 'true',
      };
      if (!payload.nome) return toast('Nome obbligatorio', 'err');
      btnSave.disabled = true;
      btnSave.textContent = 'Salvataggio…';
      try {
        const q = isNew
          ? sb.from('clienti').insert(payload).select().single()
          : sb.from('clienti').update(payload).eq('id', c.id).select().single();
        const { data, error } = await q;
        if (error) {
          btnSave.disabled = false;
          btnSave.textContent = 'Salva';
          if (error.code === '23505') return toast('Nome cliente già esistente', 'err');
          return toast(error.message, 'err');
        }
        if (isNew) {
          if (!state.clienti.find(x => x.id === data.id)) state.clienti.push(data);
        } else {
          state.clienti = state.clienti.map(x => x.id === c.id ? data : x);
        }
        toast(isNew ? 'Cliente creato' : 'Cliente aggiornato');
        closeModal(); renderTab('clienti');
      } catch (e) {
        btnSave.disabled = false;
        btnSave.textContent = 'Salva';
        toast('Errore di rete: '+(e.message||e), 'err');
      }
    };
    foot.append(btnSave);
  }
  modal.append(foot);
  openModal(modal);
}

async function deleteCliente(c) {
  if (!confirm(`Eliminare il cliente "${c.nome}"?\nNon sarà possibile se ha operazioni associate.`)) return;
  const { data, error } = await sb.from('clienti').delete().eq('id', c.id).select();
  if (error) {
    if (error.code === '23503') return toast('Impossibile: ci sono operazioni legate a questo cliente', 'err');
    return toast(error.message, 'err');
  }
  if (!data || data.length === 0) {
    return toast('Eliminazione bloccata: verifica le policy DELETE su clienti', 'err');
  }
  state.clienti = state.clienti.filter(x => x.id !== c.id);
  toast('Cliente eliminato'); renderTab('clienti');
}

// ─── Import Excel ───
async function clientiImportExcel(file) {
  if (!file) return;
  if (typeof XLSX === 'undefined') {
    toast('Libreria Excel non caricata, ricarica la pagina', 'err');
    return;
  }
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type:'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval:'', raw:false });
    if (!rows.length) { toast('File vuoto', 'err'); return; }
    openClientiImportPreviewModal(rows);
  } catch (e) {
    toast('Errore lettura file: '+(e.message||e), 'err');
  }
}

async function clientiImportEsegui(nuovi, aggiornamenti) {
  closeModal();
  let okIns = 0, errIns = 0, okUpd = 0, errUpd = 0;

  if (nuovi.length) {
    const batch = nuovi.map(p => ({
      nome: p.nome, ragione_sociale: p.ragione_sociale, indirizzo: p.indirizzo,
      p_iva: p.p_iva, referente: p.referente, email: p.email,
      telefono: p.telefono, note: p.note,
    }));
    const { data, error } = await sb.from('clienti').insert(batch).select();
    if (error) {
      errIns = nuovi.length;
      toast('Errore insert: '+error.message, 'err');
    } else {
      okIns = data.length;
      data.forEach(d => {
        if (!state.clienti.find(x => x.id === d.id)) state.clienti.push(d);
      });
    }
  }

  for (const p of aggiornamenti) {
    const existing = state.clienti.find(c => (c.nome||'').toLowerCase() === p.nome.toLowerCase());
    if (!existing) { errUpd++; continue; }
    const { data, error } = await sb.from('clienti').update({
      ragione_sociale: p.ragione_sociale, indirizzo: p.indirizzo,
      p_iva: p.p_iva, referente: p.referente,
      email: p.email, telefono: p.telefono, note: p.note,
    }).eq('id', existing.id).select().single();
    if (error) errUpd++;
    else {
      okUpd++;
      state.clienti = state.clienti.map(x => x.id === existing.id ? data : x);
    }
  }

  toast(`Import completato: ${okIns} nuovi, ${okUpd} aggiornati${errIns||errUpd ? `, ${errIns+errUpd} errori` : ''}`,
        (errIns||errUpd) ? 'err' : 'ok');
  renderTab('clienti');
}

function clientiExportExcel() {
  if (typeof XLSX === 'undefined') {
    toast('Libreria Excel non caricata', 'err');
    return;
  }
  const rows = state.clienti.map(c => ({
    nome: c.nome,
    ragione_sociale: c.ragione_sociale || '',
    indirizzo: c.indirizzo || '',
    p_iva: c.p_iva || '',
    referente: c.referente || '',
    email: c.email || '',
    telefono: c.telefono || '',
    note: c.note || '',
    attivo: c.attivo ? 'sì' : 'no',
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:24},{wch:32},{wch:30},{wch:14},{wch:20},{wch:24},{wch:14},{wch:30},{wch:8}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Clienti');
  XLSX.writeFile(wb, 'clienti_'+new Date().toISOString().substring(0,10)+'.xlsx');
}

function openArticoloModal(a) {
  const isNew = !a;
  const isAdmin = state.profile?.ruolo === 'admin';
  a = a || { codice:'', descrizione:'', categoria:'', note:'', attivo:true };
  const readonly = !isAdmin;

  const modal = el('div', { class:'modal' });
  modal.append(el('div', { class:'mhd' },
    el('h2', {}, isNew ? 'Nuovo Articolo' : (readonly ? 'Articolo' : 'Modifica Articolo')),
    el('button', { class:'mclose', onclick:closeModal }, '✕'),
  ));

  const body = el('div', { class:'mbody' });
  const form = el('form');

  const inCodice = el('input', { type:'text', name:'codice', value:a.codice||'', required:'true' });
  const inDesc = el('input', { type:'text', name:'descrizione', value:a.descrizione||'' });
  const inCategoria = el('input', { type:'text', name:'categoria', value:a.categoria||'' });
  const inNote = el('textarea', { name:'note', rows:'2' }, a.note || '');
  const selAttivo = el('select', { name:'attivo' },
    el('option', { value:'true' }, 'Attivo'),
    el('option', { value:'false' }, 'Disattivato'));
  selAttivo.value = String(!!a.attivo);

  if (readonly) {
    [inCodice, inDesc, inCategoria, inNote, selAttivo].forEach(i => i.disabled = true);
  }

  form.append(
    el('div', { class:'frow' },
      el('div', { class:'field' }, el('label', {}, 'Codice *'), inCodice),
      el('div', { class:'field' }, el('label', {}, 'Stato'), selAttivo),
    ),
    el('div', { class:'field' }, el('label', {}, 'Descrizione'), inDesc),
    el('div', { class:'field' }, el('label', {}, 'Categoria'), inCategoria,
      el('div', { class:'sub', style:'margin-top:4px;' },
        'Es. "Elettronica", "Meccanica", "Cablaggi" — utile per raggruppamenti futuri.')),
    el('div', { class:'field' }, el('label', {}, 'Note'), inNote),
  );

  body.append(form);
  modal.append(body);

  const foot = el('div', { class:'mfoot' });
  foot.append(el('button', { class:'btng', onclick:closeModal }, 'Chiudi'));
  if (isAdmin) {
    const btnSave = el('button', { class:'btnp' }, 'Salva');
    btnSave.onclick = async () => {
      const fd = new FormData(form);
      const payload = {
        codice: (fd.get('codice')||'').trim(),
        descrizione: (fd.get('descrizione')||'').trim() || null,
        categoria: (fd.get('categoria')||'').trim() || null,
        note: (fd.get('note')||'').trim() || null,
        attivo: fd.get('attivo') === 'true',
      };
      if (!payload.codice) return toast('Codice obbligatorio', 'err');
      btnSave.disabled = true;
      btnSave.textContent = 'Salvataggio…';
      try {
        const q = isNew
          ? sb.from('articoli').insert(payload).select().single()
          : sb.from('articoli').update(payload).eq('id', a.id).select().single();
        const { data, error } = await q;
        if (error) {
          btnSave.disabled = false;
          btnSave.textContent = 'Salva';
          if (error.code === '23505') return toast('Codice già esistente', 'err');
          return toast(error.message, 'err');
        }
        if (isNew) {
          if (!state.articoli.find(x => x.id === data.id)) state.articoli.push(data);
        } else {
          state.articoli = state.articoli.map(x => x.id === a.id ? data : x);
        }
        toast(isNew ? 'Articolo creato' : 'Articolo aggiornato');
        closeModal(); renderTab('articoli');
      } catch (e) {
        btnSave.disabled = false;
        btnSave.textContent = 'Salva';
        toast('Errore di rete: '+(e.message||e), 'err');
      }
    };
    foot.append(btnSave);
  }
  modal.append(foot);
  openModal(modal);
}

async function deleteArticolo(a) {
  if (!confirm(`Eliminare l'articolo "${a.codice}"?\nNon sarà possibile se ha operazioni associate.`)) return;
  const { data, error } = await sb.from('articoli').delete().eq('id', a.id).select();
  if (error) {
    if (error.code === '23503') return toast('Impossibile: ci sono operazioni legate a questo articolo', 'err');
    return toast(error.message, 'err');
  }
  if (!data || data.length === 0) {
    return toast('Eliminazione bloccata: verifica le policy DELETE su articoli', 'err');
  }
  state.articoli = state.articoli.filter(x => x.id !== a.id);
  toast('Articolo eliminato'); renderTab('articoli');
}

async function articoliImportExcel(file) {
  if (!file) return;
  if (typeof XLSX === 'undefined') {
    toast('Libreria Excel non caricata, ricarica la pagina', 'err');
    return;
  }
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type:'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval:'', raw:false });
    if (!rows.length) { toast('File vuoto', 'err'); return; }
    openArticoliImportPreviewModal(rows);
  } catch (e) {
    toast('Errore lettura file: '+(e.message||e), 'err');
  }
}

  foot.append(el('button', { class:'btng', onclick:closeModal }, 'Annulla'));
  if (validi.length) {
    foot.append(el('button', {
      class:'btnp',
      onclick: () => articoliImportEsegui(nuovi, aggiornamenti),
    }, `Importa ${validi.length} articoli`));
  }
  modal.append(foot);
  openModal(modal);
}

async function articoliImportEsegui(nuovi, aggiornamenti) {
  closeModal();
  let okIns = 0, errIns = 0, okUpd = 0, errUpd = 0;

  // Insert in batch da 500 per evitare payload eccessivi (gli articoli possono essere molti)
  const batchSize = 500;
  for (let i = 0; i < nuovi.length; i += batchSize) {
    const batch = nuovi.slice(i, i + batchSize).map(p => ({
      codice: p.codice, descrizione: p.descrizione,
      categoria: p.categoria, note: p.note,
    }));
    const { data, error } = await sb.from('articoli').insert(batch).select();
    if (error) {
      errIns += batch.length;
      toast('Errore insert: '+error.message, 'err');
    } else {
      okIns += data.length;
      data.forEach(d => {
        if (!state.articoli.find(x => x.id === d.id)) state.articoli.push(d);
      });
    }
  }

  for (const p of aggiornamenti) {
    const existing = state.articoli.find(a => (a.codice||'').toLowerCase() === p.codice.toLowerCase());
    if (!existing) { errUpd++; continue; }
    const { data, error } = await sb.from('articoli').update({
      descrizione: p.descrizione, categoria: p.categoria, note: p.note,
    }).eq('id', existing.id).select().single();
    if (error) errUpd++;
    else {
      okUpd++;
      state.articoli = state.articoli.map(x => x.id === existing.id ? data : x);
    }
  }

  toast(`Import completato: ${okIns} nuovi, ${okUpd} aggiornati${errIns||errUpd ? `, ${errIns+errUpd} errori` : ''}`,
        (errIns||errUpd) ? 'err' : 'ok');
  renderTab('articoli');
}

function articoliExportExcel() {
  if (typeof XLSX === 'undefined') {
    toast('Libreria Excel non caricata', 'err');
    return;
  }
  const rows = state.articoli.map(a => ({
    codice: a.codice,
    descrizione: a.descrizione || '',
    categoria: a.categoria || '',
    note: a.note || '',
    attivo: a.attivo ? 'sì' : 'no',
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:24},{wch:40},{wch:18},{wch:30},{wch:8}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Articoli');
  XLSX.writeFile(wb, 'articoli_'+new Date().toISOString().substring(0,10)+'.xlsx');
}

function openTipoLavModal(t) {
  const isNew = !t;
  // Calcola prossimo ordine se è nuovo
  const nextOrdine = isNew
    ? (Math.max(0, ...state.tipiLav.map(x => x.ordine||0)) + 1)
    : t.ordine;
  t = t || { nome:'', ordine: nextOrdine, colore: TIPI_LAV_COLORI[state.tipiLav.length % TIPI_LAV_COLORI.length], attivo:true };

  const modal = el('div', { class:'modal' });
  modal.append(el('div', { class:'mhd' },
    el('h2', {}, isNew ? 'Nuovo Tipo di Lavorazione' : 'Modifica Tipo di Lavorazione'),
    el('button', { class:'mclose', onclick:closeModal }, '✕'),
  ));

  const body = el('div', { class:'mbody' });
  const form = el('form');

  const inNome = el('input', { type:'text', name:'nome', value:t.nome||'', required:'true' });
  const inOrdine = el('input', { type:'number', name:'ordine', value:String(t.ordine||0), min:'0' });
  const selAttivo = el('select', { name:'attivo' },
    el('option', { value:'true' }, 'Attivo'),
    el('option', { value:'false' }, 'Disattivato'));
  selAttivo.value = String(!!t.attivo);

  // Selettore colori a palette
  let coloreScelto = t.colore || TIPI_LAV_COLORI[0];
  const palette = el('div', { style:'display:flex;flex-wrap:wrap;gap:6px;padding:6px;background:var(--sur2);border:1px solid var(--brd);border-radius:4px;' });
  const refreshPalette = () => {
    palette.innerHTML = '';
    TIPI_LAV_COLORI.forEach(col => {
      const sel = col === coloreScelto;
      palette.append(el('button', {
        type:'button',
        style: `width:34px;height:28px;border-radius:3px;background:${col};border:2px solid ${sel?'var(--acc)':'transparent'};cursor:pointer;outline:none;`,
        onclick: () => { coloreScelto = col; refreshPalette(); },
      }));
    });
  };
  refreshPalette();

  form.append(
    el('div', { class:'field' }, el('label', {}, 'Nome *'), inNome,
      el('div', { class:'sub', style:'margin-top:4px;' },
        'Es. "Cablaggio", "Lavorazione meccanica", "Collaudo".')),
    el('div', { class:'frow' },
      el('div', { class:'field' }, el('label', {}, 'Ordine'), inOrdine,
        el('div', { class:'sub', style:'margin-top:4px;' }, 'Posizione nella lista.')),
      el('div', { class:'field' }, el('label', {}, 'Stato'), selAttivo),
    ),
    el('div', { class:'field' }, el('label', {}, 'Colore'), palette),
  );

  body.append(form);
  modal.append(body);

  const foot = el('div', { class:'mfoot' });
  foot.append(el('button', { class:'btng', onclick:closeModal }, 'Chiudi'));
  const btnSave = el('button', { class:'btnp' }, 'Salva');
  btnSave.onclick = async () => {
    const fd = new FormData(form);
    const payload = {
      nome: (fd.get('nome')||'').trim(),
      ordine: parseInt(fd.get('ordine')) || 0,
      colore: coloreScelto,
      attivo: fd.get('attivo') === 'true',
    };
    if (!payload.nome) return toast('Nome obbligatorio', 'err');
    btnSave.disabled = true;
    btnSave.textContent = 'Salvataggio…';
    try {
      const q = isNew
        ? sb.from('tipi_lavorazione').insert(payload).select().single()
        : sb.from('tipi_lavorazione').update(payload).eq('id', t.id).select().single();
      const { data, error } = await q;
      if (error) {
        btnSave.disabled = false;
        btnSave.textContent = 'Salva';
        if (error.code === '23505') return toast('Nome già esistente', 'err');
        return toast(error.message, 'err');
      }
      if (isNew) {
        if (!state.tipiLav.find(x => x.id === data.id)) state.tipiLav.push(data);
      } else {
        state.tipiLav = state.tipiLav.map(x => x.id === t.id ? data : x);
      }
      toast(isNew ? 'Tipo creato' : 'Tipo aggiornato');
      closeModal(); renderTab('tipi_lav');
    } catch (e) {
      btnSave.disabled = false;
      btnSave.textContent = 'Salva';
      toast('Errore di rete: '+(e.message||e), 'err');
    }
  };
  foot.append(btnSave);
  modal.append(foot);
  openModal(modal);
}

async function deleteTipoLav(t) {
  if (!confirm(`Eliminare il tipo "${t.nome}"?\nNon sarà possibile se ci sono sessioni di lavoro associate.`)) return;
  const { data, error } = await sb.from('tipi_lavorazione').delete().eq('id', t.id).select();
  if (error) {
    if (error.code === '23503') return toast('Impossibile: ci sono sessioni di lavoro su questo tipo', 'err');
    return toast(error.message, 'err');
  }
  if (!data || data.length === 0) {
    return toast('Eliminazione bloccata: verifica le policy DELETE su tipi_lavorazione', 'err');
  }
  state.tipiLav = state.tipiLav.filter(x => x.id !== t.id);
  toast('Tipo eliminato'); renderTab('tipi_lav');
}

async function deleteOperatore(u) {
  // Verifico se è usato in qualche prenotazione (dalla cache, no fetch)
  const count = state.prenOp.filter(r => r.operatore_id === u.id).length;
  if (count > 0) return toast(`Impossibile: ${u.nome} è associato a ${count} prenotazioni`, 'err');
  if (!confirm(`Eliminare l'operatore "${u.nome}"?`)) return;
  const { error } = await sb.from('operatori').delete().eq('id', u.id);
  if (error) return toast(error.message, 'err');
  // Aggiorna subito la cache locale
  state.operatori = state.operatori.filter(x => x.id !== u.id);
  delete state.operatoriById[u.id];
  toast('Operatore eliminato'); renderTab('operatori');
}
