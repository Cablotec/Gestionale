<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0e">
<title>Cablotec — Sistema Gestionale</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

:root{
  --bg:#0f0f0e; --sur:#1a1a18; --sur2:#222220; --brd:#2e2e2a;
  --acc:#d4ff4e; --or:#ff6b35; --txt:#e8e8e2; --mut:#6b6b64;
  --grn:#4effa3; --red:#ff4e6b; --yel:#ffcc4e; --blu:#4eb8ff; --vio:#b84eff;
  --hover:rgba(255,255,255,.02); --hover2:rgba(255,255,255,.04); --hover3:rgba(255,255,255,.1);
  --weekend:rgba(255,255,255,.015); --shadow:rgba(0,0,0,.75);
}
:root[data-theme="light"]{
  --bg:#f5f5f1; --sur:#ffffff; --sur2:#f0f0ec; --brd:#dcdcd6;
  --acc:#5a8000; --or:#cc4a16; --txt:#1a1a18; --mut:#7a7a72;
  --grn:#0d8f4c; --red:#c92648; --yel:#a87600; --blu:#1872c4; --vio:#7a2bc7;
  --hover:rgba(0,0,0,.025); --hover2:rgba(0,0,0,.05); --hover3:rgba(0,0,0,.08);
  --weekend:rgba(0,0,0,.02); --shadow:rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;min-height:100vh;padding:22px 18px 40px;}

/* Header */
header.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--brd);gap:12px;flex-wrap:wrap;}
h1{font-size:clamp(20px,4vw,34px);font-weight:800;line-height:1;letter-spacing:-.02em;}
h1 span{color:var(--acc);}
.sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);margin-top:4px;}
.user-info{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.user-info b{color:var(--txt);font-weight:500;}
.kiosk-jump{background:var(--sur);border:1px solid var(--brd);color:var(--mut);font-family:'DM Mono',monospace;font-size:10px;padding:5px 8px;border-radius:3px;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;outline:none;}
.kiosk-jump:hover{color:var(--txt);border-color:var(--mut);}

/* Toggle tema */
.theme-toggle{background:transparent;border:1px solid var(--brd);color:var(--mut);width:30px;height:30px;border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;}
.theme-toggle:hover{border-color:var(--txt);color:var(--txt);}

/* Nav */
.nav{display:flex;gap:0;border-bottom:2px solid var(--brd);margin-bottom:22px;overflow-x:auto;}
.navtab{padding:9px 18px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--mut);border-bottom:2px solid transparent;margin-bottom:-2px;background:none;border:none;white-space:nowrap;transition:all .15s;}
.navtab:hover{color:var(--txt);}
.navtab.active{color:var(--acc);border-bottom-color:var(--acc);}
#tabs-macro{margin-bottom:0;}
.nav-sub{border-bottom:1px solid var(--brd);margin-bottom:22px;padding-left:6px;}
.nav-sub .navtab{font-size:10px;padding:7px 14px;color:var(--mut);}
.nav-sub .navtab.active{color:var(--txt);border-bottom-color:var(--txt);}
.nav-sub:empty{display:none;}

/* Buttons */
.btnp{padding:9px 14px;background:var(--acc);color:var(--bg);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border:none;border-radius:4px;cursor:pointer;transition:all .2s;}
.btnp:hover{filter:brightness(.92);}
.btnp:disabled{opacity:.4;cursor:not-allowed;}
.btng{padding:7px 11px;background:transparent;border:1px solid var(--brd);color:var(--mut);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;cursor:pointer;border-radius:4px;transition:all .2s;letter-spacing:.04em;text-transform:uppercase;}
.btng:hover{border-color:var(--txt);color:var(--txt);}
.btnd{padding:4px 8px;background:transparent;border:1px solid var(--brd);color:var(--mut);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;border-radius:3px;transition:all .15s;}
.btnd:hover{color:var(--red);border-color:var(--red);}
.btnsm{padding:4px 9px;background:transparent;border:1px solid var(--brd);color:var(--mut);font-family:'Syne',sans-serif;font-size:10px;font-weight:600;cursor:pointer;border-radius:3px;letter-spacing:.04em;text-transform:uppercase;}
.btnsm:hover{border-color:var(--txt);color:var(--txt);}
.btnsm:disabled{opacity:.35;cursor:not-allowed;}

/* Tables */
.tw{overflow-x:auto;}
table.rt{width:100%;border-collapse:collapse;font-size:12px;}
table.rt th{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--acc);padding:7px 10px;text-align:left;border-bottom:2px solid var(--acc);white-space:nowrap;background:var(--bg);}
table.rt th.tc{text-align:center;}
table.rt td{padding:8px 10px;border-bottom:1px solid var(--brd);vertical-align:middle;}
table.rt tbody tr:hover td{background:var(--hover);}
.mono{font-family:'DM Mono',monospace;}
.cod-cell{font-family:'DM Mono',monospace;font-size:11px;color:var(--or);}

/* Badges */
.badge{display:inline-block;padding:2px 7px;border-radius:2px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.bok{background:rgba(78,255,163,.12);color:var(--grn);}
.berr{background:rgba(255,78,107,.12);color:var(--red);}
.byel{background:rgba(255,204,78,.12);color:var(--yel);}
.bor{background:rgba(255,107,53,.12);color:var(--or);}
.bblu{background:rgba(78,184,255,.12);color:var(--blu);}
.bvio{background:rgba(184,78,255,.12);color:var(--vio);}
.bgry{background:rgba(107,107,100,.18);color:var(--mut);}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.toolbar h2{font-size:15px;font-weight:700;flex:1;}

.empty{padding:40px;text-align:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);}

/* Modal */
#modal-root .modal-bg{position:fixed;inset:0;background:var(--shadow);z-index:400;display:flex;align-items:center;justify-content:center;padding:12px;overscroll-behavior:contain;}
.modal{background:var(--sur);border:1px solid var(--brd);border-radius:6px;width:100%;max-width:560px;max-height:calc(100vh - 24px);display:flex;flex-direction:column;overflow:hidden;}
.mhd{padding:14px 17px 11px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mhd h2{font-size:14px;font-weight:700;}
.mclose{background:none;border:none;color:var(--mut);font-size:16px;cursor:pointer;padding:2px 8px;border-radius:3px;}
.mclose:hover{color:var(--txt);}
.mbody{padding:16px 18px;overflow-y:auto;flex:1;}
.mfoot{padding:11px 18px;border-top:1px solid var(--brd);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;flex-wrap:wrap;}

/* Form fields */
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.field label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);}
.field input,.field select{background:var(--sur2);border:1px solid var(--brd);color:var(--txt);padding:7px 10px;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;outline:none;width:100%;}
.field textarea{background:var(--sur2);border:1px solid var(--brd);color:var(--txt);padding:7px 10px;border-radius:4px;font-family:'Syne',sans-serif;font-size:12px;outline:none;width:100%;resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc);}
.field input[type=color]{padding:2px;height:34px;cursor:pointer;}
.field select option{background:var(--sur2);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Auth */
#auth-screen{position:fixed;inset:0;background:var(--bg);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px;}
.auth-box{background:var(--sur);border:1px solid var(--brd);border-radius:8px;padding:32px 28px;width:100%;max-width:380px;}
.auth-box h2{font-size:22px;font-weight:800;margin-bottom:4px;letter-spacing:-.02em;}
.auth-box h2 span{color:var(--acc);}
.auth-box .auth-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);margin-bottom:24px;}
.auth-tabs{display:flex;gap:0;margin-bottom:18px;}
.auth-tabs button{flex:1;padding:8px;border:1px solid var(--brd);background:var(--sur2);color:var(--mut);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;}
.auth-tabs button:first-child{border-radius:4px 0 0 4px;}
.auth-tabs button:last-child{border-radius:0 4px 4px 0;border-left:none;}
.auth-tabs button.active{background:var(--acc);border-color:var(--acc);color:var(--bg);}
.auth-msg{font-family:'DM Mono',monospace;font-size:11px;min-height:18px;margin-top:8px;}
.auth-msg.err{color:var(--red);}
.auth-msg.ok{color:var(--grn);}

/* Calendar */
.cal-head{display:flex;align-items:center;gap:8px;padding:10px 0 14px;flex-wrap:wrap;}
.cal-head h2{font-size:18px;font-weight:700;text-transform:capitalize;letter-spacing:-.01em;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--brd);border-left:1px solid var(--brd);}
.cal-dow{padding:6px 8px;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--acc);background:var(--sur);border-right:1px solid var(--brd);border-bottom:1px solid var(--brd);}
.cal-cell{min-height:110px;padding:4px;background:var(--sur);border-right:1px solid var(--brd);border-bottom:1px solid var(--brd);cursor:pointer;position:relative;overflow:hidden;transition:background .12s;}
.cal-cell:hover{background:var(--sur2);}
.cal-cell.other{background:var(--bg);opacity:.55;}
.cal-cell.weekend{background:var(--weekend);}
.cal-cell.today .cal-day-num{background:var(--acc);color:var(--bg);border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;}
.cal-day-num{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;padding:2px 4px;color:var(--mut);}
.cal-cell.today .cal-day-num{color:var(--bg);}
.cal-events{display:flex;flex-direction:column;gap:2px;margin-top:2px;}
.cal-evt{font-family:'DM Mono',monospace;font-size:10px;line-height:1.2;padding:3px 5px;border-radius:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:3px solid;background:var(--hover2);color:var(--txt);}
.cal-evt:hover{background:var(--hover3);}
.cal-uso{border-left-style:dashed;}
.cal-uso-aperto{background:rgba(255,107,53,.12);border-left-color:var(--or);color:var(--or);font-weight:500;}
.cal-uso-aperto:hover{background:rgba(255,107,53,.2);}
.cal-uso-chiuso{background:rgba(107,107,100,.12);border-left-color:var(--mut);color:var(--mut);}
.cal-uso-chiuso:hover{background:rgba(107,107,100,.2);}
.cal-assenza{border-left-style:dotted;font-style:italic;}
.cal-assenza:hover{filter:brightness(1.3);}
.swatch-uso-aperto{background:rgba(255,107,53,.5);border-color:var(--or);}
.swatch-uso-chiuso{background:rgba(107,107,100,.5);border-color:var(--mut);}
.cal-more{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);padding:3px 5px;cursor:pointer;border-radius:2px;background:var(--hover2);text-align:center;letter-spacing:.05em;}
.cal-more:hover{background:var(--hover3);color:var(--txt);}
.day-row{padding:10px 12px;margin-bottom:6px;background:var(--sur2);border:1px solid var(--brd);border-left:4px solid var(--mut);border-radius:4px;cursor:pointer;transition:background .12s;}
.day-row:hover{background:var(--hover2);}
.day-row-uso-aperto{border-left-color:var(--or);background:rgba(255,107,53,.06);}
.day-row-uso-chiuso{border-left-color:var(--mut);}
.day-row-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.day-row-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);}

/* Placeholder per moduli in arrivo */
.placeholder-card{background:var(--sur);border:1px dashed var(--brd);border-radius:8px;padding:50px 30px;text-align:center;margin-top:20px;}
.placeholder-icon{font-size:46px;opacity:.6;margin-bottom:14px;}
.placeholder-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.placeholder-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--mut);max-width:480px;margin:0 auto 16px;line-height:1.6;}
.placeholder-meta{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;color:var(--acc);background:rgba(212,255,78,.08);border:1px solid var(--acc);border-radius:3px;padding:4px 10px;letter-spacing:.08em;text-transform:uppercase;}

/* Chips per filtri stato */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0;}
.chip{display:inline-flex;align-items:center;padding:6px 12px;background:var(--sur2);border:1px solid var(--brd);color:var(--mut);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .15s;user-select:none;}
.chip:hover{color:var(--txt);border-color:var(--mut);}
.chip.act{background:rgba(212,255,78,.08);border-color:var(--acc);color:var(--acc);}

/* Pianificazione */
.op-table{font-size:11px;}
.op-table th{font-size:9px;padding:6px 8px;}
.op-table td{padding:4px 8px;vertical-align:middle;}
.op-table tr.in-ritardo td{background:rgba(255,78,107,.06);}
.op-table tr.in-ritardo td:first-child{box-shadow:inset 3px 0 0 var(--red);}
.op-table tr.consegnata td{opacity:.55;}
.op-cell-inline{cursor:pointer;padding:3px 6px;border-radius:2px;transition:background .1s;}
.op-cell-inline:hover{background:rgba(212,255,78,.08);}
.op-cell-inline.editing{padding:0;background:transparent;}
.op-cell-inline input,.op-cell-inline select{background:var(--sur2);border:1px solid var(--acc);color:var(--txt);padding:3px 6px;font-family:inherit;font-size:11px;outline:none;border-radius:2px;width:100%;box-sizing:border-box;}
.prep-dot{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle;margin-right:5px;}
.prep-dot.vuoto{background:var(--mut);}
.prep-dot.parziale{background:var(--yel);}
.prep-dot.completo{background:var(--grn);}
.calc-cell{color:var(--mut);font-family:'DM Mono',monospace;font-size:10px;}
.calc-cell.over-budget{color:var(--red)!important;font-weight:700;background:rgba(255,78,107,.08);}
.scadenza-vicina{color:var(--yel);font-weight:600;}
.scadenza-passata{color:var(--red);font-weight:600;}
.cal-more{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);padding:2px 5px;}

/* Legenda */
.legend{display:flex;flex-wrap:wrap;gap:14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;padding-bottom:10px;}
.legend span.lg{display:flex;align-items:center;gap:5px;}
.swatch{display:inline-block;width:12px;height:12px;border-radius:2px;vertical-align:middle;border:1px solid var(--brd);}

/* KPIs */
.kpis{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.kpi{background:var(--sur);border:1px solid var(--brd);border-radius:4px;padding:12px 15px;flex:1;min-width:120px;}
.kl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:4px;}
.kv{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--txt);}
.ka{color:var(--acc);} .kg{color:var(--grn);} .kb{color:var(--blu);}

/* Toast */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--sur);border:1px solid var(--acc);color:var(--txt);padding:10px 14px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;z-index:9999;animation:tin .2s ease-out;}
.toast.err{border-color:var(--red);}
@keyframes tin{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}

/* Setup screen */
.setup{max-width:560px;margin:80px auto;padding:24px;background:var(--sur);border:1px solid var(--or);border-radius:6px;}
.setup h1{font-size:18px;color:var(--or);margin-bottom:10px;}
.setup p, .setup li{font-family:'DM Mono',monospace;font-size:12px;line-height:1.6;}
.setup code{background:var(--sur2);padding:2px 6px;border-radius:3px;color:var(--acc);}

/* Lista consegne */
.consegne-list{display:flex;flex-direction:column;gap:6px;}
.consegna-row{display:flex;flex-direction:column;gap:4px;padding:8px;background:var(--sur);border:1px solid var(--brd);border-radius:4px;}
.consegna-row .row-top{display:flex;gap:6px;align-items:center;}
.consegna-row .num{background:var(--sur2);border:1px solid var(--brd);border-radius:3px;text-align:center;padding:4px 8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);min-width:22px;flex-shrink:0;}
.consegna-row input{padding:6px 10px !important;font-size:12px !important;flex:1;}
.consegna-row .row-bottom{display:flex;gap:6px;align-items:center;padding-left:30px;}
.consegna-row .row-bottom input{flex:1;}
.consegna-row .indir-info{font-family:monospace;font-size:10px;color:var(--mut);padding-left:30px;}

/* Autocomplete cliente */
.cli-ac-wrap{position:relative;flex:1;}
.cli-ac-list{position:absolute;top:100%;left:0;right:0;background:var(--sur2);border:1px solid var(--acc);border-top:none;border-radius:0 0 4px 4px;max-height:220px;overflow-y:auto;z-index:1000;display:none;}
.cli-ac-list.open{display:block;}
.cli-ac-item{padding:7px 10px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--brd);}
.cli-ac-item:last-child{border-bottom:none;}
.cli-ac-item:hover,.cli-ac-item.sel{background:rgba(212,255,78,.1);color:var(--acc);}
.cli-ac-item .cli-name{font-weight:600;}
.cli-ac-item .cli-meta{font-family:monospace;font-size:10px;color:var(--mut);margin-left:6px;}

/* Multi-select operatori */
/* Multi-select operatori con ricerca */
.util-selected{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:var(--sur2);border:1px solid var(--brd);border-radius:4px;min-height:42px;align-items:center;}
.util-empty{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);font-style:italic;}
.util-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 4px 4px 9px;background:rgba(212,255,78,.1);border:1px solid var(--acc);border-radius:3px;font-family:'Syne',sans-serif;font-size:12px;color:var(--txt);}
.util-pill-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--or);background:rgba(255,107,53,.1);padding:1px 5px;border-radius:2px;}
.util-pill-x{background:transparent;border:none;color:var(--mut);cursor:pointer;font-size:11px;padding:2px 4px;line-height:1;border-radius:2px;transition:all .12s;}
.util-pill-x:hover{color:var(--red);background:rgba(255,78,107,.1);}
.util-dropwrap{position:relative;margin-top:6px;}
.util-search{background:var(--sur);border:1px solid var(--brd);color:var(--txt);padding:7px 10px;font-family:'DM Mono',monospace;font-size:11px;outline:none;width:100%;border-radius:4px;}
.util-search:focus{border-color:var(--acc);}
.util-droplist{position:absolute;top:100%;left:0;right:0;background:var(--sur2);border:1px solid var(--acc);border-top:none;border-radius:0 0 4px 4px;max-height:240px;overflow-y:auto;z-index:1000;display:none;}
.util-droplist.open{display:block;}
.util-row{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;border-bottom:1px solid var(--brd);user-select:none;transition:background .12s;}
.util-row:last-child{border-bottom:none;}
.util-row:hover{background:var(--hover2);}
.util-row.selected{background:rgba(212,255,78,.06);}
.util-row-chk{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border:1px solid var(--brd);border-radius:2px;font-size:11px;color:var(--bg);background:transparent;font-weight:700;flex-shrink:0;}
.util-row.selected .util-row-chk{background:var(--acc);border-color:var(--acc);color:var(--bg);}
.util-row-name{flex:1;}
.util-row-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--or);background:rgba(255,107,53,.1);padding:1px 5px;border-radius:2px;}
.util-noresult{padding:12px 10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);text-align:center;font-style:italic;}

/* Mobile */
@media(max-width:640px){
  body{padding:14px 10px 40px;}
  .frow{grid-template-columns:1fr;}
  .kpis{flex-direction:column;}
  .cal-cell{min-height:78px;padding:2px;}
  .cal-day-num{font-size:10px;}
  .cal-evt{font-size:9px;padding:2px 3px;}
  .cal-dow{font-size:9px;padding:5px 4px;}
  .navtab{padding:9px 12px;font-size:10px;}
  table.rt th, table.rt td{padding:6px 6px;font-size:11px;}
}
/* ═══════════════════════════════════════════════════════════ */
/* KIOSK MODE                                                   */
/* ═══════════════════════════════════════════════════════════ */
#kiosk-screen{position:fixed;inset:0;background:var(--bg);z-index:9000;display:flex;flex-direction:column;padding:24px 32px;overflow:hidden;}
.kiosk-header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:18px;border-bottom:1px solid var(--brd);margin-bottom:24px;}
.kiosk-title{font-size:32px;font-weight:800;letter-spacing:-.02em;line-height:1;}
.kiosk-title span{color:var(--acc);}
.kiosk-sede{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);margin-top:6px;letter-spacing:.1em;text-transform:uppercase;}
.kiosk-clock{font-family:'DM Mono',monospace;font-size:34px;color:var(--acc);font-weight:500;letter-spacing:-.01em;}
.kiosk-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.kiosk-exit{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);text-decoration:none;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--brd);border-radius:3px;transition:all .15s;}
.kiosk-exit:hover{color:var(--txt);border-color:var(--mut);}
.kiosk-step{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.kiosk-prompt{text-align:center;margin:20px 0 28px;}
.kiosk-prompt-big{font-size:30px;font-weight:700;letter-spacing:-.01em;}
.kiosk-prompt-sub{font-family:'DM Mono',monospace;font-size:13px;color:var(--mut);margin-top:8px;letter-spacing:.08em;}
.kiosk-hidden-input{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;}
.kiosk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;overflow-y:auto;padding:4px;flex:1;align-content:start;}
.kiosk-tile{background:var(--sur);border:2px solid var(--brd);border-radius:8px;padding:18px 14px;cursor:pointer;text-align:center;transition:all .15s;user-select:none;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90px;}
.kiosk-tile:hover,.kiosk-tile:active{border-color:var(--acc);background:rgba(212,255,78,.05);transform:scale(.98);}
.kiosk-tile-name{font-size:16px;font-weight:600;line-height:1.25;}
.kiosk-tile-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);margin-top:6px;letter-spacing:.06em;}
.kiosk-tile.mezzo{border-left-width:6px;}
.kiosk-tile.mezzo-prenotato{background:rgba(212,255,78,.08);border-color:var(--acc);}
.kiosk-tile.mezzo-prenotato .kiosk-tile-prenotato{font-family:'DM Mono',monospace;font-size:10px;color:var(--acc);margin-top:6px;letter-spacing:.06em;font-weight:600;}
.kiosk-tile-targa{font-family:'DM Mono',monospace;font-size:11px;color:var(--or);margin-top:4px;}
.kiosk-fuori{margin-top:auto;padding:14px 16px;background:var(--sur);border:1px solid var(--brd);border-radius:6px;max-height:130px;overflow-y:auto;}
.kiosk-fuori-title{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.kiosk-fuori-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-family:'DM Mono',monospace;font-size:12px;border-bottom:1px solid var(--brd);}
.kiosk-fuori-row:last-child{border-bottom:none;}
.kiosk-fuori-empty{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);font-style:italic;text-align:center;padding:6px;}
.kiosk-greet{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.kiosk-greet-name{font-size:28px;font-weight:700;}
.kiosk-cancel{padding:10px 20px;background:transparent;border:1px solid var(--brd);color:var(--mut);font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;}
.kiosk-cancel:hover,.kiosk-cancel:active{border-color:var(--red);color:var(--red);}
.kiosk-rientro-box{background:var(--sur);border:2px solid var(--blu);border-radius:8px;padding:24px;margin-bottom:18px;}
.kiosk-rientro-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--blu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.kiosk-rientro-mezzo{font-size:24px;font-weight:700;margin-bottom:14px;}
.kiosk-rientro-info{font-family:'DM Mono',monospace;font-size:13px;color:var(--mut);margin-bottom:18px;}
.kiosk-rientro-btn{width:100%;padding:22px;background:var(--blu);color:#fff;font-family:'Syne',sans-serif;font-size:18px;font-weight:700;border:none;border-radius:6px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;}
.kiosk-rientro-btn:hover,.kiosk-rientro-btn:active{filter:brightness(1.15);transform:scale(.99);}
.kiosk-section-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;margin:8px 0 12px;}
.kiosk-empty{text-align:center;padding:40px;font-family:'DM Mono',monospace;color:var(--mut);font-size:13px;}
.kiosk-done{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;}
.kiosk-done-card{background:var(--sur);border:2px solid var(--grn);border-radius:10px;padding:50px 60px;}
.kiosk-done-card.err{border-color:var(--red);}
.kiosk-done-icon{font-size:64px;margin-bottom:20px;line-height:1;}
.kiosk-done-msg{font-size:30px;font-weight:700;margin-bottom:14px;}
.kiosk-done-detail{font-family:'DM Mono',monospace;font-size:14px;color:var(--mut);line-height:1.7;}

/* Menu kiosk (Mezzi / Commesse) */
.kiosk-menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;flex:1;align-content:center;padding:40px 0;}
.kiosk-menu-btn{padding:60px 40px;background:var(--sur);border:2px solid var(--brd);border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:14px;transition:all .15s;color:var(--txt);font-family:inherit;}
.kiosk-menu-btn:hover,.kiosk-menu-btn:active{border-color:var(--acc);background:rgba(212,255,78,.05);transform:scale(.99);}
.kmb-icon{font-size:80px;line-height:1;}
.kmb-label{font-size:32px;font-weight:800;letter-spacing:-.02em;}
.kmb-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--mut);letter-spacing:.06em;text-transform:uppercase;}

/* Lista operazioni nel kiosk */
.kiosk-op-section{margin-bottom:18px;}
.kiosk-op-section-hd{font-family:'DM Mono',monospace;font-size:11px;color:var(--acc);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--acc);}
.kiosk-op-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.kiosk-op-card{background:var(--sur);border:2px solid var(--brd);border-radius:8px;padding:16px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:6px;transition:all .15s;color:var(--txt);font-family:inherit;}
.kiosk-op-card:hover,.kiosk-op-card:active{border-color:var(--acc);background:rgba(212,255,78,.04);}
.kiosk-op-card-cliente{font-size:13px;font-weight:700;color:var(--txt);}
.kiosk-op-card-cod{font-family:'DM Mono',monospace;font-size:14px;color:var(--or);font-weight:600;}
.kiosk-op-card-info{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);letter-spacing:.04em;display:flex;justify-content:space-between;margin-top:4px;}
.kiosk-op-card-scad.passata{color:var(--red);font-weight:600;}
.kiosk-op-card-scad.vicina{color:var(--yel);}

.kiosk-op-search-box{margin:14px 0;display:flex;gap:10px;align-items:center;}
.kiosk-op-search-box input{flex:1;background:var(--sur);border:1px solid var(--brd);color:var(--txt);padding:14px 18px;border-radius:6px;font-family:'DM Mono',monospace;font-size:14px;outline:none;}
.kiosk-op-search-box input:focus{border-color:var(--acc);}
.kiosk-op-toggle-altre{padding:14px 20px;background:transparent;border:1px solid var(--brd);color:var(--mut);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;border-radius:4px;cursor:pointer;}
.kiosk-op-toggle-altre:hover{color:var(--txt);border-color:var(--mut);}

/* Tipi lavorazione */
.kiosk-tipo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;padding:30px 0;}
.kiosk-tipo-btn{padding:40px 24px;background:var(--sur);border:3px solid var(--brd);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;font-family:inherit;color:var(--txt);transition:all .15s;}
.kiosk-tipo-btn:hover,.kiosk-tipo-btn:active{transform:scale(.98);}
.ktipo-color-bar{width:60px;height:8px;border-radius:4px;}
.ktipo-name{font-size:22px;font-weight:700;}

/* Sessione attiva */
.kiosk-attiva-card{background:var(--sur);border:3px solid var(--grn);border-radius:12px;padding:30px 36px;margin-bottom:20px;}
.kiosk-attiva-cliente{font-size:14px;color:var(--mut);font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.kiosk-attiva-cod{font-size:30px;font-weight:800;color:var(--txt);margin-bottom:6px;line-height:1.1;}
.kiosk-attiva-tipo{display:inline-flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:13px;color:var(--mut);margin-bottom:18px;}
.kiosk-attiva-tipo .ktipo-color-bar{width:28px;height:5px;}
.kiosk-attiva-stats{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding-top:14px;border-top:1px solid var(--brd);}
.kas-block{display:flex;flex-direction:column;}
.kas-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.kas-value{font-family:'DM Mono',monospace;font-size:28px;color:var(--grn);font-weight:500;}
.kiosk-attiva-actions{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.kiosk-attiva-btn{padding:24px;font-family:'Syne',sans-serif;font-size:17px;font-weight:700;border:none;border-radius:8px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:all .15s;}
.kiosk-attiva-btn.pause{background:var(--yel);color:#0f0f0e;}
.kiosk-attiva-btn.switch{background:var(--blu);color:#fff;}
.kiosk-attiva-btn:hover,.kiosk-attiva-btn:active{filter:brightness(1.1);transform:scale(.99);}

/* Warning sessione dimenticata */
.kiosk-warn-stale{background:rgba(255,204,78,.08);border:2px solid var(--yel);border-radius:8px;padding:16px 20px;margin-bottom:16px;color:var(--yel);font-family:'DM Mono',monospace;font-size:13px;}
.kiosk-warn-stale strong{color:var(--yel);}

/* ═══ GANTT ═══ */
.gantt-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px;}
.gantt-toolbar .switch-bar{display:flex;gap:0;background:var(--sur);border:1px solid var(--brd);border-radius:4px;overflow:hidden;}
.gantt-toolbar .switch-bar button{padding:6px 14px;background:transparent;border:none;color:var(--mut);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-right:1px solid var(--brd);}
.gantt-toolbar .switch-bar button:last-child{border-right:none;}
.gantt-toolbar .switch-bar button.act{background:var(--acc);color:#0f0f0e;font-weight:700;}
.gantt-toolbar .switch-bar button:hover:not(.act){color:var(--txt);background:var(--sur2);}
.gantt-nav{display:flex;gap:4px;align-items:center;}
.gantt-nav button{padding:6px 10px;background:var(--sur);border:1px solid var(--brd);color:var(--mut);cursor:pointer;border-radius:3px;font-family:'DM Mono',monospace;font-size:11px;}
.gantt-nav button:hover{color:var(--txt);border-color:var(--mut);}
.gantt-nav .label{font-family:'DM Mono',monospace;font-size:12px;color:var(--txt);padding:0 10px;min-width:160px;text-align:center;}

/* Live dashboard */
.live-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.live-card{background:var(--sur);border:1px solid var(--brd);border-radius:8px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
.live-card.attivo{border-color:var(--grn);box-shadow:inset 3px 0 0 var(--grn);}
.live-card.fermo{opacity:.65;}
.live-card-hd{display:flex;justify-content:space-between;align-items:center;}
.live-card-nome{font-size:14px;font-weight:700;}
.live-card-stato-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:2px;}
.live-card-stato-badge.attivo{background:rgba(78,255,163,.15);color:var(--grn);}
.live-card-stato-badge.fermo{background:rgba(107,107,100,.15);color:var(--mut);}
.live-card-cliente{font-size:12px;color:var(--mut);font-family:'DM Mono',monospace;}
.live-card-cod{font-family:'DM Mono',monospace;font-size:13px;color:var(--or);font-weight:600;}
.live-card-tipo{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mut);}
.live-card-tipo-dot{width:18px;height:5px;border-radius:2px;}
.live-card-durata{font-family:'DM Mono',monospace;font-size:22px;color:var(--grn);font-weight:500;margin-top:4px;}
.live-card-vuoto{font-size:11px;color:var(--mut);font-style:italic;}

/* Gantt storico */
.gantt-wrap{background:var(--sur);border:1px solid var(--brd);border-radius:6px;overflow:auto;position:relative;}
.gantt-grid{display:grid;min-width:fit-content;}
.gantt-hd{display:contents;}
.gantt-hd-corner{background:var(--sur2);border-bottom:1px solid var(--brd);border-right:1px solid var(--brd);padding:8px 12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);letter-spacing:.08em;text-transform:uppercase;position:sticky;left:0;top:0;z-index:3;}
.gantt-hd-time{background:var(--sur2);border-bottom:1px solid var(--brd);border-right:1px solid var(--brd);padding:6px 4px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);text-align:center;position:sticky;top:0;z-index:2;}
.gantt-hd-time.weekend{background:rgba(255,107,53,.05);color:var(--or);}
.gantt-hd-time.oggi{background:rgba(212,255,78,.1);color:var(--acc);font-weight:700;}
.gantt-row-nome{background:var(--sur);border-bottom:1px solid var(--brd);border-right:1px solid var(--brd);padding:8px 12px;font-size:12px;font-weight:600;position:sticky;left:0;z-index:1;display:flex;align-items:center;}
.gantt-row-nome.esterno{color:var(--yel);}
.gantt-cell{background:var(--bg);border-bottom:1px solid var(--brd);border-right:1px solid var(--brd);position:relative;min-height:42px;}
.gantt-cell.weekend{background:rgba(255,107,53,.03);}
.gantt-cell.oggi{background:rgba(212,255,78,.03);}
.gantt-bar{position:absolute;top:6px;bottom:6px;border-radius:3px;cursor:pointer;padding:2px 6px;font-size:10px;color:#0f0f0e;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;display:flex;flex-direction:column;justify-content:center;transition:transform .1s;border:1px solid transparent;z-index:1;}
.gantt-bar:hover{transform:scaleY(1.06);z-index:5;border-color:var(--txt);}
.gantt-bar.aperta{box-shadow:0 0 0 2px var(--grn);}
.gantt-bar-cod{font-family:'DM Mono',monospace;font-size:9px;opacity:.85;}
.gantt-bar-dur{font-family:'DM Mono',monospace;font-size:9px;opacity:.8;}
.gantt-empty-row{padding:30px;text-align:center;color:var(--mut);font-family:'DM Mono',monospace;font-size:11px;grid-column:1/-1;border-bottom:1px solid var(--brd);}

/* Overlay assenza sul gantt — strato sotto le barre, non interattivo per il clic */
.gantt-ass-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:9px;font-weight:700;color:#0f0f0e;letter-spacing:.05em;pointer-events:none;z-index:0;}
.gantt-ass-overlay.partial{justify-content:flex-end;padding-right:3px;opacity:.7;}
.gantt-cell.has-ass{background:repeating-linear-gradient(135deg,rgba(107,107,100,.18) 0,rgba(107,107,100,.18) 6px,transparent 6px,transparent 12px);}

/* ═══ CALENDARIO ASSENZE V2 — matrice compatta ═══ */
.assv2-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.assv2-tabbar{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:10px;}
.assv2-tab{font-family:'DM Mono',monospace;font-size:10px;padding:5px 11px;cursor:pointer;font-weight:700;color:var(--mut);border:1px solid var(--brd);background:var(--sur);border-radius:3px;letter-spacing:.05em;text-transform:uppercase;transition:all .15s;}
.assv2-tab:hover{color:var(--txt);border-color:var(--mut);}
.assv2-tab.active{background:var(--acc);color:#0f0f0e;border-color:var(--acc);}
.assv2-yearpick{display:flex;gap:4px;margin-bottom:8px;}
.assv2-yearpick button{padding:4px 14px;font-family:'DM Mono',monospace;font-size:11px;background:var(--sur);border:1px solid var(--brd);color:var(--mut);cursor:pointer;border-radius:3px;font-weight:700;}
.assv2-yearpick button.act{background:var(--acc);color:#0f0f0e;border-color:var(--acc);}

.assv2-hint{font-family:'DM Mono',monospace;font-size:10px;color:var(--acc);padding:5px 8px;background:rgba(212,255,78,.06);border-left:3px solid var(--acc);border-radius:2px;margin-bottom:8px;}

.assv2-legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);margin-bottom:8px;}
.assv2-legend .leg{display:inline-flex;align-items:center;gap:4px;}
.assv2-legend .ld{width:14px;height:12px;border:1px solid rgba(255,255,255,.1);flex-shrink:0;border-radius:1px;}

.assv2-cal-wrap{overflow:auto;border:1px solid var(--brd);background:var(--sur);border-radius:4px;margin-bottom:10px;}
table.assv2-cal{border-collapse:collapse;width:100%;}
table.assv2-cal th,table.assv2-cal td{border:1px solid var(--brd);}
.assv2-th-month{background:var(--sur2);color:var(--acc);font-family:'Syne',sans-serif;font-size:12px;font-weight:800;padding:5px 8px;text-align:center;letter-spacing:.05em;text-transform:uppercase;}
.assv2-col-name{width:1%;white-space:nowrap;position:sticky;left:0;z-index:3;}
th.assv2-col-name{background:var(--sur2);color:var(--mut);font-family:'DM Mono',monospace;font-size:9px;font-weight:700;padding:4px 10px;text-align:left;letter-spacing:.08em;text-transform:uppercase;}
td.assv2-col-name{padding:4px 12px 4px 10px;background:var(--sur);color:var(--txt);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;}
td.assv2-col-name.esterno{color:var(--yel);}
.assv2-th-day{text-align:center;padding:2px 1px;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;background:var(--sur2);color:var(--mut);}
.assv2-th-dow{text-align:center;padding:1px;font-family:'DM Mono',monospace;font-size:8px;font-weight:700;background:var(--sur2);color:var(--mut);opacity:.7;}
.assv2-td-day{text-align:center;height:30px;user-select:none;background:var(--bg);position:relative;padding:0;}
.assv2-td-day span{display:flex;width:100%;height:100%;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;}
.assv2-td-day.can-edit{cursor:pointer;}
.assv2-td-day.can-edit:hover{outline:2px solid var(--acc);outline-offset:-2px;}
.assv2-td-day.we{background:rgba(255,78,107,.18);}
.assv2-td-day.we span{color:var(--red);}
.assv2-td-day.fes{background:rgba(78,184,255,.18);}
.assv2-td-day.fes span{color:var(--blu);}
.assv2-td-day.ca{background:rgba(255,107,53,.25);}
.assv2-td-day.ca span{color:var(--or);}
.assv2-td-day.oggi{box-shadow:inset 0 -3px 0 var(--acc);}
.assv2-td-day.has-ass span{font-weight:700;}

/* Riga chiusure */
td.assv2-col-name.assv2-ch-name{background:rgba(255,107,53,.08);font-style:italic;color:var(--or);font-size:10px;}
.assv2-td-ch{cursor:pointer;}

/* Tema chiaro/scuro */
function applyTheme(theme) {
  if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else document.documentElement.removeAttribute('data-theme');
  const btn = document.getElementById('btn-theme');
  if (btn) btn.textContent = theme === 'light' ? '☀️' : '🌙';
}
function toggleTheme() {
  const cur = localStorage.getItem('theme') || 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next);
  applyTheme(next);
}
applyTheme(localStorage.getItem('theme') || 'dark');

const TIPI = [
  { id:'trasferta',    label:'Trasferta',    color:'#4effa3' },
  { id:'consegna',     label:'Consegna',     color:'#ff4e6b' },
  { id:'manutenzione', label:'Manutenzione', color:'#ff6b35' },
  { id:'altro',        label:'Altro',        color:'#b84eff' },
];
const TIPO_COLOR = Object.fromEntries(TIPI.map(t=>[t.id,t.color]));
const TIPO_BADGE = { trasferta:'bok', consegna:'berr', manutenzione:'bor', altro:'bvio' };

const $ = s => document.querySelector(s);
const el = (tag, attrs={}, ...children) => {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'style') e.style.cssText = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function')
      e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (attrs[k] !== false && attrs[k] !== null && attrs[k] !== undefined)
      e.setAttribute(k, attrs[k]);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
};
const z = n => String(n).padStart(2,'0');
const toLocalISO = d => `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;
const parseISODate = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
const monthName = d => d.toLocaleDateString('it-IT', { month:'long', year:'numeric' });
const fmtIT = iso => { const d = parseISODate(iso); return `${z(d.getDate())}/${z(d.getMonth()+1)}/${d.getFullYear()}`; };
const fmtT = d => `${z(d.getHours())}:${z(d.getMinutes())}`;

function toast(msg, kind='ok') {
  const t = el('div', { class:'toast'+(kind==='err'?' err':'') }, msg);
  $('#toast-root').appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}

// Rileva modalità kiosk dall'URL: ?kiosk=sede1 oppure ?kiosk=sede2
const KIOSK_SEDI_VALIDE = ['sede1', 'sede2'];
const KIOSK_PARAM = new URLSearchParams(location.search).get('kiosk');
const IS_KIOSK = KIOSK_PARAM && KIOSK_SEDI_VALIDE.includes(KIOSK_PARAM);
const KIOSK_PARAM_INVALIDO = KIOSK_PARAM && !IS_KIOSK;

// Credenziali account kiosk condiviso (creato a mano su Supabase, vedi istruzioni)
const KIOSK_EMAIL = 'kiosk@cablotec.local';
const KIOSK_PASSWORD = 'kiosk-cablotec-2026';

// True se questo operatore o profilo è l'account tecnico kiosk
function isKioskRecord(rec) {
  if (!rec) return false;
  return (rec.email || '').toLowerCase() === KIOSK_EMAIL.toLowerCase();
}

async function init() {
  if (SUPABASE_URL.includes('XXXX') || SUPABASE_ANON_KEY.includes('INSERISCI')) {
    document.body.innerHTML = `
      <div class="setup">
        <h1>⚠ Configurazione mancante</h1>
        <p>Apri questo file con un editor e in cima imposta:</p>
        <ul style="margin:10px 0 10px 20px;">
          <li><code>SUPABASE_URL</code></li>
          <li><code>SUPABASE_ANON_KEY</code></li>
        </ul>
        <p>Le trovi nella dashboard Supabase → <em>Project Settings → API</em>.</p>
      </div>`;
    return;
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true,
    },
  });

  // ─── PARAMETRO KIOSK NON VALIDO ───
  if (KIOSK_PARAM_INVALIDO) {
    document.body.innerHTML = `
      <div class="setup">
        <h1>⚠ Postazione kiosk non valida</h1>
        <p>Il valore <code>?kiosk=${KIOSK_PARAM.replace(/[<>"&]/g,'')}</code> non corrisponde a nessuna postazione configurata.</p>
        <p>Postazioni valide: ${KIOSK_SEDI_VALIDE.map(s=>'<code>'+s+'</code>').join(', ')}</p>
        <p style="margin-top:14px;"><a href="/" style="color:var(--acc);">← Torna all'app normale</a></p>
      </div>`;
    return;
  }

  // ─── MODALITÀ KIOSK ───
  if (IS_KIOSK) {
    await kioskInit();
    return;
  }

  // ─── MODALITÀ NORMALE ───
  const { data: { session } } = await sb.auth.getSession();
  state.session = session;
  if (session) await afterLogin();
  else renderAuth();
  sb.auth.onAuthStateChange(async (_e, sess) => {
    state.session = sess;
    if (sess) await afterLogin();
    else { state.profile = null; renderAuth(); }
  });
}

function renderAuth() {
  $('#app-screen').style.display = 'none';
  const root = $('#auth-screen');
  root.style.display = 'flex';
  root.innerHTML = '';

  const box = el('div', { class:'auth-box' });
  box.append(
    el('h2', { html:'Cabl<span>otec</span>' }),
    el('div', { class:'auth-sub' }, 'Sistema gestionale — accedi'),
  );

  const form = el('form');
  form.append(
    el('div', { class:'field' }, el('label', {}, 'Email'),
      el('input', { type:'email', name:'email', required:'true', autocomplete:'email' })),
    el('div', { class:'field' }, el('label', {}, 'Password'),
      el('input', { type:'password', name:'password', required:'true', minlength:'6',
                    autocomplete:'current-password' })),
    el('button', { type:'submit', class:'btnp', style:'width:100%;padding:11px;margin-top:6px;' },
      'Accedi'),
  );
  const msg = el('div', { class:'auth-msg' });
  form.append(msg);
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.className = 'auth-msg';
    msg.textContent = 'Attendere…';
    const fd = new FormData(form);
    try {
      const { error } = await sb.auth.signInWithPassword({
        email: fd.get('email'), password: fd.get('password'),
      });
      if (error) throw error;
    } catch (err) {
      msg.className = 'auth-msg err';
      msg.textContent = err.message || 'Errore di accesso';
    }
  });
  box.append(form);

  box.append(el('div', { class:'auth-foot', style:'margin-top:16px;font-size:11px;color:var(--mut);text-align:center;line-height:1.6;' },
    'Gli account vengono creati dall\'amministratore.',
    el('br'),
    'Per problemi di accesso contatta l\'ufficio.'));

  root.append(box);
}

async function afterLogin() {
  const uid = state.session.user.id;
  const { data: prof } = await sb.from('profili').select('*').eq('id', uid).maybeSingle();
  state.profile = prof || { id:uid, email:state.session.user.email, nome:state.session.user.email, ruolo:'user' };

  $('#auth-screen').style.display = 'none';
  $('#app-screen').style.display = 'block';
  $('#user-name').innerHTML = '<b>'+(state.profile.nome || state.profile.email)+'</b>';
  $('#role-pill').innerHTML = state.profile.ruolo === 'admin'
    ? '<span class="badge bvio">admin</span>' : '<span class="badge bgry">user</span>';
  $('#area-gestione').style.display = state.profile.ruolo === 'admin' ? '' : 'none';
  $('#kiosk-jump').style.display = state.profile.ruolo === 'admin' ? '' : 'none';
  applyTheme(localStorage.getItem('theme') || 'dark');

  bindTabs();

  // Carico tutto una volta sola, in parallelo
  const root = $('#tab-content');
  root.innerHTML = '<div class="empty">Caricamento…</div>';
  try {
    await loadAllData();
    state.loaded = true;
    startRealtime();
    renderTab(state.currentTab);
  } catch (e) {
    console.error('Errore caricamento dati:', e);
    root.innerHTML = '';

    .on('postgres_changes', { event:'*', schema:'public', table:'prenotazioni_utenti' },

    .on('postgres_changes', { event:'*', schema:'public', table:'usi_mezzo' },

    .on('postgres_changes', { event:'*', schema:'public', table:'clienti' },

function applyChange(tabella, payload) {
  const ev = payload.eventType;
  const row = payload.new;
  const oldRow = payload.old;

  if (tabella === 'prenotazioni') {
    if (ev === 'INSERT') {
      if (!state.prenotazioni.find(x => x.id === row.id)) state.prenotazioni.push(row);
    } else if (ev === 'UPDATE') state.prenotazioni = state.prenotazioni.map(x => x.id === row.id ? row : x);
    else if (ev === 'DELETE') state.prenotazioni = state.prenotazioni.filter(x => x.id !== oldRow.id);
  } else if (tabella === 'mezzi') {
    if (ev === 'INSERT') {
      if (!state.mezzi.find(x => x.id === row.id)) state.mezzi.push(row);
    } else if (ev === 'UPDATE') state.mezzi = state.mezzi.map(x => x.id === row.id ? row : x);
    else if (ev === 'DELETE') state.mezzi = state.mezzi.filter(x => x.id !== oldRow.id);
  } else if (tabella === 'utenti') {
    if (ev === 'INSERT') {
      if (!state.utenti.find(x => x.id === row.id)) state.utenti.push(row);
      state.utentiById[row.id] = row;
    } else if (ev === 'UPDATE') {
      state.utenti = state.utenti.map(x => x.id === row.id ? row : x);
      state.utentiById[row.id] = row;
    } else if (ev === 'DELETE') {
      state.utenti = state.utenti.filter(x => x.id !== oldRow.id);
      delete state.utentiById[oldRow.id];
    }
  } else if (tabella === 'profili') {
    if (ev === 'INSERT' || ev === 'UPDATE') state.profiliById[row.id] = row;
    else if (ev === 'DELETE') delete state.profiliById[oldRow.id];
  } else if (tabella === 'consegne') {
    if (ev === 'INSERT') {
      if (!state.consegne.find(x => x.id === row.id)) state.consegne.push(row);
    } else if (ev === 'UPDATE') state.consegne = state.consegne.map(x => x.id === row.id ? row : x);
    else if (ev === 'DELETE') state.consegne = state.consegne.filter(x => x.id !== oldRow.id);
  } else if (tabella === 'prenotazioni_utenti') {
    if (ev === 'INSERT') {
      const dup = state.prenOp.find(x =>
        x.prenotazione_id === row.prenotazione_id && x.utente_id === row.utente_id);
      if (!dup) state.prenOp.push(row);
    } else if (ev === 'DELETE') state.prenOp = state.prenOp.filter(x =>
      !(x.prenotazione_id === oldRow.prenotazione_id && x.utente_id === oldRow.utente_id));
  } else if (tabella === 'usi_mezzo') {
    if (ev === 'INSERT') {
      if (!state.usiMezzo.find(x => x.id === row.id)) state.usiMezzo.push(row);
    } else if (ev === 'UPDATE') {
      state.usiMezzo = state.usiMezzo.map(x => x.id === row.id ? row : x);
    } else if (ev === 'DELETE') {
      state.usiMezzo = state.usiMezzo.filter(x => x.id !== oldRow.id);
    }
  } else if (tabella === 'clienti') {
    if (ev === 'INSERT') {
      if (!state.clienti.find(x => x.id === row.id)) state.clienti.push(row);
    } else if (ev === 'UPDATE') {
      state.clienti = state.clienti.map(x => x.id === row.id ? row : x);
    } else if (ev === 'DELETE') {
      state.clienti = state.clienti.filter(x => x.id !== oldRow.id);
    }
  } else if (tabella === 'articoli') {
    if (ev === 'INSERT') {
      if (!state.articoli.find(x => x.id === row.id)) state.articoli.push(row);
    } else if (ev === 'UPDATE') {
      state.articoli = state.articoli.map(x => x.id === row.id ? row : x);
    } else if (ev === 'DELETE') {
      state.articoli = state.articoli.filter(x => x.id !== oldRow.id);
    }
  } else if (tabella === 'tipi_lavorazione') {
    if (ev === 'INSERT') {
      if (!state.tipiLav.find(x => x.id === row.id)) state.tipiLav.push(row);
    } else if (ev === 'UPDATE') {
      state.tipiLav = state.tipiLav.map(x => x.id === row.id ? row : x);
    } else if (ev === 'DELETE') {
      state.tipiLav = state.tipiLav.filter(x => x.id !== oldRow.id);
    }
  } else if (tabella === 'chiusure_aziendali') {
    if (ev === 'INSERT') {
      if (!state.chiusure.find(x => x.id === row.id)) state.chiusure.push(row);
    } else if (ev === 'UPDATE') {
      state.chiusure = state.chiusure.map(x => x.id === row.id ? row : x);
    } else if (ev === 'DELETE') {
      state.chiusure = state.chiusure.filter(x => x.id !== oldRow.id);
    }
  } else if (tabella === 'operazioni') {
    if (ev === 'INSERT') {
      if (!state.operazioni.find(x => x.id === row.id)) state.operazioni.push(row);
    } else if (ev === 'UPDATE') {
      state.operazioni = state.operazioni.map(x => x.id === row.id ? row : x);
    } else if (ev === 'DELETE') {
      state.operazioni = state.operazioni.filter(x => x.id !== oldRow.id);
    }
  } else if (tabella === 'sessioni_lavoro') {
    if (ev === 'INSERT') {
      if (!state.sessioni.find(x => x.id === row.id)) state.sessioni.unshift(row);
    } else if (ev === 'UPDATE') {
      state.sessioni = state.sessioni.map(x => x.id === row.id ? row : x);
    } else if (ev === 'DELETE') {
      state.sessioni = state.sessioni.filter(x => x.id !== oldRow.id);
    }
  } else if (tabella === 'tipi_assenza') {
    if (ev === 'INSERT') {
      if (!state.tipiAssenza.find(x => x.id === row.id)) state.tipiAssenza.push(row);
    } else if (ev === 'UPDATE') {
      state.tipiAssenza = state.tipiAssenza.map(x => x.id === row.id ? row : x);
    } else if (ev === 'DELETE') {
      state.tipiAssenza = state.tipiAssenza.filter(x => x.id !== oldRow.id);
    }
  } else if (tabella === 'assenze') {
    if (ev === 'INSERT') {
      if (!state.assenze.find(x => x.id === row.id)) state.assenze.unshift(row);
    } else if (ev === 'UPDATE') {
      state.assenze = state.assenze.map(x => x.id === row.id ? row : x);
    } else if (ev === 'DELETE') {
      state.assenze = state.assenze.filter(x => x.id !== oldRow.id);
    }
  } else if (tabella === 'operazioni_addetti') {
    // PK composta (operazione_id, utente_id) — no campo id
    const matchKey = (a, b) =>
      a.operazione_id === b.operazione_id && a.utente_id === b.utente_id;
    if (ev === 'INSERT') {
      if (!state.opAddetti.find(x => matchKey(x, row))) state.opAddetti.push(row);
    } else if (ev === 'DELETE') {
      state.opAddetti = state.opAddetti.filter(x => !matchKey(x, oldRow));
    }
    // UPDATE non dovrebbe mai succedere su una tabella ponte pura
  }

  // Re-render solo la tab attiva
  if (state.loaded) renderTab(state.currentTab);
}

function loadPrenotazioneOperatori(prenId) {
  // Legge dalla cache in memoria (sync)
  return state.prenOp.filter(r => r.prenotazione_id === prenId).map(r => r.utente_id);
}

// Restituisce gli id degli addetti previsti di un'operazione (dalla cache, sync)
function getOperazioneAddetti(opId) {
  return state.opAddetti.filter(r => r.operazione_id === opId).map(r => r.utente_id);
}

// Sincronizza gli addetti previsti di un'operazione: diff tra vecchi e nuovi
// Ritorna { error } o {} se ok.
async function syncOperazioneAddetti(opId, nuoviIds) {
  const vecchi = getOperazioneAddetti(opId);
  const daAggiungere = nuoviIds.filter(id => !vecchi.includes(id));
  const daRimuovere = vecchi.filter(id => !nuoviIds.includes(id));

  // Inserisci nuovi
  if (daAggiungere.length) {
    const rows = daAggiungere.map(uid => ({ operazione_id: opId, utente_id: uid }));
    const { error } = await sb.from('operazioni_addetti').insert(rows);
    if (error) return { error };
    // Aggiorna cache locale (il realtime lo farà anche, ma evitiamo flicker)
    rows.forEach(r => { if (!state.opAddetti.find(x => x.operazione_id===r.operazione_id && x.utente_id===r.utente_id)) state.opAddetti.push(r); });
  }
  // Rimuovi vecchi
  for (const uid of daRimuovere) {
    const { error } = await sb.from('operazioni_addetti')
      .delete()
      .eq('operazione_id', opId)
      .eq('utente_id', uid);
    if (error) return { error };
    state.opAddetti = state.opAddetti.filter(x => !(x.operazione_id===opId && x.utente_id===uid));
  }
  return {};
}

// Restituisce etichetta breve + dettaglio della destinazione di una prenotazione.
// Una prenotazione può avere 0..N consegne (tappe). Ogni consegna ha un cliente_id (opz).
// → { breve: 'TEMA SINERGIE' | 'TEMA SINERGIE +2' | 'Multi-stop' | '—', tooltip: 'lista cli' }
function getPrenotazioneDestinazione(prenId) {
  const cons = state.consegne
    .filter(c => c.prenotazione_id === prenId)
    .sort((a,b) => (a.ordine||0) - (b.ordine||0));
  if (cons.length === 0) return { breve: '—', tooltip: 'Nessuna destinazione' };
  const nomi = cons.map(c => {
    if (c.cliente_id) {
      const cli = state.clienti.find(x => x.id === c.cliente_id);
      return cli ? cli.nome : '(cliente eliminato)';
    }
    return c.descrizione || '(senza destinazione)';
  });
  // Etichetta breve: primo nome + "+N" se ce ne sono altri
  let breve;
  if (cons.length === 1) breve = nomi[0];
  else breve = nomi[0] + ' +' + (cons.length - 1);
  // Tooltip: lista completa
  const tooltip = nomi.map((n, i) => (i+1) + '. ' + n).join('\n');
  return { breve, tooltip };
}

// Verifica sovrapposizioni dalla cache in memoria (no fetch)
function checkSovrapposizioni(mezzoId, dataInizio, dataFine, escludiId) {
  return state.prenotazioni.filter(p => {
    if (p.mezzo_id !== mezzoId) return false;
    if (escludiId && p.id === escludiId) return false;
    return p.data_inizio <= dataFine && p.data_fine >= dataInizio;
  });
}

function bindTabs() {
  // Click sulla macro-area: mostra le sotto-tab e attiva la prima accessibile
  $('#tabs-macro').querySelectorAll('button').forEach(b => {
    b.onclick = () => {
      selectArea(b.dataset.area);
    };
  });
  // All'avvio, seleziono la macro-area "Calendari"
  selectArea('calendari');
}

function selectArea(areaId) {
  state.currentArea = areaId;
  // Aggiorna stato visivo macro-area
  $('#tabs-macro').querySelectorAll('button').forEach(b => {
    b.classList.toggle('active', b.dataset.area === areaId);
  });
  // Genera le sotto-tab
  const area = TAB_STRUCTURE[areaId];
  if (!area) return;
  const isAdmin = state.profile?.ruolo === 'admin';
  const sub = $('#tabs');
  sub.innerHTML = '';
  area.tabs.forEach(t => {
    if (t.adminOnly && !isAdmin) return;
    const btn = el('button', {
      class: 'navtab',
      'data-tab': t.id,
      onclick: () => selectTab(t.id),
    }, t.label);
    sub.appendChild(btn);
  });
  // Attiva la prima sotto-tab disponibile
  const firstBtn = sub.querySelector('button');
  if (firstBtn) selectTab(firstBtn.dataset.tab);
}

function selectTab(tabId) {
  // Cleanup eventuali timer di tab precedenti
  if (typeof ganttLiveTimer !== 'undefined' && ganttLiveTimer) {
    clearInterval(ganttLiveTimer); ganttLiveTimer = null;
  }
  $('#tabs').querySelectorAll('button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabId);
  });
  renderTab(tabId);
}

// Salta a una tab di una specifica macro-area (es. dal calendario → Gestione/Assenze)
function switchToTab(areaId, tabId) {
  selectArea(areaId);
  // selectArea attiva la prima tab; ora forziamo quella richiesta
  const btn = $('#tabs').querySelector(`button[data-tab="${tabId}"]`);
  if (btn) selectTab(tabId);
}

// renderTab ora è SINCRONO: legge solo dalla cache in memoria
function renderTab(name) {
  state.currentTab = name;
  const root = $('#tab-content');
  if (!state.loaded) { root.innerHTML = '<div class="empty">Caricamento…</div>'; return; }
  try {
    if (name === 'generale')          renderGenerale(root);
    else if (name === 'cal_mezzi')    renderCalMezzi(root);
    else if (name === 'cal_assenze')  renderAssenze(root);
    else if (name === 'mezzi')        renderMezzi(root);
    else if (name === 'clienti')      renderClienti(root);
    else if (name === 'articoli')     renderArticoli(root);
    else if (name === 'tipi_lav')     renderTipiLavorazione(root);
    else if (name === 'operatori')    renderOperatori(root);
    else if (name === 'pianificazione') renderPianificazione(root);
    else if (name === 'storico') renderStorico(root);
    else if (name === 'gantt') renderGantt(root);
    else if (name === 'chiusure') renderChiusure(root);
    else if (name === 'tipi_assenza') renderTipiAssenza(root);
  } catch (e) {
    console.error('Errore rendering tab '+name+':', e);
    root.innerHTML = '';
    root.append(el('div', { class:'empty', style:'color:var(--red);' },
      el('div', { style:'margin-bottom:10px;' }, '⚠ Errore: '+(e.message||'sconosciuto')),
      el('button', { class:'btnp', onclick:()=>renderTab(name) }, 'Riprova'),
    ));
  }
}
