<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#161614">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cablotec Mobile</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="core/db.js?v=2026-07-09.4"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');
:root{
  --bg:#161614; --sur:#1f1f1c; --sur2:#262622; --brd:#3a3a34;
  --txt:#eaeae4; --mut:#8a8a80; --acc:#d4ff4e;
  --grn:#5ad45a; --red:#ff5a5a; --yel:#ffd45a; --blu:#5aa5ff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg); color:var(--txt);
  font-family:'Syne',sans-serif; font-size:15px;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  display:flex; flex-direction:column;
}
button{font-family:inherit;}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px 12px;border-bottom:2px solid var(--acc);}
.hdr-title{font-size:18px;font-weight:800;letter-spacing:-.01em;}
.hdr-title span{color:var(--acc);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-op{font-family:'DM Mono',monospace;font-size:12px;color:var(--bg);background:var(--acc);border:none;border-radius:20px;padding:7px 14px;font-weight:700;cursor:pointer;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-btn{background:var(--sur2);border:1px solid var(--brd);color:var(--txt);border-radius:8px;width:38px;height:34px;font-size:16px;cursor:pointer;}

/* ── Nav sezioni (Lavoro / Mezzi / Ferie) ── */
.mnav{display:flex;gap:4px;padding:8px 14px 0;border-bottom:1px solid var(--brd);}
.mnav-btn{flex:1;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--mut);font-family:'DM Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:9px 4px;cursor:pointer;}
.mnav-btn.act{color:var(--acc);border-bottom-color:var(--acc);}
.soon{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--mut);text-align:center;padding:30px 24px;}
.soon .big{font-size:40px;}
.soon .ttl{font-size:17px;font-weight:800;color:var(--txt);}

/* ── Step ── */
.step{flex:1;display:none;flex-direction:column;overflow:hidden;padding:14px 14px 18px;}
.step.on{display:flex;}
.step-title{font-size:16px;font-weight:700;margin-bottom:12px;text-align:center;}

/* ── Boot ── */
.boot{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--mut);text-align:center;padding:24px;}
.boot .big{font-size:18px;color:var(--txt);font-weight:700;}
.spin{width:34px;height:34px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:sp 1s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.boot button{background:var(--acc);color:var(--bg);border:none;border-radius:8px;padding:12px 24px;font-weight:700;font-size:15px;cursor:pointer;}

/* ── Operatori ── */
.op-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;overflow-y:auto;align-content:start;flex:1;padding-bottom:8px;}
.op-tile{background:var(--sur);border:2px solid var(--brd);border-radius:10px;padding:18px 10px;text-align:center;font-size:15px;font-weight:700;color:var(--txt);cursor:pointer;min-height:64px;display:flex;align-items:center;justify-content:center;}
.op-tile:active{border-color:var(--acc);background:rgba(212,255,78,.06);}

/* ── Home: liste commesse ── */
.search{width:100%;background:var(--sur);border:1px solid var(--brd);border-radius:10px;color:var(--txt);font-family:'DM Mono',monospace;font-size:14px;padding:13px 14px;margin-bottom:12px;outline:none;}
.search:focus{border-color:var(--acc);}
.login-go{width:100%;background:var(--acc);color:var(--bg);border:none;border-radius:10px;padding:14px;font-weight:700;font-size:15px;cursor:pointer;margin-top:4px;}
.login-go:disabled{opacity:.6;}
.login-err{color:#ff6b5e;font-size:13px;text-align:center;min-height:18px;margin:8px 0;}
.login-hi{font-size:15px;font-weight:700;text-align:center;margin:6px 0 12px;}
.login-msg{color:var(--acc);font-size:13px;text-align:center;padding:6px 0 12px;}

/* ── Gate login (a tutto schermo) / App ── */
#auth-screen{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;}
#app-screen{flex:1;display:none;flex-direction:column;min-height:0;}
.auth-box{width:100%;max-width:330px;display:flex;flex-direction:column;gap:12px;}
.auth-logo{font-size:26px;font-weight:800;text-align:center;letter-spacing:-.01em;margin-bottom:2px;}
.auth-logo span{color:var(--acc);}
.auth-sub{font-size:12px;color:var(--mut);text-align:center;margin:-6px 0 8px;}
.auth-boot{display:flex;flex-direction:column;align-items:center;gap:14px;color:var(--mut);}
.auth-foot{font-size:11px;color:var(--mut);text-align:center;line-height:1.6;margin-top:10px;}

/* ── Mezzi / prenotazioni ── */
.mezzi-cta{width:100%;background:var(--acc);color:var(--bg);border:none;border-radius:10px;padding:14px;font-weight:700;font-size:15px;cursor:pointer;margin-bottom:14px;}
.mezzo-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px;flex:none;}
.cr-line1{display:flex;align-items:center;font-size:15px;font-weight:700;}
.cr-del{margin-top:8px;background:rgba(255,107,94,.1);border:1px solid #ff6b5e;color:#ff6b5e;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;}
.mz-field{margin-bottom:12px;}
.mz-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--acc);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;display:block;}
.mz-row{display:flex;gap:10px;}
.mz-row .mz-field{flex:1;}
.mz-input{width:100%;background:var(--sur);border:1px solid var(--brd);border-radius:10px;color:var(--txt);font-family:'DM Mono',monospace;font-size:14px;padding:12px;outline:none;}
.mz-input:focus{border-color:var(--acc);}
.mz-avail{background:var(--sur2);border:1px solid var(--brd);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--mut);margin-bottom:12px;}
.mz-avail .ok{color:var(--acc);font-weight:700;}
.mz-avail .busy{color:#ff6b5e;}
.mz-busy-row{font-family:'DM Mono',monospace;font-size:12px;color:var(--mut);margin-top:4px;}
.mz-chip{display:inline-flex;align-items:center;gap:6px;background:var(--sur2);border:1px solid var(--brd);border-radius:16px;padding:5px 10px;font-size:12px;margin:0 6px 8px 0;}
.mz-chip-x{background:none;border:none;color:var(--mut);cursor:pointer;font-size:13px;padding:0;line-height:1;}
.mz-droplist{max-height:170px;overflow-y:auto;border:1px solid var(--brd);border-radius:10px;margin-top:6px;background:var(--sur);}
.mz-drop-row{padding:11px 12px;cursor:pointer;border-bottom:1px solid var(--brd);font-size:14px;}
.mz-drop-row:last-child{border-bottom:none;}
.mz-drop-row:active{background:rgba(212,255,78,.06);}
.fr-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.fr-chip{background:transparent;border:2px solid var(--brd);border-radius:8px;padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer;}
.fr-stepper{display:flex;align-items:center;gap:8px;}
.fr-step{width:42px;height:42px;font-size:20px;font-weight:700;background:var(--sur2);border:2px solid var(--brd);color:var(--txt);border-radius:8px;cursor:pointer;}
.mz-addtappa{background:var(--sur2);border:1px dashed var(--brd);color:var(--acc);border-radius:8px;padding:9px;width:100%;font-weight:700;cursor:pointer;margin-top:4px;}
.mz-tappa{border:1px solid var(--brd);border-radius:10px;padding:10px;margin-bottom:8px;background:var(--sur);}
.mz-tappa-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);}
.mz-incorso{background:rgba(212,255,78,.07);border:1px solid var(--acc);border-radius:10px;padding:12px;margin-bottom:14px;}
.mz-incorso-hd{font-weight:800;margin-bottom:8px;}
.mz-tappa-line{font-size:14px;padding:3px 0;}
/* ── Calendario ferie ── */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin:4px 0 10px;}
.cal-title{font-weight:800;font-size:16px;}
.cal-nav{width:42px;height:36px;background:var(--sur2);border:1px solid var(--brd);color:var(--txt);border-radius:8px;font-size:18px;cursor:pointer;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);padding-bottom:2px;}
.cal-cell{position:relative;aspect-ratio:1;border:1px solid var(--brd);border-radius:8px;background:var(--sur);padding:4px;cursor:pointer;overflow:hidden;}
.cal-cell.empty{border:none;background:transparent;cursor:default;}
.cal-cell.has{border-color:var(--mut);}
.cal-cell.mia{border-color:var(--acc);background:rgba(212,255,78,.10);}
.cal-cell.sel{outline:2px solid var(--acc);outline-offset:-1px;}
.cal-cell.oggi .cal-num{color:var(--acc);font-weight:800;}
.cal-num{font-size:13px;font-weight:700;line-height:1;}
.cal-mine{position:absolute;left:5px;bottom:5px;width:8px;height:8px;border-radius:50%;}
.cal-count{position:absolute;right:4px;bottom:3px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);}
.comm-row.mia-row{border-color:var(--acc);}
.scroll{flex:1;overflow-y:auto;padding-bottom:10px;}
.sec-hd{font-family:'DM Mono',monospace;font-size:10px;color:var(--acc);letter-spacing:.1em;text-transform:uppercase;margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--acc);}
.sec-hd.dim{color:var(--mut);border-color:var(--brd);}
.comm-list{display:flex;flex-direction:column;gap:8px;}
.comm-row{position:relative;background:var(--sur);border:1px solid var(--brd);border-radius:10px;padding:12px 14px;text-align:left;cursor:pointer;color:var(--txt);width:100%;}
.comm-row:active{border-color:var(--acc);background:rgba(212,255,78,.06);}
.cr-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.cr-cod{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;}
.cr-cli{font-size:12px;color:var(--mut);}
.cr-sub{font-size:12px;color:var(--mut);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);margin-top:6px;display:flex;gap:12px;flex-wrap:wrap;}
.cr-scad.late{color:var(--red);font-weight:700;}
.cr-reopen{position:absolute;top:10px;right:10px;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:var(--acc);background:rgba(212,255,78,.08);border:1px solid var(--acc);border-radius:6px;padding:5px 10px;cursor:pointer;}
.toggle-btn{width:100%;background:var(--sur2);border:1px dashed var(--brd);color:var(--mut);border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px;}
.empty{color:var(--mut);text-align:center;padding:26px 12px;font-size:13px;}

/* ── Scelta fase/tipo ── */
.fase-info{background:var(--sur);border:1px solid var(--brd);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.fase-hint{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);text-align:center;margin-bottom:10px;}
.fase-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:9px;padding-bottom:8px;}
.fase-btn{position:relative;display:flex;align-items:center;gap:12px;background:var(--sur);border:2px solid var(--brd);border-radius:10px;padding:16px 14px;cursor:pointer;color:var(--txt);text-align:left;width:100%;}
.fase-btn:active{filter:brightness(1.15);}
.fase-btn.mia{border-color:var(--acc);}
.fase-color{width:8px;align-self:stretch;border-radius:4px;flex-shrink:0;}
.fase-name{font-size:16px;font-weight:700;flex:1;}
.fase-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--mut);}
.fase-mia-tag{position:absolute;top:-9px;right:10px;font-family:'DM Mono',monospace;font-size:9px;font-weight:700;color:var(--bg);background:var(--acc);border-radius:6px;padding:2px 8px;}
.fase-sep{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);letter-spacing:.08em;text-transform:uppercase;margin:14px 0 4px;}
.back-link{background:none;border:none;color:var(--mut);font-size:14px;font-weight:700;cursor:pointer;padding:10px;margin-top:4px;}

/* ── Sessione attiva ── */
.att-card{background:var(--sur);border:3px solid var(--grn);border-radius:14px;padding:18px 16px;margin-bottom:14px;}
.att-tipo{display:flex;align-items:center;gap:10px;margin-top:12px;font-weight:700;}
.att-stats{display:flex;gap:12px;margin-top:14px;}
.att-block{flex:1;background:var(--sur2);border-radius:10px;padding:10px;text-align:center;}
.att-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);letter-spacing:.08em;text-transform:uppercase;}
.att-value{font-family:'DM Mono',monospace;font-size:21px;font-weight:700;margin-top:4px;}
.att-actions{display:flex;flex-direction:column;gap:10px;}
.att-btn{padding:17px;font-size:15px;font-weight:800;border:none;border-radius:10px;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;}
.att-btn.fine{background:var(--grn);color:#0f0f0e;}
.att-btn.pausa{background:var(--yel);color:#0f0f0e;}
.att-btn.ghost{background:var(--sur2);color:var(--txt);border:1px solid var(--brd);text-transform:none;}
.att-warn{background:rgba(255,212,90,.08);border:1px solid var(--yel);color:var(--yel);border-radius:10px;padding:10px 12px;font-size:12px;margin-bottom:12px;}

/* ── Conferma ── */
.done{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
.done-card{background:var(--sur);border:3px solid var(--grn);border-radius:14px;padding:30px 26px;text-align:center;max-width:340px;width:100%;}
.done-card.err{border-color:var(--red);}
.done-icon{font-size:46px;color:var(--grn);margin-bottom:12px;}
.done-card.err .done-icon{color:var(--red);}
.done-msg{font-size:20px;font-weight:800;margin-bottom:8px;}
.done-detail{font-family:'DM Mono',monospace;font-size:12px;color:var(--mut);white-space:pre-line;}
</style>
</head>
<body>

<!-- Gate di login: a tutto schermo, PRIMA dell'app (come nel gestionale) -->
<div id="auth-screen"></div>

<!-- App vera e propria: nascosta finché non si è loggati -->
<div id="app-screen">

<div class="hdr">
  <div class="hdr-title">Cablotec <span>Mobile</span></div>
  <div class="hdr-right">
    <button class="hdr-op" id="hdr-op" style="display:none" onclick="logout()">—</button>
    <button class="hdr-btn" title="Aggiorna" onclick="ricarica()">⟳</button>
  </div>
</div>

<div class="mnav">
  <button class="mnav-btn act" id="nav-lavoro" onclick="navTo('lavoro')">⏱ Lavoro</button>
  <button class="mnav-btn" id="nav-mezzi" onclick="navTo('mezzi')">🚐 Mezzi</button>
  <button class="mnav-btn" id="nav-ferie" onclick="navTo('ferie')">🏖 Ferie</button>
</div>

<!-- 2. Home: le mie commesse -->
<div class="step" id="step-home">
  <input type="text" class="search" id="home-search" placeholder="🔍 Cerca commessa…">
  <div class="scroll" id="home-list"></div>
</div>

<!-- 3. Scelta fase / tipo -->
<div class="step" id="step-fase">
  <div class="fase-info" id="fase-info"></div>
  <div class="fase-hint" id="fase-hint"></div>
  <div class="fase-list" id="fase-list"></div>
  <button class="back-link" onclick="goHome()">‹ Indietro</button>
</div>

<!-- 4. Sessione attiva -->
<div class="step" id="step-att">
  <div class="step-title" id="att-title">Stai lavorando</div>
  <div class="scroll" id="att-content"></div>
</div>

<!-- 5. Conferma -->
<div class="step" id="step-done">
  <div class="done"><div class="done-card" id="done-card"></div></div>
</div>

<!-- Sezione Mezzi (renderizzata da JS) -->
<div class="step" id="step-mezzi">
  <div id="mezzi-root" class="scroll"></div>
</div>
<!-- Sezione Ferie (renderizzata da JS) -->
<div class="step" id="step-ferie">
  <div id="ferie-root" class="scroll"></div>
</div>

</div><!-- /#app-screen -->

<script>
// ═══════════════ CONFIG ═══════════════
// URL/key Supabase e account tecnico vivono in core/db.js (condiviso).
const SEDE_TIMBRO  = 'mobile';   // marca le sessioni avviate dal telefono

// ═══════════════ Manifest PWA ═══════════════
(function(){
  const icon = 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">' +
    '<rect width="512" height="512" rx="96" fill="#161614"/>' +
    '<circle cx="256" cy="276" r="150" fill="none" stroke="#d4ff4e" stroke-width="30"/>' +
    '<path d="M256 276V176M256 276l70 50" stroke="#d4ff4e" stroke-width="28" stroke-linecap="round"/>' +
    '<path d="M196 96h120" stroke="#d4ff4e" stroke-width="30" stroke-linecap="round"/>' +
    '</svg>');
  const manifest = {
    name: 'Cablotec Mobile',
    short_name: 'Cablotec',
    start_url: location.href.split('#')[0],
    scope: location.href.replace(/[^/]*$/, ''),
    display: 'standalone',
    background_color: '#161614',
    theme_color: '#161614',
    icons: [{ src: icon, sizes: 'any', type: 'image/svg+xml', purpose: 'any' }],
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);
})();

// ═══════════════ Stato ═══════════════
const $ = s => document.querySelector(s);
// `sb` è dichiarato e gestito in core/db.js
let mezziVista = 'lista';   // 'lista' | 'form' — vista corrente della sezione Mezzi
let ferieVista = 'lista';   // 'lista' | 'form' — vista corrente della sezione Ferie
let ferieCal = null;        // { y, m, sel } — mese mostrato nel calendario ferie
const state = {
  utenti: [], utentiById: {}, operazioni: [], aziende: [], articoli: [],
  tipiLav: [], opFasi: [], opAddetti: [], sessioni: [], attivita: [],
  mezzi: [], prenotazioni: [], prenOp: [], consegne: [],
  tipiAssenza: [], assenze: [], impostazioni: {}, chiusure: [],
  operatore: null, opSel: null,
  search: '', vediAltre: false,
  timer: null,
};

function show(id) {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  document.querySelectorAll('.step').forEach(s => s.classList.remove('on'));
  $('#' + id).classList.add('on');
  // Evidenzia la sezione attiva nella nav
  const sez = (id === 'step-mezzi') ? 'mezzi' : (id === 'step-ferie') ? 'ferie' : 'lavoro';
  ['lavoro','mezzi','ferie'].forEach(k => {
    const b = $('#nav-' + k); if (b) b.classList.toggle('act', k === sez);
  });
}

// Navigazione tra le sezioni dell'app (Lavoro / Mezzi / Ferie).
function navTo(sez) {
  if (sez === 'mezzi') { mezziVista = 'lista'; show('step-mezzi'); renderMezzi(); return; }
  if (sez === 'ferie') { ferieVista = 'lista'; show('step-ferie'); renderFerie(); return; }
  goHome();   // 'lavoro': home timbrature (o sessione attiva se aperta)
}

function elx(tag, attrs = {}, ...children) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') n.className = v;
    else if (k.startsWith('on')) n[k] = v;
    else n.setAttribute(k, v);
  }
  for (const c of children) if (c != null) n.append(c.nodeType ? c : document.createTextNode(c));
  return n;
}
const fmtT = d => String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
const fmtIT = iso => { if (!iso) return '—'; const [y,m,g] = iso.split('-'); return g + '/' + m + '/' + y; };
const todayISO = () => { const d = new Date(); const z = n => String(n).padStart(2,'0'); return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); };
const TIPI_MEZZI = [
  { id:'trasferta', label:'Trasferta' },
  { id:'consegna', label:'Consegna' },
  { id:'manutenzione', label:'Manutenzione' },
  { id:'altro', label:'Altro' },
];

// ═══════════════ Boot e dati ═══════════════
async function boot() {
  showAuthBoot();
  try {
    creaClientSupabase('sb-cablotec-mobile');
    const { data: sd } = await sb.auth.getSession();
    const sessione = sd?.session || null;
    const emailSess = (sessione?.user?.email || '').toLowerCase();

    // Sessione di un account operatore reale già salvata sul telefono → entra diretto.
    // (L'account tecnico condiviso 'kiosk@…' non è un login valido qui.)
    if (sessione && emailSess && emailSess !== APP_EMAIL.toLowerCase()) {
      if (await entra(sessione.user.id)) return;
      await sb.auth.signOut().catch(() => {});
      renderAuth('Questo account non è collegato a un operatore. Contatta l\'ufficio.');
      return;
    }

    // Nessuna sessione utile (o vecchia sessione condivisa): pulisco e mostro il gate.
    if (sessione) await sb.auth.signOut().catch(() => {});
    renderAuth();
  } catch (e) {
    renderAuthError(e);
  }
}

// Carica i dati, mappa l'account loggato all'operatore e rivela l'app.
// Ritorna false se l'account non è collegato a nessun operatore.
async function entra(userId) {
  await loadData();
  state.operatore = state.utenti.find(u => u.account_id === userId) || null;
  if (!state.operatore) return false;
  showApp();
  aggiornaHeader();
  goHome();
  return true;
}

// Mostra il gate a tutto schermo (nasconde l'app).
function showAuthBoot() {
  $('#app-screen').style.display = 'none';
  const root = $('#auth-screen');
  root.style.display = 'flex';
  root.innerHTML = '';
  root.append(elx('div', { class:'auth-boot' },
    elx('div', { class:'spin' }), elx('div', {}, 'Connessione…')));
}
function showApp() {
  $('#auth-screen').style.display = 'none';
  $('#app-screen').style.display = 'flex';
}
function renderAuthError(e) {
  $('#app-screen').style.display = 'none';
  const root = $('#auth-screen');
  root.style.display = 'flex';
  root.innerHTML = '';
  root.append(elx('div', { class:'auth-box' },
    elx('div', { class:'auth-logo' }, '✕ Errore di avvio'),
    elx('div', { class:'auth-sub' }, String(e?.message || e)),
    elx('button', { class:'login-go', onclick: () => location.reload() }, 'Riprova')));
}

async function loadData() {
  const [ut, op, az, ar, tl, fs, ad, se, ax] = await Promise.all([
    sb.from('utenti').select('id,nome,attivo,email,account_id,gruppo').order('nome'),
    sb.from('operazioni').select('*').not('stato', 'in', '("spedita","completata")'),
    sb.from('aziende').select('id,nome,citta,provincia,attivo'),
    sb.from('articoli').select('id,codice,descrizione'),
    sb.from('tipi_lavorazione').select('id,nome,colore,attivo,ordine'),
    sb.from('operazioni_fasi').select('*'),
    sb.from('operazioni_addetti').select('*'),
    sb.from('sessioni_lavoro').select('*').is('fine', null),
    sb.from('attivita_extra').select('id,nome,colore'),
  ]);
  for (const r of [ut, op, az, ar, tl, fs, ad, se]) if (r.error) throw r.error;
  state.utenti = (ut.data || []).filter(u => u.attivo !== false &&
    (u.email || '').toLowerCase() !== APP_EMAIL.toLowerCase());
  state.utentiById = Object.fromEntries(state.utenti.map(u => [u.id, u]));
  state.operazioni = op.data || [];
  state.aziende = az.data || [];
  state.articoli = ar.data || [];
  state.tipiLav = tl.data || [];
  state.opFasi = fs.data || [];
  state.opAddetti = ad.data || [];
  state.sessioni = se.data || [];
  state.attivita = ax.data || [];   // best-effort (tabella opzionale)
  await loadMezziData();
  await loadFerieData();
}

// Dati per la sezione Ferie. Best-effort. Carico tipi, le assenze valide
// dall'inizio dell'anno (per lista + dedup), impostazioni (finestre/esenti)
// e chiusure aziendali (per saltare i giorni non lavorativi).
async function loadFerieData() {
  try {
    const annoIso = todayISO().slice(0, 4) + '-01-01';
    const [ta, as, im, ch] = await Promise.all([
      sb.from('tipi_assenza').select('*').order('ordine'),
      sb.from('assenze').select('*').eq('stato', 'valida').gte('data', annoIso),
      sb.from('impostazioni').select('*'),
      sb.from('chiusure').select('*'),
    ]);
    state.tipiAssenza = ta.data || [];
    state.assenze = as.data || [];
    state.impostazioni = Object.fromEntries((im.data || []).map(r => [r.chiave, r.valore]));
    state.chiusure = ch.data || [];
  } catch (e) { /* best-effort: la timbratura funziona comunque */ }
}

// Dati per la sezione Mezzi. Best-effort: se falliscono, la timbratura funziona
// comunque. Carico solo le prenotazioni da oggi in poi (disponibilità + le mie).
async function loadMezziData() {
  try {
    const oggi = todayISO();
    const [mz, pr, pu, co] = await Promise.all([
      sb.from('mezzi').select('*').order('nome'),
      sb.from('prenotazioni').select('*').gte('data_fine', oggi),
      sb.from('prenotazioni_utenti').select('*'),
      sb.from('consegne').select('*'),
    ]);
    state.mezzi = mz.data || [];
    state.prenotazioni = pr.data || [];
    state.prenOp = pu.data || [];
    state.consegne = co.data || [];
  } catch (e) { /* best-effort */ }
}

async function ricarica() {
  try { await loadData(); } catch (e) { /* mantengo i dati vecchi */ }
  // Re-render della schermata corrente
  if ($('#step-home').classList.contains('on')) renderHome();
  else if ($('#step-att').classList.contains('on')) goAttiva();
  else if ($('#step-mezzi').classList.contains('on') && mezziVista === 'lista') renderMezzi();
  else if ($('#step-ferie').classList.contains('on') && ferieVista === 'lista') renderFerie();
}
// Quando l'app torna in primo piano, riallinea i dati (sessioni potrebbero
// essere cambiate dal kiosk di reparto o dal gestionale).
let lastVis = 0;
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && Date.now() - lastVis > 5000) {
    lastVis = Date.now(); ricarica();
  }
});

function aggiornaHeader() {

// ═══════════════ Helper dominio (allineati al kiosk) ═══════════════
function cmpCommessa(a, b) {
  const pa = a.priorita, pb = b.priorita;
  const aHas = pa != null && pa !== '', bHas = pb != null && pb !== '';
  if (aHas && bHas && Number(pa) !== Number(pb)) return Number(pa) - Number(pb);
  if (aHas && !bHas) return -1;
  if (!aHas && bHas) return 1;
  if (!a.scadenza && !b.scadenza) return 0;
  if (!a.scadenza) return 1;
  if (!b.scadenza) return -1;
  return a.scadenza < b.scadenza ? -1 : (a.scadenza > b.scadenza ? 1 : 0);
}
const rigaAddetto = (uid, opId) =>
  state.opAddetti.find(r => r.utente_id === uid && r.operazione_id === opId) || null;
// Tutte le righe dell'utente sulla commessa (può averne più d'una: una per fase).
const righeAddetto = (uid, opId) =>
  state.opAddetti.filter(r => r.utente_id === uid && r.operazione_id === opId);
// Completata da me = TUTTE le mie fasi dichiarate finite.
const opCompletataDaMe = (uid, opId) => {
  const righe = righeAddetto(uid, opId);
  return righe.length > 0 && righe.every(r => r.completata_il);
};
// Riga pertinente alla sessione: per fase_id, poi per tipo, poi l'unica incompleta.
function rigaPerSessione(uid, sess) {
  if (!sess || !sess.operazione_id) return null;
  const righe = righeAddetto(uid, sess.operazione_id);
  if (righe.length === 0) return null;
  if (sess.fase_id) {
    const r = righe.find(x => x.fase_id === sess.fase_id);
    if (r) return r;
  }
  if (sess.tipo_lavorazione_id) {
    const r = righe.find(x => {
      if (!x.fase_id) return false;
      const f = state.opFasi.find(ff => ff.id === x.fase_id);
      return f && f.tipo_lavorazione_id === sess.tipo_lavorazione_id;
    });
    if (r) return r;
  }
  const inc = righe.filter(x => !x.completata_il);
  return inc.length === 1 ? inc[0] : null;
}
const fasiDi = (o) => state.opFasi
  .filter(f => f.operazione_id === o.id)
  .sort((a, b) => (a.ordine || 0) - (b.ordine || 0));
function matchCommessa(o, q) {
  if (!q) return true;
  const cli = state.aziende.find(c => c.id === o.cliente_id);
  const art = state.articoli.find(a => a.id === o.articolo_id);
  return [(o.numero_ordine||''), (o.numero_op||''), (o.rif_cliente||''), (o.posizione||''),
          (cli?.nome||''), (art?.codice||''), (art?.descrizione||''), (o.note||'')]
    .some(s => String(s).toLowerCase().includes(q));
}
function infoCommessa(o) {
  const cli = state.aziende.find(c => c.id === o.cliente_id);
  const art = state.articoli.find(a => a.id === o.articolo_id);
  const oggi = new Date().toISOString().slice(0, 10);
  return elx('div', {},
    elx('div', { class:'cr-top' },
      elx('span', { class:'cr-cod' }, art?.codice || o.numero_ordine || '—'),
      elx('span', { class:'cr-cli' }, cli?.nome || ''),
    ),
    elx('div', { class:'cr-sub' },
      'Ord. ' + (o.numero_ordine || '—')
      + (o.numero_op ? ' · OP ' + o.numero_op : '')
      + (art?.descrizione ? ' · ' + art.descrizione : '')),
    elx('div', { class:'cr-meta' },
      elx('span', {}, 'Qtà ' + (o.quantita ?? '—')),
      elx('span', { class: 'cr-scad' + (o.scadenza && o.scadenza < oggi ? ' late' : '') },
        'Scad. ' + fmtIT(o.scadenza)),
    ),
  );
}

// ═══════════════ 1. Login — gate a tutto schermo (email + password) ═══════════════
// Login standard col PROPRIO account Supabase, mostrato PRIMA dell'app (come nel
// gestionale): finché non si è loggati, header e sezioni restano nascosti.
// La sessione resta salvata sul telefono → login una volta sola. Dopo l'accesso
// mappo l'account all'operatore via utenti.account_id, così la timbratura è
// personale senza scelta utente.
function renderAuth(msg) {
  $('#app-screen').style.display = 'none';
  const root = $('#auth-screen');
  root.style.display = 'flex';
  root.innerHTML = '';

  const box = elx('div', { class:'auth-box' });
  box.append(
    elx('div', { class:'auth-logo' }, 'Cablotec ', elx('span', {}, 'Mobile')),
    elx('div', { class:'auth-sub' }, 'Accedi col tuo account'),
  );

  const inEmail = elx('input', { type:'email', class:'search', placeholder:'Email',
    autocomplete:'username', autocapitalize:'none', spellcheck:'false' });
  const inPwd = elx('input', { type:'password', class:'search', placeholder:'Password',
    autocomplete:'current-password' });
  const err = elx('div', { class:'login-err' });
  const btn = elx('button', { class:'login-go' }, 'Entra');

  // Comodità: ricorda l'ultima email usata su questo telefono (non è sicurezza).
  try { inEmail.value = localStorage.getItem('oper_email') || ''; } catch (_) {}

  const doLogin = async () => {
    const email = (inEmail.value || '').trim().toLowerCase();
    const pwd = (inPwd.value || '').trim();
    if (!email || !pwd) { err.textContent = 'Inserisci email e password'; return; }
    btn.disabled = true; btn.textContent = 'Accesso…'; err.textContent = '';
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
      if (error) throw error;
      const ok = await entra(data.user.id);
      if (!ok) {
        await sb.auth.signOut().catch(() => {});
        throw new Error('Questo account non è collegato a un operatore. Contatta l\'ufficio.');
      }
      try { localStorage.setItem('oper_email', email); } catch (_) {}
      beep('ok');
    } catch (e) {
      btn.disabled = false; btn.textContent = 'Entra';
      const m = e.message || String(e);
      err.textContent = /invalid login|credenziali|invalid/i.test(m) ? 'Email o password errate' : m;
      beep('err');
    }
  };

  inEmail.addEventListener('keydown', (e) => { if (e.key === 'Enter') inPwd.focus(); });
  inPwd.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
  btn.onclick = doLogin;

  if (msg) box.append(elx('div', { class:'login-msg' }, msg));
  box.append(inEmail, inPwd, err, btn);
  box.append(elx('div', { class:'auth-foot' }, 'Gli account vengono creati dall\'ufficio.'));

  root.append(box);
  setTimeout(() => { try { (inEmail.value ? inPwd : inEmail).focus(); } catch (_) {} }, 50);
}

// Logout: esce dall'account e torna al gate di accesso.
async function logout() {
  const nome = state.operatore?.nome || '';
  if (!confirm('Vuoi uscire' + (nome ? ', ' + nome : '') + '?')) return;
  try { await sb.auth.signOut(); } catch (_) {}
  state.operatore = null; state.opSel = null;
  aggiornaHeader();
  renderAuth();
}

// ═══════════════ Mezzi / prenotazioni ═══════════════
const mezzoById = id => (state.mezzi || []).find(m => m.id === id) || null;
const clienteById = id => (state.aziende || []).find(a => a.id === id) || null;

// Destinazione breve di una prenotazione (dalla prima consegna collegata).
function destinazioneBreve(prenId) {
  const cs = (state.consegne || []).filter(c => c.prenotazione_id === prenId);
  if (cs.length === 0) return '—';
  const c0 = cs[0];
  const cli = c0.cliente_id ? clienteById(c0.cliente_id) : null;
  const base = cli ? cli.nome : (c0.descrizione || '—');
  return cs.length > 1 ? base + ' +' + (cs.length - 1) : base;
}
// Prenotazioni di un mezzo che toccano un dato giorno (per la disponibilità).
function prenotazioniMezzoGiorno(mezzoId, data) {
  return (state.prenotazioni || [])
    .filter(p => p.mezzo_id === mezzoId && p.data_inizio <= data && p.data_fine >= data)
    .sort((a, b) => (a.ora_inizio || '').localeCompare(b.ora_inizio || ''));
}

// Conflitti — portati dal gestionale (intervalli semiaperti [inizio, fine)).
function checkSovrapposizioni(mezzoId, dataInizio, dataFine, escludiId, oraInizio, oraFine) {
  const aInizio = new Date(dataInizio + 'T' + (oraInizio || '00:00'));
  const aFine = new Date(dataFine + 'T' + (oraFine || '23:59'));
  const usaOrari = !isNaN(aInizio.getTime()) && !isNaN(aFine.getTime());
  return (state.prenotazioni || []).filter(p => {
    if (p.mezzo_id !== mezzoId) return false;
    if (escludiId && p.id === escludiId) return false;
    if (!(p.data_inizio <= dataFine && p.data_fine >= dataInizio)) return false;
    if (usaOrari) {
      const bInizio = new Date(p.data_inizio + 'T' + (p.ora_inizio || '00:00'));
      const bFine = new Date(p.data_fine + 'T' + (p.ora_fine || '23:59'));
      if (!isNaN(bInizio.getTime()) && !isNaN(bFine.getTime())) return aInizio < bFine && bInizio < aFine;
    }
    return true;
  });
}
function checkSovrapposizioniOperatori(utentiIds, dataInizio, dataFine, escludiId, oraInizio, oraFine) {
  const ids = new Set(utentiIds || []);
  if (ids.size === 0) return [];
  const aInizio = new Date(dataInizio + 'T' + (oraInizio || '00:00'));
  const aFine = new Date(dataFine + 'T' + (oraFine || '23:59'));
  const usaOrari = !isNaN(aInizio.getTime()) && !isNaN(aFine.getTime());
  const res = [];
  (state.prenotazioni || []).forEach(p => {
    if (escludiId && p.id === escludiId) return;
    const comuni = (state.prenOp || [])
      .filter(r => r.prenotazione_id === p.id && ids.has(r.utente_id)).map(r => r.utente_id);
    if (comuni.length === 0) return;
    if (!(p.data_inizio <= dataFine && p.data_fine >= dataInizio)) return;
    if (usaOrari) {
      const bInizio = new Date(p.data_inizio + 'T' + (p.ora_inizio || '00:00'));
      const bFine = new Date(p.data_fine + 'T' + (p.ora_fine || '23:59'));
      if (!isNaN(bInizio.getTime()) && !isNaN(bFine.getTime())) { if (!(aInizio < bFine && bInizio < aFine)) return; }
    }
    res.push({ pren: p, operatori: comuni });
  });
  return res;
}

// ─── Lista "Le mie prenotazioni" ───
function renderMezzi() {
  mezziVista = 'lista';
  const root = $('#mezzi-root');
  if (!root) return;
  if (!state.operatore) { renderAuth(); return; }
  root.innerHTML = '';
  root.append(elx('button', { class:'mezzi-cta', onclick: () => renderPrenotaForm() }, '+ Prenota un mezzo'));

  if ((state.mezzi || []).length === 0) {
    root.append(elx('div', { class:'empty' }, 'Mezzi non disponibili al momento.'));
    return;
  }

  const accId = state.operatore.account_id;
  const oggi = todayISO();
  const mieIds = new Set((state.prenOp || [])
    .filter(r => r.utente_id === state.operatore.id).map(r => r.prenotazione_id));

  // Consegna in corso adesso (mia, tipo consegna, oggi nel periodo) → tappe in cima
  const consegnaInCorso = (state.prenotazioni || []).find(p => p.tipo === 'consegna'
    && (mieIds.has(p.id) || p.utente_id === accId)
    && p.data_inizio <= oggi && (p.data_fine || p.data_inizio) >= oggi);
  if (consegnaInCorso) root.append(tappeInCorsoCard(consegnaInCorso));

  const mie = (state.prenotazioni || [])
    .filter(p => (p.data_fine || p.data_inizio) >= oggi)
    .filter(p => mieIds.has(p.id) || p.utente_id === accId)
    .sort((a, b) => (a.data_inizio + (a.ora_inizio || '')).localeCompare(b.data_inizio + (b.ora_inizio || '')));

  root.append(elx('div', { class:'sec-hd' }, 'Le mie prenotazioni'));
  if (mie.length === 0) {
    root.append(elx('div', { class:'empty' }, 'Nessuna prenotazione in programma.'));
    return;
  }
  mie.forEach(p => root.append(prenotazioneCard(p)));
}

// Card "consegna in corso" con l'elenco delle tappe (clienti in ordine).
function tappeInCorsoCard(p) {
  const m = mezzoById(p.mezzo_id);
  const tappe = (state.consegne || []).filter(c => c.prenotazione_id === p.id)
    .sort((a, b) => (a.ordine || 0) - (b.ordine || 0));
  const card = elx('div', { class:'mz-incorso' });
  card.append(elx('div', { class:'mz-incorso-hd' }, '🚚 Consegna in corso' + (m ? ' · ' + m.nome : '')));
  if (tappe.length === 0) {
    card.append(elx('div', { class:'cr-sub' }, 'Nessuna tappa registrata.'));
  } else {
    tappe.forEach((c, i) => {
      const cli = c.cliente_id ? clienteById(c.cliente_id) : null;
      const nome = cli ? cli.nome : (c.descrizione || 'Tappa');
      const extra = (cli && c.descrizione ? ' · ' + c.descrizione : '') + (cli?.citta ? ' (' + cli.citta + ')' : '');
      card.append(elx('div', { class:'mz-tappa-line' }, (i + 1) + '. ' + nome + extra));
    });
  }
  return card;
}

function prenotazioneCard(p) {
  const m = mezzoById(p.mezzo_id);
  const tipo = TIPI_MEZZI.find(t => t.id === p.tipo);
  const periodo = p.data_inizio === p.data_fine ? fmtIT(p.data_inizio)
    : fmtIT(p.data_inizio) + ' → ' + fmtIT(p.data_fine);
  const orari = (p.ora_inizio && p.ora_fine) ? p.ora_inizio + '–' + p.ora_fine : '';
  const nomi = (state.prenOp || []).filter(r => r.prenotazione_id === p.id)
    .map(r => state.utentiById[r.utente_id]?.nome).filter(Boolean).join(', ');
  const dest = destinazioneBreve(p.id);
  const sonoCreatore = p.utente_id === state.operatore.account_id;

  const card = elx('div', { class:'comm-row' });
  card.append(
    elx('div', { class:'cr-line1' },
      elx('span', { class:'mezzo-dot', style:'background:' + (m?.colore || '#6b6b64') + ';' }),
      elx('span', {}, m ? m.nome : 'Mezzo')),
    elx('div', { class:'cr-meta' }, '📅 ' + periodo + (orari ? ' · ' + orari : '')),
  );
  const sub = (tipo ? tipo.label : '') + (dest && dest !== '—' ? ' · ' + dest : '');
  if (sub.trim()) card.append(elx('div', { class:'cr-sub' }, sub));
  if (nomi) card.append(elx('div', { class:'cr-sub' }, '👥 ' + nomi));
  if (sonoCreatore) {
    card.append(elx('button', { class:'cr-del',
      onclick: (e) => { e.stopPropagation(); annullaPrenotazione(p); } }, '✕ Annulla'));
  }
  return card;
}

async function annullaPrenotazione(p) {
  if (!confirm('Annullare questa prenotazione?')) return;
  try {
    const { error } = await sb.from('prenotazioni').delete().eq('id', p.id);
    if (error) throw error;
    state.prenotazioni = state.prenotazioni.filter(x => x.id !== p.id);
    state.prenOp = state.prenOp.filter(r => r.prenotazione_id !== p.id);
    state.consegne = state.consegne.filter(c => c.prenotazione_id !== p.id);
    beep('ok'); renderMezzi();
  } catch (e) { beep('err'); alert('Errore: ' + (e.message || e)); }
}

// ─── Form di prenotazione ───
function renderPrenotaForm() {
  mezziVista = 'form';
  const root = $('#mezzi-root');
  root.innerHTML = '';
  const mezziAttivi = (state.mezzi || []).filter(m => m.attivo);

  root.append(elx('button', { class:'back-link',
    onclick: () => renderMezzi() }, '‹ Indietro'));

  if (mezziAttivi.length === 0) {
    root.append(elx('div', { class:'empty' }, 'Nessun mezzo attivo. Chiedi all\'ufficio di aggiungerne.'));
    return;
  }

  const f = {
    mezzo_id: mezziAttivi[0].id, dataIn: todayISO(), dataFi: todayISO(),
    oraIn: '08:00', oraFi: '18:00', tipo: 'trasferta',
    operatori: [state.operatore.id], tappe: [], note: '',
  };

async function salvaPrenotazione(f, btn, err) {
  if (!f.mezzo_id) { err.textContent = 'Scegli un mezzo'; return; }
  if (!f.dataIn || !f.dataFi) { err.textContent = 'Scegli le date'; return; }
  if (f.dataFi < f.dataIn) { err.textContent = 'La data finale dev\'essere ≥ a quella iniziale'; return; }
  if (!f.oraIn || !f.oraFi) { err.textContent = 'Imposta ora inizio e fine'; return; }
  if (f.dataIn === f.dataFi && f.oraFi <= f.oraIn) { err.textContent = 'Nello stesso giorno l\'ora fine dev\'essere dopo l\'inizio'; return; }
  if (f.operatori.length === 0) { err.textContent = 'Seleziona almeno un operatore'; return; }
  const tappeValide = f.tipo === 'consegna' ? f.tappe.filter(t => t.cliente_id) : [];
  if (f.tipo === 'consegna' && tappeValide.length === 0) { err.textContent = 'Per una Consegna aggiungi almeno una tappa con cliente'; return; }

  // Conflitti su tutto il periodo (stessa logica del gestionale)
  if (checkSovrapposizioni(f.mezzo_id, f.dataIn, f.dataFi, null, f.oraIn, f.oraFi).length) {
    err.textContent = 'Mezzo già occupato in quel periodo'; beep('err'); return;
  }
  const confOp = checkSovrapposizioniOperatori(f.operatori, f.dataIn, f.dataFi, null, f.oraIn, f.oraFi);
  if (confOp.length) {
    const nomi = [...new Set(confOp.flatMap(c => c.operatori))]
      .map(id => state.utentiById[id]?.nome).filter(Boolean).join(', ');
    err.textContent = 'Già impegnato su un altro mezzo: ' + nomi; beep('err'); return;
  }

  btn.disabled = true; btn.textContent = 'Prenoto…'; err.textContent = '';
  try {
    const payload = {
      mezzo_id: f.mezzo_id, tipo: f.tipo,
      data_inizio: f.dataIn, data_fine: f.dataFi,
      ora_inizio: f.oraIn, ora_fine: f.oraFi,
      note: f.note || null,
      utente_id: state.operatore.account_id,   // creatore = id account
    };
    const { data: pren, error } = await sb.from('prenotazioni').insert(payload).select().single();
    if (error) {
      if ((error.message || '').includes('exclusion')) throw new Error('Mezzo già prenotato in quel periodo');
      throw error;
    }
    const opRows = f.operatori.map(uid => ({ prenotazione_id: pren.id, utente_id: uid }));
    const { data: opIns } = await sb.from('prenotazioni_utenti').insert(opRows).select();
    let consIns = [];
    if (tappeValide.length) {
      const consRows = tappeValide.map((t, i) => ({
        prenotazione_id: pren.id, ordine: i,
        cliente_id: t.cliente_id, descrizione: (t.descrizione || '').trim() || null,
      }));
      const { data } = await sb.from('consegne').insert(consRows).select();
      consIns = data || consRows;
    }
    state.prenotazioni.push(pren);
    state.prenOp = state.prenOp.concat(opIns || opRows);
    state.consegne = state.consegne.concat(consIns);
    beep('ok');
    renderMezzi();
  } catch (e) {
    btn.disabled = false; btn.textContent = 'Prenota';
    err.textContent = e.message || String(e); beep('err');
  }
}

// ═══════════════ Ferie / assenze ═══════════════
// Helper portati fedelmente dal gestionale (finestre di apertura, festivi,
// chiusure, ore per codice tipo). La scrittura è identica a quella admin:
// una riga per giorno, stato 'valida', niente approvazione.
const zp = n => String(n).padStart(2, '0');
const toLocalISO = d => `${d.getFullYear()}-${zp(d.getMonth()+1)}-${zp(d.getDate())}`;
const parseISODate = s => { const [y,m,d] = String(s).split('-').map(Number); return new Date(y, m-1, d); };

function getImpostazione(chiave, def) {
  const v = state.impostazioni && state.impostazioni[chiave];
  return (v === undefined || v === null) ? def : v;
}
function parseGGMM(s) {
  if (!s) return null;
  const m = String(s).match(/^(\d{1,2})-(\d{1,2})$/);
  if (!m) return null;
  const g = +m[1], me = +m[2];
  if (g < 1 || g > 31 || me < 1 || me > 12) return null;
  return { giorno: g, mese: me };
}
function isoDentroIntervallo(iso, ggmmDa, ggmmA) {
  const da = parseGGMM(ggmmDa), a = parseGGMM(ggmmA);
  if (!da || !a) return false;
  const d = parseISODate(iso);
  const g = d.getDate(), m = d.getMonth() + 1;
  const k = (mm, gg) => mm * 100 + gg;
  const kd = k(m, g), kDa = k(da.mese, da.giorno), kA = k(a.mese, a.giorno);
  if (kDa <= kA) return kd >= kDa && kd <= kA;
  return kd >= kDa || kd <= kA;
}
function getFinestreAssenze() {
  return [
    { nome:'estiva',
      aperturaDa: getImpostazione('finestra_estiva_apertura_da', '01-03'),
      aperturaA:  getImpostazione('finestra_estiva_apertura_a',  '31-03'),
      periodoDa:  getImpostazione('finestra_estiva_periodo_da',  '01-04'),
      periodoA:   getImpostazione('finestra_estiva_periodo_a',   '30-09') },
    { nome:'invernale',
      aperturaDa: getImpostazione('finestra_invernale_apertura_da', '01-09'),
      aperturaA:  getImpostazione('finestra_invernale_apertura_a',  '30-09'),
      periodoDa:  getImpostazione('finestra_invernale_periodo_da',  '01-10'),
      periodoA:   getImpostazione('finestra_invernale_periodo_a',   '31-03') },
  ];
}
function getGruppiEsentiAssenze() {
  const raw = getImpostazione('assenze_gruppi_esenti', null);
  if (raw === null || raw === undefined) return ['laboratorio'];
  try { const arr = typeof raw === 'string' ? JSON.parse(raw) : raw; return Array.isArray(arr) ? arr : []; }
  catch (_) { return []; }
}
// Regola finestre: niente date passate, solo dentro la finestra di apertura
// del periodo, salvo gruppi esenti. Identica al gestionale.
function verificaAccessoAssenza(iso, utente) {
  const esenti = getGruppiEsentiAssenze();
  if (utente?.gruppo && esenti.includes(utente.gruppo)) return { ok:true, esenzione:utente.gruppo };
  const oggiIso = todayISO();
  if (iso < oggiIso) return { ok:false, motivo:'le date passate non sono inseribili' };
  const finestre = getFinestreAssenze();
  const finestra = finestre.find(f => isoDentroIntervallo(iso, f.periodoDa, f.periodoA));
  if (!finestra) return { ok:false, motivo:'questa data non rientra in nessuna finestra di apertura' };
  if (!isoDentroIntervallo(oggiIso, finestra.aperturaDa, finestra.aperturaA))
    return { ok:false, motivo:`le assenze del periodo ${finestra.nome} si inseriscono dal ${finestra.aperturaDa} al ${finestra.aperturaA}` };
  return { ok:true, finestra };
}

// Giorni non lavorativi: weekend + festivi nazionali + chiusure aziendali.
const FESTIVI_NAZ_FISSI = [
  {m:1,d:1},{m:1,d:6},{m:4,d:25},{m:5,d:1},{m:6,d:2},
  {m:8,d:15},{m:11,d:1},{m:12,d:8},{m:12,d:25},{m:12,d:26},
];
function calcolaPasqua(anno) {
  const a=anno%19, b=Math.floor(anno/100), c=anno%100, d=Math.floor(b/4), e=b%4,
    f=Math.floor((b+8)/25), g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30,
    i=Math.floor(c/4), k=c%4, l=(32+2*e+2*i-h-k)%7, m=Math.floor((a+11*h+22*l)/451),
    mese=Math.floor((h+l-7*m+114)/31), giorno=((h+l-7*m+114)%31)+1;
  return new Date(anno, mese-1, giorno);
}
function festiviNazIsoSet(anno) {
  const s = new Set();
  FESTIVI_NAZ_FISSI.forEach(f => s.add(toLocalISO(new Date(anno, f.m-1, f.d))));
  const pasqua = calcolaPasqua(anno);
  s.add(toLocalISO(pasqua));
  const pasquetta = new Date(pasqua); pasquetta.setDate(pasqua.getDate()+1);
  s.add(toLocalISO(pasquetta));
  return s;
}
function chiusuraIso(iso) {
  return (state.chiusure || []).some(c => {
    if (!c.data) return false;
    return c.ricorrente ? c.data.substring(5) === iso.substring(5) : c.data === iso;
  });
}
function isGiornoNonLavorativo(d) {
  const dow = d.getDay();
  if (dow === 0 || dow === 6) return true;
  const iso = toLocalISO(d);
  if (festiviNazIsoSet(d.getFullYear()).has(iso)) return true;
  return chiusuraIso(iso);
}
function getAssenza(utenteId, iso) {
  return (state.assenze || []).find(a => a.utente_id === utenteId && a.data === iso && a.stato === 'valida');
}
// Ore in base al codice tipo: F/M = giornata intera (8h), P = permesso a ore.
function modalitaOre(tipo) {
  const c = (tipo?.codice || '').toUpperCase();
  if (c === 'F' || c === 'M') return 'fissa';
  if (c === 'P') return 'permesso';
  return 'presets';
}
function oreInizialiTipo(tipo) {
  const mod = modalitaOre(tipo);
  if (mod === 'fissa') return 8;
  if (mod === 'permesso') return 0.5;
  return parseFloat(tipo?.ore_default) || 8;
}

// ─── Calendario assenze (tutti, le mie evidenziate) ───
function renderFerie() {
  ferieVista = 'lista';
  const root = $('#ferie-root');
  if (!root) return;
  if (!state.operatore) { renderAuth(); return; }
  if (!ferieCal) { const d = new Date(); ferieCal = { y: d.getFullYear(), m: d.getMonth(), sel: todayISO() }; }
  root.innerHTML = '';
  root.append(elx('button', { class:'mezzi-cta', onclick: () => renderFerieForm() }, '+ Richiedi assenza'));

  const tipiById = Object.fromEntries((state.tipiAssenza || []).map(t => [t.id, t]));
  const mioId = state.operatore.id;
  const oggiIso = todayISO();

  // Intestazione mese con navigazione
  const titolo = new Date(ferieCal.y, ferieCal.m, 1).toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
  root.append(elx('div', { class:'cal-head' },
    elx('button', { class:'cal-nav', onclick: () => shiftMese(-1) }, '‹'),
    elx('div', { class:'cal-title' }, titolo.charAt(0).toUpperCase() + titolo.slice(1)),
    elx('button', { class:'cal-nav', onclick: () => shiftMese(1) }, '›')));

  // Griglia (lun→dom)
  const grid = elx('div', { class:'cal-grid' });
  ['L', 'M', 'M', 'G', 'V', 'S', 'D'].forEach(d => grid.append(elx('div', { class:'cal-dow' }, d)));
  const primo = new Date(ferieCal.y, ferieCal.m, 1);
  const offset = (primo.getDay() + 6) % 7;   // lun = 0
  const giorniMese = new Date(ferieCal.y, ferieCal.m + 1, 0).getDate();
  for (let i = 0; i < offset; i++) grid.append(elx('div', { class:'cal-cell empty' }));

  for (let g = 1; g <= giorniMese; g++) {
    const iso = `${ferieCal.y}-${zp(ferieCal.m + 1)}-${zp(g)}`;
    const ass = (state.assenze || []).filter(a => a.data === iso);
    const mia = ass.find(a => a.utente_id === mioId);
    const cls = 'cal-cell' + (mia ? ' mia' : (ass.length ? ' has' : '')) +
      (iso === oggiIso ? ' oggi' : '') + (iso === ferieCal.sel ? ' sel' : '');
    const cell = elx('div', { class: cls, onclick: () => { ferieCal.sel = iso; renderFerie(); } });
    cell.append(elx('div', { class:'cal-num' }, String(g)));
    if (mia) {
      const t = tipiById[mia.tipo_assenza_id];
      cell.append(elx('div', { class:'cal-mine', style:'background:' + (t?.colore || 'var(--acc)') + ';' }));
    }
    if (ass.length) cell.append(elx('div', { class:'cal-count' }, String(ass.length)));
    grid.append(cell);
  }
  root.append(grid);

  // Dettaglio del giorno selezionato
  if (ferieCal.sel) {
    const ass = (state.assenze || []).filter(a => a.data === ferieCal.sel)
      .sort((a, b) => (state.utentiById[a.utente_id]?.nome || '').localeCompare(state.utentiById[b.utente_id]?.nome || ''));
    root.append(elx('div', { class:'sec-hd', style:'margin-top:14px;' }, fmtIT(ferieCal.sel) + ' · ' + ass.length + ' assenti'));
    if (ass.length === 0) {
      root.append(elx('div', { class:'empty' }, 'Nessuno assente in questa data.'));
    } else {
      ass.forEach(a => {
        const t = tipiById[a.tipo_assenza_id];
        const u = state.utentiById[a.utente_id];
        const ore = parseFloat(a.ore);
        const oreTxt = ore >= 8 ? 'giornata' : (ore + 'h');
        const isMia = a.utente_id === mioId;
        const row = elx('div', { class: 'comm-row' + (isMia ? ' mia-row' : '') });
        row.append(
          elx('div', { class:'cr-line1' },
            elx('span', { class:'mezzo-dot', style:'background:' + (t?.colore || '#6b6b64') + ';' }),
            elx('span', {}, (u?.nome || 'Operatore') + (isMia ? ' (io)' : ''))),
          elx('div', { class:'cr-meta' }, (t ? (t.codice ? t.codice + ' — ' + t.nome : t.nome) : 'Assenza') + ' · ' + oreTxt));
        if (a.note) row.append(elx('div', { class:'cr-sub' }, a.note));
        if (isMia) row.append(elx('button', { class:'cr-del', onclick: () => annullaAssenza(a) }, '✕ Annulla'));
        root.append(row);
      });
    }
  }
}

function shiftMese(delta) {
  let m = ferieCal.m + delta, y = ferieCal.y;
  if (m < 0) { m = 11; y--; } else if (m > 11) { m = 0; y++; }
  ferieCal.y = y; ferieCal.m = m;
  renderFerie();
}

async function annullaAssenza(a) {
  // Come nel gestionale: posso togliere la mia assenza solo se la data è
  // ancora dentro la finestra consentita (i gruppi esenti sempre).
  const v = verificaAccessoAssenza(a.data, state.operatore);
  if (!v.ok) { alert('Non puoi annullare questa assenza: ' + v.motivo + '.'); return; }
  if (!confirm('Annullare l\'assenza del ' + fmtIT(a.data) + '?')) return;
  try {
    const { error } = await sb.from('assenze').delete().eq('id', a.id);
    if (error) throw error;
    state.assenze = state.assenze.filter(x => x.id !== a.id);
    beep('ok'); renderFerie();
  } catch (e) { beep('err'); alert('Errore: ' + (e.message || e)); }
}

// ─── Form richiesta assenza ───
function renderFerieForm() {
  ferieVista = 'form';
  const root = $('#ferie-root');
  root.innerHTML = '';
  root.append(elx('button', { class:'back-link', onclick: () => renderFerie() }, '‹ Indietro'));

  const tipi = (state.tipiAssenza || []).filter(t => t.attivo).sort((a, b) => (a.ordine||0) - (b.ordine||0));
  if (tipi.length === 0) {
    root.append(elx('div', { class:'empty' }, 'Nessun tipo di assenza configurato. Chiedi all\'ufficio.'));
    return;
  }

  const f = { tipo: tipi[0].id, dataIn: todayISO(), dataFi: todayISO(), ore: oreInizialiTipo(tipi[0]), note: '' };
  root.append(elx('div', { class:'step-title' }, 'Richiedi assenza'));

  // Tipo (chips colorate)
  root.append(elx('label', { class:'mz-label' }, 'Tipo'));
  const chipWrap = elx('div', { class:'fr-chips' });
  const renderTipoChips = () => {
    chipWrap.innerHTML = '';
    tipi.forEach(t => {
      const sel = f.tipo === t.id, col = t.colore || '#888';
      chipWrap.append(elx('button', {
        type:'button', class:'fr-chip' + (sel ? ' sel' : ''),
        style: sel ? `background:${col};border-color:${col};color:#0f0f0e;` : `border-color:${col};color:${col};`,
        onclick: () => { f.tipo = t.id; f.ore = oreInizialiTipo(t); renderTipoChips(); renderOre(); },
      }, t.codice ? t.codice + ' — ' + t.nome : t.nome));
    });
  };
  root.append(chipWrap);
  renderTipoChips();

  // Periodo (dal/al)
  const inIn = elx('input', { type:'date', class:'mz-input', value:f.dataIn,
    onchange: e => { f.dataIn = e.target.value; if (f.dataFi < f.dataIn) { f.dataFi = f.dataIn; inFi.value = f.dataFi; } renderHint(); } });
  const inFi = elx('input', { type:'date', class:'mz-input', value:f.dataFi,
    onchange: e => { f.dataFi = e.target.value; renderHint(); } });
  root.append(elx('div', { class:'mz-row' },
    elx('div', { class:'mz-field' }, elx('label', { class:'mz-label' }, 'Dal'), inIn),
    elx('div', { class:'mz-field' }, elx('label', { class:'mz-label' }, 'Al'), inFi)));

  // Ore (dipende dal codice del tipo)
  const oreWrap = elx('div', { class:'mz-field' });
  root.append(oreWrap);
  function renderOre() {
    oreWrap.innerHTML = '';
    const tipo = tipi.find(t => t.id === f.tipo);
    const mod = modalitaOre(tipo);
    oreWrap.append(elx('label', { class:'mz-label' }, 'Ore'));
    if (mod === 'fissa') {
      f.ore = 8;
      oreWrap.append(elx('div', { class:'mz-avail' }, elx('div', {}, '8h — giornata intera')));
      return;
    }
    const clamp = v => Math.max(0, Math.min(8, Math.round((v || 0) * 2) / 2));
    const val = elx('input', { type:'number', class:'mz-input', step:'0.5', min:'0', max:'8',
      value:String(f.ore), style:'text-align:center;max-width:90px;' });
    const dec = elx('button', { type:'button', class:'fr-step', onclick: () => { f.ore = clamp(f.ore - 0.5); val.value = f.ore; } }, '−');
    const inc = elx('button', { type:'button', class:'fr-step', onclick: () => { f.ore = clamp(f.ore + 0.5); val.value = f.ore; } }, '+');
    val.onchange = () => { f.ore = clamp(parseFloat(val.value)); val.value = f.ore; };
    oreWrap.append(elx('div', { class:'fr-stepper' }, dec, val, inc));
  }
  renderOre();

  // Note
  const inNote = elx('textarea', { class:'mz-input', rows:'2', placeholder:'Note (opz.)',
    oninput: e => f.note = e.target.value });
  root.append(elx('div', { class:'mz-field' }, elx('label', { class:'mz-label' }, 'Note'), inNote));

  // Finestra: feedback immediato sulla data iniziale
  const hintBox = elx('div', { class:'mz-avail' });
  root.append(hintBox);
  function renderHint() {
    hintBox.innerHTML = '';
    const v = verificaAccessoAssenza(f.dataIn, state.operatore);
    if (v.ok) hintBox.append(elx('div', { class:'ok' }, '✅ Inseribile' + (v.esenzione ? ' (gruppo esente)' : '')));
    else hintBox.append(elx('div', { class:'busy' }, '⚠ ' + v.motivo));
  }
  renderHint();

  const err = elx('div', { class:'login-err' });
  const btn = elx('button', { class:'login-go' }, 'Invia richiesta');
  btn.onclick = () => salvaAssenza(f, btn, err);
  root.append(err, btn);
}

async function salvaAssenza(f, btn, err) {
  if (!f.tipo) { err.textContent = 'Scegli il tipo'; return; }
  if (!f.dataIn || !f.dataFi) { err.textContent = 'Scegli le date'; return; }
  if (f.dataFi < f.dataIn) { err.textContent = 'La data finale dev\'essere ≥ a quella iniziale'; return; }
  const tipo = state.tipiAssenza.find(t => t.id === f.tipo);
  const mod = modalitaOre(tipo);
  const ore = mod === 'fissa' ? 8 : (parseFloat(f.ore) || 0);
  if (mod !== 'fissa' && ore <= 0) { err.textContent = 'Imposta le ore'; return; }

  // Espandi il periodo sui soli giorni lavorativi
  let giorni = [];
  const d = parseISODate(f.dataIn), fine = parseISODate(f.dataFi);
  while (d <= fine) { if (!isGiornoNonLavorativo(d)) giorni.push(toLocalISO(d)); d.setDate(d.getDate() + 1); }

  // Salta i giorni già con un'assenza e quelli fuori finestra
  let giaPresenti = 0, fuoriFinestra = 0, motivoFuori = '';
  giorni = giorni.filter(g => { if (getAssenza(state.operatore.id, g)) { giaPresenti++; return false; } return true; });
  giorni = giorni.filter(g => { const v = verificaAccessoAssenza(g, state.operatore); if (!v.ok) { fuoriFinestra++; motivoFuori = v.motivo; return false; } return true; });

  if (giorni.length === 0) {
    const parti = [];
    if (giaPresenti) parti.push(giaPresenti + ' già presenti');
    if (fuoriFinestra) parti.push(fuoriFinestra + ' fuori finestra');
    err.textContent = 'Nessun giorno da inserire' + (parti.length ? ' (' + parti.join(', ') + ')' : '') + (motivoFuori ? '. ' + motivoFuori : '');
    beep('err'); return;
  }

  btn.disabled = true; btn.textContent = 'Invio…'; err.textContent = '';
  try {
    const rows = giorni.map(g => ({
      utente_id: state.operatore.id, tipo_assenza_id: f.tipo, data: g,
      ore, stato: 'valida', note: (f.note || '').trim() || null,
      creato_da: state.operatore.account_id,
    }));
    const { data, error } = await sb.from('assenze').insert(rows).select();
    if (error) {
      if (error.code === '23505') throw new Error('Alcuni giorni hanno già un\'assenza');
      throw error;
    }
    (data || rows).forEach(r => { if (!r.id || !state.assenze.find(x => x.id === r.id)) state.assenze.push(r); });
    beep('ok');
    renderFerie();
  } catch (e) {
    btn.disabled = false; btn.textContent = 'Invia richiesta';
    err.textContent = e.message || String(e); beep('err');
  }
}

// ═══════════════ 2. Home ═══════════════
function goHome() {
  const u = state.operatore;
  if (!u) { renderAuth(); return; }
  // Se ho una sessione aperta vado dritto lì
  const sess = state.sessioni.find(s => s.utente_id === u.id && !s.fine);
  if (sess) { goAttiva(); return; }
  state.opSel = null;
  show('step-home');
  const inp = $('#home-search');
  inp.value = state.search;
  inp.oninput = () => { state.search = inp.value; renderHome(); };
  renderHome();
}

function renderHome() {
  const u = state.operatore;
  const root = $('#home-list');
  root.innerHTML = '';
  const q = (state.search || '').toLowerCase();

  const aperte = state.operazioni.slice().sort(cmpCommessa);
  const mieIds = new Set(state.opAddetti.filter(r => r.utente_id === u.id).map(r => r.operazione_id));
  // Rete di sicurezza: commessa con MIA sessione aperta sempre tra le mie.
  const conMiaSessione = new Set(state.sessioni
    .filter(s => !s.fine && s.utente_id === u.id && s.operazione_id)
    .map(s => s.operazione_id));
  const mie = aperte.filter(o => ((mieIds.has(o.id) && !opCompletataDaMe(u.id, o.id))
    || conMiaSessione.has(o.id)) && matchCommessa(o, q));
  const completate = aperte.filter(o => mieIds.has(o.id) && opCompletataDaMe(u.id, o.id)
    && !conMiaSessione.has(o.id) && matchCommessa(o, q));
  const altre = aperte.filter(o => !mieIds.has(o.id) && !conMiaSessione.has(o.id) && matchCommessa(o, q));

  // Le mie
  root.append(elx('div', { class:'sec-hd' }, '⭐ Le tue commesse (' + mie.length + ')'));
  if (mie.length === 0) root.append(elx('div', { class:'empty' }, q ? 'Nessuna corrispondenza.' : 'Nessuna commessa assegnata a te.'));
  else {
    const l = elx('div', { class:'comm-list' });
    mie.forEach(o => l.append(elx('button', { class:'comm-row', onclick: () => goFase(o) }, infoCommessa(o))));
    root.append(l);
  }

  // Completate da me (con Riapri)
  if (completate.length > 0) {
    root.append(elx('div', { class:'sec-hd dim' }, '✓ Completate da te (' + completate.length + ')'));
    const l = elx('div', { class:'comm-list' });
    completate.forEach(o => {
      const row = elx('div', { class:'comm-row', style:'cursor:default;opacity:.75;' }, infoCommessa(o));
      row.append(elx('button', { class:'cr-reopen', onclick: (e) => { e.stopPropagation(); riapriFase(o.id); } }, '↩ Riapri'));
      l.append(row);
    });
    root.append(l);
  }

  // Altre (toggle, oppure sempre visibili se sto cercando)
  if (q || state.vediAltre) {
    root.append(elx('div', { class:'sec-hd dim' }, 'Altre commesse aperte (' + altre.length + ')'));
    if (altre.length === 0) root.append(elx('div', { class:'empty' }, 'Nessuna.'));
    else {
      const l = elx('div', { class:'comm-list' });
      altre.forEach(o => l.append(elx('button', { class:'comm-row', onclick: () => goFase(o) }, infoCommessa(o))));
      root.append(l);
    }
    if (!q) root.append(elx('button', { class:'toggle-btn', onclick: () => { state.vediAltre = false; renderHome(); } }, 'Nascondi le altre'));
  } else {
    root.append(elx('button', { class:'toggle-btn', onclick: () => { state.vediAltre = true; renderHome(); } },
      'Vedi tutte le commesse aperte (' + altre.length + ')'));
  }
}

async function riapriFase(opId) {
  const u = state.operatore;
  try {
    const { error } = await sb.from('operazioni_addetti')
      .update({ completata_il: null })
      .eq('operazione_id', opId).eq('utente_id', u.id);
    if (error) throw error;
    state.opAddetti = state.opAddetti.map(x =>
      (x.operazione_id === opId && x.utente_id === u.id) ? { ...x, completata_il: null } : x);
    renderHome();
  } catch (e) { alert('Errore: ' + (e.message || e)); }
}

// ═══════════════ 3. Scelta fase / tipo ═══════════════
function goFase(o) {
  state.opSel = o;
  show('step-fase');
  const info = $('#fase-info'); info.innerHTML = ''; info.append(infoCommessa(o));
  const hint = $('#fase-hint');
  const list = $('#fase-list'); list.innerHTML = '';
  const u = state.operatore;

  const fasi = fasiDi(o);
  if (fasi.length > 0) {
    const mieFasiIds = new Set(righeAddetto(u.id, o.id).map(r => r.fase_id).filter(Boolean));
    hint.textContent = 'Scegli la fase su cui timbri' + (mieFasiIds.size ? ' (le tue sono evidenziate)' : '') + ':';
    const ordinate = fasi.slice().sort((a, b) => {
      const am = mieFasiIds.has(a.id), bm = mieFasiIds.has(b.id);
      if (am && !bm) return -1;
      if (bm && !am) return 1;
      return (a.ordine || 0) - (b.ordine || 0);
    });
    ordinate.forEach(f => {
      const tipo = state.tipiLav.find(t => t.id === f.tipo_lavorazione_id);
      const col = tipo?.colore || '#6b6b64';
      const mia = mieFasiIds.has(f.id);
      list.append(elx('button', { class:'fase-btn' + (mia ? ' mia' : ''), onclick: () => avvia(f.tipo_lavorazione_id, f.id) },
        elx('div', { class:'fase-color', style:'background:' + col + ';' }),
        elx('div', { class:'fase-name' }, tipo?.nome || 'Fase'),
        mia ? elx('div', { class:'fase-mia-tag' }, '★ LA TUA FASE') : null,
      ));
    });

    // Oltre alle fasi, permetti di scegliere un altro tipo di lavorazione qualsiasi
    // (non previsto come fase): avvia senza fase.
    const tipiFase = new Set(fasi.map(f => f.tipo_lavorazione_id));
    const altri = state.tipiLav.filter(t => t.attivo !== false && !tipiFase.has(t.id))
      .sort((a, b) => (a.ordine || 0) - (b.ordine || 0));
    if (altri.length) {
      list.append(elx('div', { class:'fase-sep' }, 'Altro tipo di lavorazione'));
      altri.forEach(t => {
        list.append(elx('button', { class:'fase-btn', onclick: () => avvia(t.id, null) },
          elx('div', { class:'fase-color', style:'background:' + (t.colore || '#6b6b64') + ';' }),
          elx('div', { class:'fase-name' }, t.nome),
        ));
      });
    }
    return;
  }

  // Fallback: nessuna fase → tipo lavorazione libero
  hint.textContent = 'Che lavorazione fai su questa commessa?';
  const tipi = state.tipiLav.filter(t => t.attivo !== false)
    .sort((a, b) => (a.ordine || 0) - (b.ordine || 0));
  if (tipi.length === 0) { list.append(elx('div', { class:'empty' }, 'Nessun tipo di lavorazione configurato.')); return; }
  tipi.forEach(t => {
    list.append(elx('button', { class:'fase-btn', onclick: () => avvia(t.id, null) },
      elx('div', { class:'fase-color', style:'background:' + (t.colore || '#6b6b64') + ';' }),
      elx('div', { class:'fase-name' }, t.nome),
    ));
  });
}

// Auto-iscrizione addetto: chi timbra su una fase ne diventa addetto.
// - se è già "tutta la commessa" (riga con fase_id null) → coperto, non aggiungo;
// - se ha già la riga per QUESTA fase → non aggiungo (no doppioni);
// - altrimenti inserisco { operazione_id, utente_id, fase_id } (fase_id null se la
//   commessa non ha fasi). Best-effort: un errore qui non deve bloccare la timbratura.
async function assicuraAddetto(uid, opId, faseId, tipoId) {
  try {
    const righe = righeAddetto(uid, opId);
    const fasiOp = state.opFasi.filter(f => f.operazione_id === opId);
    // Risolvi la fase: se non è arrivata, deducila dal tipo timbrato (se univoca).
    let fid = faseId || null;
    if (!fid && tipoId && fasiOp.length) {
      const cand = fasiOp.filter(f => f.tipo_lavorazione_id === tipoId);
      if (cand.length === 1) fid = cand[0].id;
    }
    if (righe.some(r => !r.fase_id)) return;                              // già su tutta la commessa
    if (righe.some(r => (r.fase_id || null) === (fid || null))) return;   // già su questa fase
    // MAI creare una riga "tutta la commessa" (fase_id null) se la commessa HA
    // fasi: accenderebbe TUTTE le fasi nelle assegnazioni e romperebbe il match
    // per fase (terminazione). Senza una fase precisa non iscrivo a nulla.
    if (!fid && fasiOp.length) return;
    const row = { operazione_id: opId, utente_id: uid, fase_id: fid };
    const { data, error } = await sb.from('operazioni_addetti').insert(row).select().single();
    if (error) return;
    if (data && !state.opAddetti.find(x => x.id === data.id)) state.opAddetti.push(data);
  } catch (_) {}
}

async function avvia(tipoId, faseId) {
  const u = state.operatore, o = state.opSel;
  if (!u || !o || !tipoId) return;
  // Conferma esplicita per evitare avvii accidentali con un tocco involontario.
  const nomeTipo = state.tipiLav.find(t => t.id === tipoId)?.nome || 'questa lavorazione';
  if (!confirm('Iniziare a timbrare "' + nomeTipo + '" su ' + (o.numero_ordine || 'questa commessa') + '?')) return;
  // Risolvo la fase. Se timbro un TIPO fuori piano su una commessa con fasi, la
  // fase viene creata al volo (urgenza): così sia la sessione sia l'iscrizione
  // finiscono su quella fase precisa, non su "tutta la commessa".
  let fid = faseId || null;
  if (!fid) fid = await risolviOCreaFase(o.id, tipoId);
  const payload = {
    operazione_id: o.id,
    utente_id: u.id,
    tipo_lavorazione_id: tipoId,
    sede: SEDE_TIMBRO,
    inizio: new Date().toISOString(),
  };
  if (fid) payload.fase_id = fid;
  try {
    const { data, error } = await sb.from('sessioni_lavoro').insert(payload).select().single();
    if (error) throw error;
    state.sessioni.unshift(data);
    // Auto-iscrizione: se timbro su una fase di cui non sono addetto, mi ci aggiungo.
    await assicuraAddetto(u.id, o.id, fid, tipoId);
    // Se avevo marcato finita LA fase che sto riavviando, riaprirla
    const r = righeAddetto(u.id, o.id).find(x => fid ? x.fase_id === fid : x.completata_il);
    if (r?.completata_il) await riapriFaseSilenziosa(u.id, o.id, r);
    beep('ok');
    goAttiva();
  } catch (e) {
    beep('err');
    showDone(false, 'Errore avvio', String(e.message || e), () => goFase(o));
  }
}

// Risolve la fase per un tipo timbrato:
//  - commessa SENZA fasi → null (timbratura "libera", come prima);
//  - tipo già presente come fase → quella fase;
//  - tipo FUORI PIANO su commessa con fasi → CREA la fase al volo e la ritorna.
async function risolviOCreaFase(opId, tipoId) {
  const fasiOp = state.opFasi.filter(f => f.operazione_id === opId);
  if (!fasiOp.length) return null;
  const esistente = fasiOp.find(f => f.tipo_lavorazione_id === tipoId);
  if (esistente) return esistente.id;
  const ordine = fasiOp.reduce((m, f) => Math.max(m, Number(f.ordine) || 0), 0) + 1;
  try {
    const { data, error } = await sb.from('operazioni_fasi')
      .insert({ operazione_id: opId, tipo_lavorazione_id: tipoId, minuti_unitari: 0, ordine })
      .select().single();
    if (error || !data) return null;
    if (!state.opFasi.find(x => x.id === data.id)) state.opFasi.push(data);
    return data.id;
  } catch (_) { return null; }
}
async function riapriFaseSilenziosa(uid, opId, riga) {
  try {
    let q = sb.from('operazioni_addetti').update({ completata_il: null });
    if (riga?.id) q = q.eq('id', riga.id);
    else {
      q = q.eq('operazione_id', opId).eq('utente_id', uid);
      if (riga?.fase_id) q = q.eq('fase_id', riga.fase_id);
    }
    await q;
    state.opAddetti = state.opAddetti.map(x =>
      (riga?.id ? x.id === riga.id
        : (x.operazione_id === opId && x.utente_id === uid
           && (!riga?.fase_id || x.fase_id === riga.fase_id)))
        ? { ...x, completata_il: null } : x);
  } catch (_) {}
}

// ═══════════════ 4. Sessione attiva ═══════════════
function durataStr(inizio) {
  const s = Math.max(0, Math.floor((Date.now() - new Date(inizio).getTime()) / 1000));
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  return (h > 0 ? h + ':' : '') + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function goAttiva() {
  const u = state.operatore;
  const sess = state.sessioni.find(s => s.utente_id === u?.id && !s.fine);
  if (!sess) { goHome(); return; }
  show('step-att');
  $('#att-title').textContent = 'Stai lavorando, ' + u.nome;
  const root = $('#att-content');
  root.innerHTML = '';

  const isExtra = !!sess.attivita_id;
  const o = !isExtra ? state.operazioni.find(x => x.id === sess.operazione_id) : null;
  const att = isExtra ? state.attivita.find(x => x.id === sess.attivita_id) : null;
  const tipo = state.tipiLav.find(t => t.id === sess.tipo_lavorazione_id);
  const inizio = new Date(sess.inizio);

  // Avviso sessione molto vecchia
  const ageH = (Date.now() - inizio.getTime()) / 3600000;
  if (ageH > 12) {
    root.append(elx('div', { class:'att-warn' },
      '⚠ Sessione aperta da più di 12 ore (iniziata il ' + fmtIT(sess.inizio.slice(0, 10)) + ' alle ' + fmtT(inizio) + ').'));
  }

  const card = elx('div', { class:'att-card' });
  if (isExtra) {
    card.append(elx('div', { class:'cr-cod' }, att?.nome || 'Attività extra'));
  } else if (o) {
    card.append(infoCommessa(o));
  } else {
    card.append(
      elx('div', { class:'cr-cod' }, '⚠ Commessa non più disponibile'),
      elx('div', { class:'cr-sub', style:'white-space:normal;' },
        'Probabilmente è stata completata o spedita dal gestionale. Termina pure: le ore restano registrate.'),
    );
  }
  card.append(
    elx('div', { class:'att-tipo' },
      elx('div', { class:'fase-color', style:'width:8px;height:22px;background:' + (tipo?.colore || att?.colore || '#6b6b64') + ';' }),
      tipo?.nome || (isExtra ? 'Attività extra' : '—'),
    ),
    elx('div', { class:'att-stats' },
      elx('div', { class:'att-block' },
        elx('div', { class:'att-label' }, 'Iniziato alle'),
        elx('div', { class:'att-value' }, fmtT(inizio))),
      elx('div', { class:'att-block' },
        elx('div', { class:'att-label' }, 'Durata'),
        elx('div', { class:'att-value', id:'att-durata' }, durataStr(sess.inizio))),
    ),
  );
  root.append(card);

  // Azioni: se la sessione è su una fase precisa distinguo "ho finito" da
  // "sospendo"; altrimenti (extra o senza fase) solo termina. La scelta NON
  // dipende più da rigaPerSessione (che a volte non agganciava la riga).
  const actions = elx('div', { class:'att-actions' });
  if (!isExtra) {
    actions.append(
      elx('button', { class:'att-btn fine', onclick: () => fineFase(sess) }, '✅ Ho finito la mia fase'),
      elx('button', { class:'att-btn pausa', onclick: () => stopSessione(sess) }, '⏸ Sospendo (continuerò dopo)'),
    );
  } else {
    actions.append(
      elx('button', { class:'att-btn pausa', onclick: () => stopSessione(sess) }, '⏹ Termina lavoro'),
    );
  }
  root.append(actions);

  state.timer = setInterval(() => {
    const e = $('#att-durata');
    if (e) e.textContent = durataStr(sess.inizio);
  }, 1000);
}

function durataFineStr(sess) {
  const s = Math.floor((new Date(sess.fine) - new Date(sess.inizio)) / 1000);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? h + 'h ' + m + 'm' : m + ' min';
}

async function stopSessione(sess) {
  // La sessione si chiude sempre: ogni timbratura resta registrata, qualunque durata.
  try {
    const { data, error } = await sb.from('sessioni_lavoro')
      .update({ fine: new Date().toISOString() }).eq('id', sess.id).select().single();
    if (error) throw error;
    state.sessioni = state.sessioni.filter(s => s.id !== sess.id);
    beep('ok');
    showDone(true, 'Sessione sospesa', 'Durata: ' + durataFineStr(data), goHome);
  } catch (e) {
    beep('err');
    showDone(false, 'Errore', String(e.message || e), goAttiva);
  }
}

async function fineFase(sess) {
  const ora = new Date().toISOString();
  const uid = state.operatore?.id || sess.utente_id;
  // Risolvo la fase da completare: fase della sessione, poi (se manca) la fase
  // con lo stesso tipo timbrato, poi l'unica riga incompleta.
  let fid = sess.fase_id || null;
  if (!fid && sess.tipo_lavorazione_id) {
    const cand = state.opFasi.filter(f =>
      f.operazione_id === sess.operazione_id && f.tipo_lavorazione_id === sess.tipo_lavorazione_id);
    if (cand.length === 1) fid = cand[0].id;
  }
  const righe = righeAddetto(uid, sess.operazione_id);
  let riga = righe.find(r => (r.fase_id || null) === (fid || null));
  if (!riga) {
    const inc = righe.filter(r => !r.completata_il);
    if (inc.length === 1) { riga = inc[0]; fid = riga.fase_id || null; }
  }
  try {
    // 1) Completa la fase (aggiorna la riga, o la crea SOLO se è una fase precisa;
    //    mai una riga "tutta la commessa" nulla).
    if (riga) {
      let q = sb.from('operazioni_addetti').update({ completata_il: ora });
      if (riga.id) q = q.eq('id', riga.id);
      else {
        q = q.eq('operazione_id', sess.operazione_id).eq('utente_id', uid);
        q = riga.fase_id ? q.eq('fase_id', riga.fase_id) : q.is('fase_id', null);
      }
      const { error: e1 } = await q;
      if (e1) throw e1;
      state.opAddetti = state.opAddetti.map(x =>
        (riga.id ? x.id === riga.id
          : (x.operazione_id === sess.operazione_id && x.utente_id === uid
             && (x.fase_id || null) === (riga.fase_id || null)))
          ? { ...x, completata_il: ora } : x);
    } else if (fid) {
      const { data, error } = await sb.from('operazioni_addetti')
        .insert({ operazione_id: sess.operazione_id, utente_id: uid, fase_id: fid, completata_il: ora })
        .select().single();
      if (error) throw error;
      if (data && !state.opAddetti.find(x => x.id === data.id)) state.opAddetti.push(data);
    }
    // (niente fase precisa → non marco nulla, chiudo e basta)

    // 2) Chiudi la sessione (sempre registrata, qualunque durata).
    const { data, error: e2 } = await sb.from('sessioni_lavoro')
      .update({ fine: ora }).eq('id', sess.id).select().single();
    if (e2) throw e2;
    state.sessioni = state.sessioni.filter(s => s.id !== sess.id);
    beep('ok');
    showDone(true, 'Fase completata ✓', 'Durata: ' + durataFineStr(data), goHome);
  } catch (e) {
    beep('err');
    showDone(false, 'Errore', String(e.message || e), goAttiva);
  }
}

// ═══════════════ 5. Conferma ═══════════════
let doneTimer = null;
function showDone(ok, title, detail, dopo) {
  show('step-done');
  const card = $('#done-card');
  card.className = 'done-card' + (ok ? '' : ' err');
  card.innerHTML = '';
  card.append(
    elx('div', { class:'done-icon' }, ok ? '✓' : '✕'),
    elx('div', { class:'done-msg' }, title),
    elx('div', { class:'done-detail' }, detail || ''),
  );
  clearTimeout(doneTimer);
  doneTimer = setTimeout(dopo || goHome, ok ? 2200 : 3500);
}

// ═══════════════ Beep ═══════════════
let audioCtx = null;
function beep(kind) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = kind === 'ok' ? 880 : 220;
    g.gain.setValueAtTime(.12, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001, audioCtx.currentTime + .18);
    o.start(); o.stop(audioCtx.currentTime + .2);
  } catch (_) {}
}
if (navigator.vibrate) document.addEventListener('click', () => {}, { passive: true });

boot();
</script>
